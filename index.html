<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM 入力 v15.7</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
  --header-h: 10vh;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100vh; width: 100vw; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; display: flex; flex-direction: column; }

/* ヘッダー・メインは既存維持 */
header { flex: 0 0 var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; background: #fff; border-bottom: 4px solid var(--accent); z-index: 1000; }
.h-clock { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
main { flex: 1; display: flex; padding: 8px; gap: 8px; height: calc(100vh - var(--header-h)); }
.col-left { flex: 0 0 40%; display: flex; flex-direction: column; gap: 8px; }
.col-right { flex: 1; display: flex; flex-direction: column; }
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; height: 100%; }
.card-header { padding: 8px 12px; background: #fafafa; border-bottom: 1px solid #ddd; font-weight: 900; display: flex; align-items: center; gap: 6px; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* 統合モーダル：全画面・自動フィット */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-content { 
  background: #fff; width: 100vw; height: 100vh; display: flex; overflow: hidden; 
  animation: modalUp 0.2s ease-out;
}
@keyframes modalUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* 左側：7項目縦いっぱいサイドバー */
.m4-side-bar {
  flex: 0 0 12vw;
  background: #263238;
  display: flex;
  flex-direction: column;
}
.m4-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: none;
  border-bottom: 1px solid #37474f;
  background: transparent;
  color: #b0bec5;
  cursor: pointer;
  padding: 5px;
  transition: all 0.2s;
}
.m4-btn i { width: 2.5vw; height: 2.5vw; margin-bottom: 4px; }
.m4-btn span { font-size: 0.9vw; font-weight: 900; }
.m4-btn.active { background: var(--accent); color: #fff; }

/* 右側：メイン操作パネル */
.modal-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 1.5vh 1.5vw;
  gap: 1.5vh;
  background: #fff;
}

/* 入力グリッド */
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5vw;
  flex: 1;
  min-height: 0;
}
.section-box { display: flex; flex-direction: column; gap: 0.8vh; }
.section-title { font-size: 0.9rem; font-weight: 900; color: #555; border-left: 4px solid var(--accent); padding-left: 8px; }

/* ボタンサイズ自動フィット */
.quick-grid { 
  display: grid; 
  grid-template-columns: repeat(2, 1fr); 
  gap: 8px; 
}
.btn-quick { 
  padding: 1.8vh 8px; 
  border: 2px solid #eee; 
  border-radius: 8px; 
  background: #fdfdfd; 
  font-weight: 700; 
  font-size: clamp(0.8rem, 1.1vw, 1.2rem); 
  text-align: center;
  cursor: pointer;
}
.btn-quick:active { background: #eee; transform: scale(0.98); }

.text-inp { 
  width: 100%; 
  padding: 1.5vh; 
  border: 2px solid #ddd; 
  border-radius: 8px; 
  font-size: 1.1rem; 
  font-weight: 700;
  background: #fff;
}

/* 下部コントロール */
.modal-footer {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 2vw;
  background: #f1f3f4;
  padding: 2vh 2vw;
  border-radius: 16px;
}

.config-group { display: flex; flex-direction: column; gap: 10px; }
.toggle-row { display: flex; gap: 10px; }
.btn-toggle { flex: 1; padding: 2vh; border-radius: 10px; border: 3px solid #ddd; background: #fff; font-weight: 900; font-size: 1.1rem; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }

/* 時刻スピナー */
.time-spin-box { display: flex; align-items: center; gap: 5px; }
.spin-unit { display: flex; flex-direction: column; align-items: center; }
.spin-btn { width: 5vw; height: 4vh; background: #fff; border: 1px solid #ccc; border-radius: 4px; font-weight: 900; }
.spin-val { font-family: 'Share Tech Mono'; font-size: 2rem; font-weight: 700; width: 5vw; text-align: center; }

/* アクションボタン */
.action-group { display: flex; flex-direction: column; gap: 10px; }
.btn-final { width: 100%; padding: 2.5vh; border-radius: 12px; border: none; font-size: 1.6rem; font-weight: 900; cursor: pointer; }
.btn-save { background: var(--accent); color: #fff; flex: 2; }
.btn-close { background: #78909c; color: #fff; flex: 1; }

/* タイムラインの既存スタイルは継承 */
</style>
</head>
<body>

<header>
  <div class="h-left"><div class="h-title">FAM-PM <small>INPUT</small></div></div>
  <div class="h-right"><div class="h-clock" id="live-clock">00:00:00</div></div>
</header>

<main>
  <div class="col-left">
    <section class="card">
      <div class="card-header"><i data-lucide="edit-3" size="14"></i>実績入力</div>
      <div class="card-body">
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:10px;">
          <button class="btn-quick" style="width:70px; height:70px; font-size:2rem;" onclick="changeVal(-1)">-</button>
          <div style="font-family:'Share Tech Mono'; font-size:4rem; font-weight:700; color:var(--accent);" id="disp-act">0</div>
          <button class="btn-quick" style="width:70px; height:70px; font-size:2rem;" onclick="changeVal(1)">+</button>
        </div>
        <button class="btn-final btn-save" style="font-size:1.2rem; margin-bottom:10px;" onclick="openRegModal()">変化点入力</button>
        <div id="rd-display-area" style="margin-top:auto;"></div>
      </div>
    </section>
  </div>
  <div class="col-right">
    <section class="card">
      <div class="card-header"><i data-lucide="clock" size="14"></i>変化点タイムライン</div>
      <div class="card-body">
        <div id="timeline-container"></div>
      </div>
    </section>
  </div>
</main>

<div id="regModal" class="modal-overlay">
  <div class="modal-content">
    <div class="m4-side-bar">
      <button class="m4-btn active" data-type="人" onclick="switchM4(this)"><i data-lucide="user"></i><span>人</span></button>
      <button class="m4-btn" data-type="設備" onclick="switchM4(this)"><i data-lucide="settings"></i><span>設備</span></button>
      <button class="m4-btn" data-type="材料" onclick="switchM4(this)"><i data-lucide="package"></i><span>材料</span></button>
      <button class="m4-btn" data-type="方法" onclick="switchM4(this)"><i data-lucide="info"></i><span>方法</span></button>
      <button class="m4-btn" data-type="不良" onclick="switchM4(this)"><i data-lucide="alert-triangle"></i><span>不良</span></button>
      <button class="m4-btn" data-type="投入" onclick="switchM4(this)"><i data-lucide="log-in"></i><span>投入</span></button>
      <button class="m4-btn" data-type="下車" onclick="switchM4(this)"><i data-lucide="log-out"></i><span>下車</span></button>
    </div>

    <div class="modal-main">
      <div class="input-grid">
        <div class="section-box">
          <span class="section-title">内容選択 / 詳細履歴 (上位4件)</span>
          <div id="quick-titles" class="quick-grid"></div>
          <input type="text" id="reg-title" class="text-inp" placeholder="内容（大項目）">
          
          <span class="section-title" style="margin-top:10px;">詳細内容</span>
          <div id="quick-details" class="quick-grid">
            <button class="btn-quick" onclick="setVal('reg-detail','No.1ライン')">No.1ライン</button>
            <button class="btn-quick" onclick="setVal('reg-detail','右側センサー')">右側センサー</button>
            <button class="btn-quick" onclick="setVal('reg-detail','搬送コンベア')">搬送コンベア</button>
            <button class="btn-quick" onclick="setVal('reg-detail','モータ駆動部')">モータ駆動部</button>
          </div>
          <input type="text" id="reg-detail" class="text-inp" placeholder="具体的な詳細箇所など">
        </div>

        <div class="section-box">
          <span class="section-title">処置内容選択</span>
          <div id="quick-actions" class="quick-grid">
            <button class="btn-quick" onclick="setVal('reg-act','リーダー報告')">リーダー報告</button>
            <button class="btn-quick" onclick="setVal('reg-act','再起動実施')">再起動実施</button>
            <button class="btn-quick" onclick="setVal('reg-act','基準値内確認')">基準値内確認</button>
            <button class="btn-quick" onclick="setVal('reg-act','清掃・点検')">清掃・点検</button>
          </div>
          <input type="text" id="reg-act" class="text-inp" placeholder="実施した処置">
        </div>
      </div>

      <div class="modal-footer">
        <div class="config-group">
          <div class="toggle-row">
            <button id="stop-on" class="btn-toggle active" onclick="setStop(true)">⚠️ 停止あり</button>
            <button id="stop-off" class="btn-toggle" onclick="setStop(false)">✅ 停止なし</button>
          </div>
          <div id="time-area" class="time-spin-box">
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sh',1)">△</button><div class="spin-val" id="sh">08</div><button class="spin-btn" onclick="spin('sh',-1)">▽</button></div>
            <span style="font-weight:900; font-size:1.5rem;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sm',1)">△</button><div class="spin-val" id="sm">35</div><button class="spin-btn" onclick="spin('sm',-1)">▽</button></div>
            <span style="margin:0 15px; color:#999; font-size:1.5rem;">〜</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('eh',1)">△</button><div class="spin-val" id="eh">--</div><button class="spin-btn" onclick="spin('eh',-1)">▽</button></div>
            <span style="font-weight:900; font-size:1.5rem;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('em',1)">△</button><div class="spin-val" id="em">--</div><button class="spin-btn" onclick="spin('em',-1)">▽</button></div>
          </div>
        </div>
        <div class="action-group">
          <button class="btn-final btn-save" onclick="saveIssue()">登録</button>
          <button class="btn-final btn-close" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const m4Data = {
  '人': ['応援投入', '体調不良', '作業者変更', '研修実施'],
  '設備': ['チョコ停', '刃具折損', '給油点検', 'センサー異常'],
  '材料': ['欠品', 'ロット切替', '異物混入', '寸法バラツキ'],
  '方法': ['工程変更', 'タクト変更', '治具調整', '試作実施'],
  '不良': ['外観不良', '寸法NG', '異音発生', '傷発見'],
  '投入': ['初物投入', '先行投入', '追加投入', '計画変更'],
  '下車': ['完了下車', '不適合下車', '工程移動', '段取替']
};

function switchM4(btn) {
  document.querySelectorAll('.m4-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const type = btn.dataset.type;
  document.getElementById('quick-titles').innerHTML = m4Data[type].map(t => 
    `<button class="btn-quick" onclick="setVal('reg-title','${t}')">${t}</button>`).join('');
}

function openRegModal() { document.getElementById('regModal').classList.add('open'); switchM4(document.querySelector('.m4-btn.active')); }
function closeModal() { document.getElementById('regModal').classList.remove('open'); }
function setStop(s) { 
  document.getElementById('stop-on').classList.toggle('active', s);
  document.getElementById('stop-off').classList.toggle('active', !s);
  document.getElementById('time-area').style.visibility = s ? 'visible' : 'hidden';
}
function spin(id, delta) {
  const el = document.getElementById(id);
  let v = (el.innerText === "--") ? 0 : parseInt(el.innerText);
  if (id.includes('h')) v = (v + delta + 24) % 24; else v = (v + delta + 60) % 60;
  el.innerText = v.toString().padStart(2, '0');
}
function setVal(id, v) { document.getElementById(id).value = v; }
function changeVal(n) { let d = document.getElementById('disp-act'); d.innerText = Math.max(0, parseInt(d.innerText)+n); }

setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ja-JP', { hour12: false }); }, 1000);
document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); switchM4(document.querySelector('.m4-btn.active')); });
</script>
</body>
</html>
