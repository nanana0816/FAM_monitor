<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM v16.2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
  --header-h: 10vh;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100vh; width: 100vw; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--dark); overflow: hidden; display: flex; flex-direction: column; }

/* --- メイン画面 --- */
header { flex: 0 0 var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; background: #fff; border-bottom: 4px solid var(--accent); z-index: 1000; }
.h-clock { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
main { flex: 1; display: flex; padding: 8px; gap: 8px; height: calc(100vh - var(--header-h)); }
.col-left { flex: 0 0 40%; display: flex; flex-direction: column; gap: 8px; }
.col-right { flex: 1; display: flex; flex-direction: column; }
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; height: 100%; }
.card-header { padding: 6px 12px; background: #fafafa; border-bottom: 1px solid #ddd; font-weight: 900; display: flex; align-items: center; gap: 6px; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* タイムライン表示（以前の仕様維持） */
.tl-label-row { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: 900; font-size: 0.75rem; color: #666; background: #fdfdfd; border-bottom: 1px solid #eee; }
.timeline-scroll-area { flex: 1; overflow-y: auto; padding: 10px 0; }
#timeline-container { position: relative; width: 100%; min-height: 100%; }
#timeline-container::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ddd; transform: translateX(-50%); }
.tl-row { display: flex; width: 100%; margin-bottom: 15px; position: relative; align-items: center; }
.tl-item { width: 45%; display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 700; }
.tl-left { justify-content: flex-end; padding-right: 5px; text-align: right; }
.tl-right { justify-content: flex-start; padding-left: 5px; text-align: left; margin-left: 55%; }
.tl-dot { width: 10px; height: 10px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
.status-badge { padding: 1px 6px; border-radius: 4px; font-size: 0.65rem; color: #fff; margin-left: 4px; }

/* --- モーダル表示崩れ対策 --- */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; }
.modal-overlay.open { display: flex; }
.modal-content { width: 100vw; height: 100vh; background: #fff; display: flex; overflow: hidden; }

/* サイドバーは固定 */
.m4-side-bar { flex: 0 0 14vw; background: var(--dark); display: flex; flex-direction: column; }
.m4-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; border: none; border-bottom: 1px solid #444; color: #888; }
.m4-btn i { width: 2.5vw; height: 2.5vw; margin-bottom: 2px; }
.m4-btn span { font-size: 1vw; font-weight: 900; }
.m4-btn.active { background: var(--accent); color: #fff; }

/* メインエリア：収まりきらない場合はスクロール可能に */
.modal-main { flex: 1; display: flex; flex-direction: column; padding: 10px 1.5vw; gap: 12px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* グリッドレイアウトの安定化 */
.input-row-top { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.input-row-mid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; align-items: start; }

.box-col { display: flex; flex-direction: column; gap: 6px; }
.label-sm { font-size: 0.8rem; font-weight: 900; color: #555; background: #eee; padding: 2px 8px; border-radius: 4px; width: fit-content; }

/* ボタンと入力欄のサイズ確保 */
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.btn-q { min-height: 40px; padding: 8px 4px; border: 1px solid #ccc; border-radius: 6px; background: #fff; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
.inp-t { width: 100%; min-height: 40px; padding: 8px; border: 2px solid #bbb; border-radius: 6px; font-size: 1rem; font-weight: 700; }

/* 時刻入力の重なりを解消 */
.time-container { display: flex; flex-direction: column; gap: 8px; }
.spin-box { display: flex; align-items: center; gap: 4px; background: #fdfdfd; padding: 6px; border-radius: 8px; border: 1px solid #ccc; width: 100%; justify-content: center; }
.spin-unit { display: flex; align-items: center; gap: 2px; }
.spin-v { font-family: 'Share Tech Mono'; font-size: 1.6rem; font-weight: 700; min-width: 40px; text-align: center; }
.spin-b { width: 36px; height: 36px; background: #eee; border: 1px solid #ccc; border-radius: 4px; font-weight: 900; font-size: 1rem; display: flex; align-items: center; justify-content: center; }

/* フッター（登録・キャンセル） */
.modal-footer { margin-top: auto; padding: 15px 0; display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px; border-top: 1px solid #eee; background: #fff; }
.btn-toggle { flex: 1; min-height: 45px; border: 2px solid #ccc; border-radius: 8px; font-weight: 900; background: #fff; font-size: 1rem; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }
.action-btns { display: flex; gap: 10px; }
.btn-f { flex: 1; min-height: 50px; border-radius: 8px; border: none; font-size: 1.2rem; font-weight: 900; cursor: pointer; }
.btn-save { background: var(--accent); color: #fff; }
.btn-can { background: #78909c; color: #fff; }

/* スマホ・タブレット用調整 */
@media (max-width: 600px) {
  .input-row-top, .input-row-mid { grid-template-columns: 1fr; }
  .m4-side-bar { flex: 0 0 18vw; }
}
</style>
</head>
<body>

<header>
  <div class="h-title" style="font-weight:900;">FAM-PM <small>v16.2</small></div>
  <div class="h-clock" id="live-clock">00:00:00</div>
</header>

<main>
  <div class="col-left">
    <section class="card">
      <div class="card-header"><i data-lucide="edit-3" size="14"></i>実績入力</div>
      <div class="card-body">
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; flex:1;">
          <button class="btn-q" style="width:60px;height:60px;font-size:2rem;" onclick="changeVal(-1)">-</button>
          <div style="font-family:'Share Tech Mono'; font-size:4rem; font-weight:700; color:var(--accent);" id="disp-act">0</div>
          <button class="btn-q" style="width:60px;height:60px;font-size:2rem;" onclick="changeVal(1)">+</button>
        </div>
        <button class="btn-f" style="background:var(--dark); color:#fff; margin-bottom:10px;" onclick="openRegModal()">変化点入力</button>
      </div>
    </section>
  </div>
  <div class="col-right">
    <section class="card">
      <div class="card-header"><i data-lucide="clock" size="14"></i>変化点タイムライン</div>
      <div class="tl-label-row"><div style="color:var(--safe)">← 停止なし</div><div style="color:var(--accent)">停止あり →</div></div>
      <div class="card-body">
        <div class="timeline-scroll-area"><div id="timeline-container"></div></div>
      </div>
    </section>
  </div>
</main>

<div id="regModal" class="modal-overlay">
  <div class="modal-content">
    <div class="m4-side-bar">
      <button class="m4-btn active" data-type="人" onclick="switchM4(this)"><i data-lucide="user"></i><span>人</span></button>
      <button class="m4-btn" data-type="設備" onclick="switchM4(this)"><i data-lucide="settings"></i><span>設備</span></button>
      <button class="m4-btn" data-type="材料" onclick="switchM4(this)"><i data-lucide="package"></i><span>材料</span></button>
      <button class="m4-btn" data-type="方法" onclick="switchM4(this)"><i data-lucide="info"></i><span>方法</span></button>
      <button class="m4-btn" data-type="不良" onclick="switchM4(this)"><i data-lucide="alert-triangle"></i><span>不良</span></button>
      <button class="m4-btn" data-type="投入" onclick="switchM4(this)"><i data-lucide="log-in"></i><span>投入</span></button>
      <button class="m4-btn" data-type="下車" onclick="switchM4(this)"><i data-lucide="log-out"></i><span>下車</span></button>
    </div>
    <div class="modal-main">
      <div class="input-row-top">
        <div class="box-col">
          <span class="label-sm">内容タップ</span>
          <div id="q-titles" class="quick-grid"></div>
          <input type="text" id="reg-title" class="inp-t" placeholder="内容入力">
        </div>
        <div class="box-col">
          <span class="label-sm">詳細内容タップ</span>
          <div id="q-details" class="quick-grid"></div>
          <input type="text" id="reg-detail" class="inp-t" placeholder="詳細入力">
        </div>
      </div>

      <div class="input-row-mid">
        <div class="box-col">
          <span class="label-sm">処置内容タップ (履歴)</span>
          <div id="q-actions" class="quick-grid"></div>
          <input type="text" id="reg-act" class="inp-t" placeholder="処置入力">
        </div>
        <div class="time-container">
          <span class="label-sm">時刻入力</span>
          <div class="spin-box">
            <span style="font-size:0.7rem; font-weight:900;">開始</span>
            <div class="spin-unit">
              <button class="spin-b" onclick="spin('sh',1)">▲</button>
              <div class="spin-v" id="sh">08</div>
              <button class="spin-b" onclick="spin('sh',-1)">▼</button>
            </div>
            <span>:</span>
            <div class="spin-unit">
              <button class="spin-b" onclick="spin('sm',1)">▲</button>
              <div class="spin-v" id="sm">00</div>
              <button class="spin-b" onclick="spin('sm',-1)">▼</button>
            </div>
          </div>
          <div class="spin-box">
            <span style="font-size:0.7rem; font-weight:900;">終了</span>
            <div class="spin-unit">
              <button class="spin-b" onclick="spin('eh',1)">▲</button>
              <div class="spin-v" id="eh">--</div>
              <button class="spin-b" onclick="spin('eh',-1)">▼</button>
            </div>
            <span>:</span>
            <div class="spin-unit">
              <button class="spin-b" onclick="spin('em',1)">▲</button>
              <div class="spin-v" id="em">--</div>
              <button class="spin-b" onclick="spin('em',-1)">▼</button>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <div style="display:flex; gap:10px;">
          <button id="stop-on" class="btn-toggle active" onclick="setStop(true)">⚠️ 停止あり</button>
          <button id="stop-off" class="btn-toggle" onclick="setStop(false)">✅ 停止なし</button>
        </div>
        <div class="action-btns">
          <button class="btn-f btn-save" onclick="saveIssue()">登録</button>
          <button class="btn-f btn-can" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let issues = [];
let regHasStop = true;
const master = {
  '人': { t:['応援投入','作業遅れ','研修','離席'], d:['No.1ライン','新人A','応援者B','全工程'], a:['リーダー報告','配置変','教育','休憩'] },
  '設備': { t:['チョコ停','刃具折損','給油','エラー'], d:['OP-10','OP-20','コンベア','センサー'], a:['再起動','刃具交換','清掃','点検'] },
  '材料': { t:['欠品','ロット切替','異物','不良'], d:['ボルト','パネル','パッキン','潤滑油'], a:['出庫依頼','選別','洗浄','交換'] },
  '方法': { t:['工程変更','タクト変','治具交換','試作'], d:['手順A','速度UP','専用治具','新型'], a:['基準書確認','設定変','位置調整','完了'] },
  '不良': { t:['外観傷','異音','動作不良','未加工'], d:['表面','駆動部','スイッチ','穴あけ'], a:['全数選別','再研磨','基板交換','再加工'] },
  '投入': { t:['初物投入','先行投入','追加投入','順序変'], d:['製品A','製品B','特注品','予備品'], a:['数量確認','計画更新','ライン投入','整理'] },
  '下車': { t:['完了下車','不適合下車','抜き取り','清掃'], d:['パレットA','NG箱','検査用','終業点検'], a:['搬送完了','赤札貼付','検査室へ','清掃済'] }
};

function switchM4(btn) {
  document.querySelectorAll('.m4-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const type = btn.dataset.type;
  const data = master[type];
  document.getElementById('q-titles').innerHTML = data.t.map(v => `<button class="btn-q" onclick="setVal('reg-title','${v}')">${v}</button>`).join('');
  document.getElementById('q-details').innerHTML = data.d.map(v => `<button class="btn-q" onclick="setVal('reg-detail','${v}')">${v}</button>`).join('');
  document.getElementById('q-actions').innerHTML = data.a.map(v => `<button class="btn-q" onclick="setVal('reg-act','${v}')">${v}</button>`).join('');
}

function openRegModal() {
  document.getElementById('regModal').classList.add('open');
  const now = new Date();
  document.getElementById('sh').innerText = now.getHours().toString().padStart(2,'0');
  document.getElementById('sm').innerText = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('eh').innerText = "--";
  document.getElementById('em').innerText = "--";
  switchM4(document.querySelector('.m4-btn.active'));
}

function saveIssue() {
  const eh = document.getElementById('eh').innerText;
  const isDone = eh !== "--";
  const type = document.querySelector('.m4-btn.active').dataset.type;
  const iconMap = {'人':'user','設備':'settings','材料':'package','方法':'info','不良':'alert-triangle','投入':'log-in','下車':'log-out'};
  issues.push({
    time: `${document.getElementById('sh').innerText}:${document.getElementById('sm').innerText}`,
    endTime: isDone ? `${eh}:${document.getElementById('em').innerText}` : null,
    title: document.getElementById('reg-title').value || "未設定",
    icon: iconMap[type],
    stop: regHasStop,
    done: isDone
  });
  renderTimeline(); closeModal();
}

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  container.innerHTML = issues.sort((a,b)=>a.time.localeCompare(b.time)).map(i => `
    <div class="tl-row">
      <div class="tl-dot" style="border-color:${i.stop?'var(--accent)':'var(--safe)'}"></div>
      <div class="tl-item ${i.stop?'tl-right':'tl-left'}">
        <span style="font-family:'Share Tech Mono'; color:var(--accent); font-size:0.7rem;">${i.time}${i.endTime?'~'+i.endTime:''}</span>
        <i data-lucide="${i.icon}" size="12"></i>
        <span>${i.title} <span class="status-badge ${i.done?'st-done':'st-stop'}">${i.done?'済':'進行'}</span></span>
      </div>
    </div>`).join('');
  lucide.createIcons();
}

function spin(id, d) {
  const el = document.getElementById(id);
  let v = (el.innerText === "--") ? 0 : parseInt(el.innerText);
  if (id.includes('h')) v = (v+d+24)%24; else v = (v+d+60)%60;
  el.innerText = v.toString().padStart(2,'0');
}
function setStop(s) {
  regHasStop = s;
  document.getElementById('stop-on').classList.toggle('active', s);
  document.getElementById('stop-off').classList.toggle('active', !s);
}
function setVal(id, v) { document.getElementById(id).value = v; }
function closeModal() { document.getElementById('regModal').classList.remove('open'); }
function changeVal(n) { let d = document.getElementById('disp-act'); d.innerText = Math.max(0, parseInt(d.innerText)+n); }

setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ja-JP', { hour12: false }); }, 1000);
document.addEventListener('DOMContentLoaded', () => { renderTimeline(); lucide.createIcons(); });
</script>
</body>
</html>
