<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM v15.9</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
  --header-h: 12vh;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100vh; width: 100vw; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--dark); overflow: hidden; display: flex; flex-direction: column; }

/* --- メイン画面（v15.6維持） --- */
header { flex: 0 0 var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; background: #fff; border-bottom: 4px solid var(--accent); z-index: 1000; }
.h-clock { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
main { flex: 1; display: flex; padding: 8px; gap: 8px; height: calc(100vh - var(--header-h)); }
.col-left { flex: 0 0 42%; display: flex; flex-direction: column; gap: 8px; }
.col-right { flex: 1; display: flex; flex-direction: column; }
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; height: 100%; }
.card-header { padding: 6px 12px; background: #fafafa; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 6px; font-weight: 900; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.card-footer-info { margin-top: auto; padding-top: 10px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
.rd-group { display: flex; gap: 1.5vw; align-items: center; justify-content: center; }
.rd-icon { font-family: 'Share Tech Mono'; font-weight: 900; color: #ccc; font-size: 1rem; }
.rd-icon.active { color: var(--accent); font-size: 1.8rem; }
.total-item { background: #f0f0f0; padding: 8px; border-radius: 4px; border-left: 4px solid var(--dark); text-align: center; }
.total-val-box { font-family: 'Share Tech Mono'; font-size: 1.5rem; font-weight: 700; }

/* タイムライン（v15.6維持） */
.timeline-scroll-area { flex: 1; overflow-y: auto; padding: 20px 0; position: relative; }
#timeline-container { position: relative; width: 100%; min-height: 100%; }
#timeline-container::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ddd; transform: translateX(-50%); }
.tl-row { display: flex; width: 100%; margin-bottom: 20px; position: relative; z-index: 1; align-items: center; cursor: pointer; }
.tl-item { width: 45%; display: flex; align-items: center; gap: 8px; }
.tl-left { justify-content: flex-end; padding-right: 5px; text-align: right; }
.tl-right { justify-content: flex-start; padding-left: 5px; text-align: left; margin-left: 55%; }
.tl-dot { width: 12px; height: 12px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
.tl-time { font-family: 'Share Tech Mono'; font-weight: 900; font-size: 0.9rem; }
.tl-content { font-size: 0.85rem; font-weight: 700; }
.status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; color: #fff; margin-left: 5px; }
.st-stop { background: var(--accent); }
.st-done { background: var(--safe); }

/* --- 変化点入力モーダル（v15.9新仕様・オートフィット） --- */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; }
.modal-overlay.open { display: flex; }
.modal-content { width: 100vw; height: 100vh; background: #fff; display: flex; overflow: hidden; }

/* 左サイドバー：7項目 */
.m4-side-bar { flex: 0 0 13vw; background: var(--dark); display: flex; flex-direction: column; border-right: 1px solid #444; }
.m4-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; border: none; border-bottom: 1px solid #444; color: #aaa; cursor: pointer; }
.m4-btn i { width: 3vw; height: 3vw; margin-bottom: 2px; }
.m4-btn span { font-size: 1.1vw; font-weight: 900; }
.m4-btn.active { background: var(--accent); color: #fff; }

/* メイン入力エリア：グリッドと自動フィット */
.modal-main { flex: 1; display: flex; flex-direction: column; padding: 1vh 1.5vw; gap: 1vh; height: 100vh; }
.input-section { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5vw; min-height: 0; }
.input-col { display: flex; flex-direction: column; gap: 0.5vh; overflow: hidden; }
.box-label { font-size: 0.85rem; font-weight: 900; color: #555; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }

/* ボタン群の自動サイズ調整 */
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.btn-quick { 
  padding: 1.8vh 4px; border: 1px solid #ccc; border-radius: 8px; background: #fff; 
  font-weight: 700; font-size: clamp(0.75rem, 1vw, 1.1rem); cursor: pointer; text-align: center;
}
.btn-quick:active { background: #eee; }

.text-inp { width: 100%; padding: 1.2vh; border: 2px solid #bbb; border-radius: 6px; font-size: 1.1rem; font-weight: 700; background: #fff; }

/* 下部コントロール：停止・時刻・登録 */
.modal-footer { flex: 0 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5vw; background: #f5f5f5; padding: 1.5vh 2vw; border-radius: 12px 12px 0 0; }
.footer-left { display: flex; flex-direction: column; gap: 10px; }
.toggle-row { display: flex; gap: 10px; }
.btn-toggle { flex: 1; padding: 1.8vh; border: 2px solid #ccc; border-radius: 8px; font-weight: 900; background: #fff; font-size: 1.1rem; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }

.time-spin-box { display: flex; align-items: center; justify-content: center; gap: 4px; }
.spin-btn { width: 4.5vw; height: 4.5vh; background: #fff; border: 1px solid #aaa; border-radius: 4px; font-weight: 900; font-size: 1.2rem; }
.spin-val { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; width: 5vw; text-align: center; }

.action-group { display: flex; flex-direction: column; gap: 8px; }
.btn-final { width: 100%; padding: 2vh; border-radius: 10px; border: none; font-size: 1.6rem; font-weight: 900; cursor: pointer; }
.btn-save { background: var(--accent); color: #fff; }
.btn-close { background: #78909c; color: #fff; }
</style>
</head>
<body>

<header>
  <div class="h-left"><div class="h-title" style="font-weight:900;">FAM-PM <small>INPUT</small></div></div>
  <div class="h-right"><div class="h-clock" id="live-clock">00:00:00</div></div>
</header>

<main>
  <div class="col-left">
    <section class="card">
      <div class="card-header"><i data-lucide="edit-3" size="14"></i>実績入力</div>
      <div class="card-body">
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:10px;">
          <button class="btn-quick" style="width:70px;height:70px;font-size:2rem;" onclick="changeVal(-1)">-</button>
          <div style="font-family:'Share Tech Mono'; font-size:4rem; font-weight:700; color:var(--accent);" id="disp-act">0</div>
          <button class="btn-quick" style="width:70px;height:70px;font-size:2rem;" onclick="changeVal(1)">+</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
          <button class="btn-final btn-save" style="flex:1; font-size:1.2rem;" onclick="alert('実績保存')">登録</button>
          <button class="btn-final" style="flex:1; background:var(--dark); color:#fff; font-size:1.2rem;" onclick="openRegModal()">変化点</button>
        </div>
        <div class="card-footer-info">
          <div id="rd-display-area" class="rd-group"></div>
          <div class="total-item">
            <div style="font-size:0.7rem; font-weight:900; color:#666; margin-bottom:2px;">LINE TOTAL (ACTUAL / PLAN)</div>
            <div class="total-val-box"><span id="total-act">562</span> / <span id="total-plan" style="color:#888">584</span></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <div class="col-right">
    <section class="card">
      <div class="card-header"><i data-lucide="clock" size="14"></i>変化点タイムライン</div>
      <div class="card-body">
        <div class="timeline-scroll-area"><div id="timeline-container"></div></div>
      </div>
    </section>
  </div>
</main>

<div id="regModal" class="modal-overlay">
  <div class="modal-content">
    <div class="m4-side-bar">
      <button class="m4-btn active" data-type="人" onclick="switchM4(this)"><i data-lucide="user"></i><span>人</span></button>
      <button class="m4-btn" data-type="設備" onclick="switchM4(this)"><i data-lucide="settings"></i><span>設備</span></button>
      <button class="m4-btn" data-type="材料" onclick="switchM4(this)"><i data-lucide="package"></i><span>材料</span></button>
      <button class="m4-btn" data-type="方法" onclick="switchM4(this)"><i data-lucide="info"></i><span>方法</span></button>
      <button class="m4-btn" data-type="不良" onclick="switchM4(this)"><i data-lucide="alert-triangle"></i><span>不良</span></button>
      <button class="m4-btn" data-type="投入" onclick="switchM4(this)"><i data-lucide="log-in"></i><span>投入</span></button>
      <button class="m4-btn" data-type="下車" onclick="switchM4(this)"><i data-lucide="log-out"></i><span>下車</span></button>
    </div>
    <div class="modal-main">
      <div class="input-section">
        <div class="input-col">
          <span class="box-label">内容選択</span>
          <div id="q-titles" class="quick-grid"></div>
          <input type="text" id="reg-title" class="text-inp" placeholder="内容入力">
          <span class="box-label" style="margin-top:1vh;">処置内容選択 (履歴上位4件)</span>
          <div id="q-actions" class="quick-grid"></div>
          <input type="text" id="reg-act" class="text-inp" placeholder="処置入力">
        </div>
        <div class="input-col">
          <span class="box-label">詳細内容選択</span>
          <div id="q-details" class="quick-grid"></div>
          <input type="text" id="reg-detail" class="text-inp" placeholder="詳細内容入力">
        </div>
      </div>
      <div class="modal-footer">
        <div class="footer-left">
          <div class="toggle-row">
            <button id="stop-on" class="btn-toggle active" onclick="setStop(true)">⚠️ 停止あり</button>
            <button id="stop-off" class="btn-toggle" onclick="setStop(false)">✅ 停止なし</button>
          </div>
          <div id="time-area" class="time-spin-box">
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sh',1)">△</button><div class="spin-val" id="sh">08</div><button class="spin-btn" onclick="spin('sh',-1)">▽</button></div>
            <span style="font-weight:900;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sm',1)">△</button><div class="spin-val" id="sm">30</div><button class="spin-btn" onclick="spin('sm',-1)">▽</button></div>
            <span style="margin:0 10px; color:#999;">〜</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('eh',1)">△</button><div class="spin-val" id="eh">--</div><button class="spin-btn" onclick="spin('eh',-1)">▽</button></div>
            <span style="font-weight:900;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('em',1)">△</button><div class="spin-val" id="em">--</div><button class="spin-btn" onclick="spin('em',-1)">▽</button></div>
          </div>
        </div>
        <div class="action-group">
          <button class="btn-final btn-save" onclick="saveIssue()">登録</button>
          <button class="btn-final btn-close" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let curAct = 0;
let issues = [];
let regHasStop = true;

const masterData = {
  '人': { t:['応援投入','体調不良','研修','離席'], d:['No.1ライン','新人A','応援者B','全工程'], a:['リーダー報告','配置変更','教育実施','休憩指示'] },
  '設備': { t:['チョコ停','刃具折損','給油点検','エラー'], d:['OP-10機','OP-20機','コンベア','センサー'], a:['再起動','刃具交換','清掃実施','点検完了'] },
  '材料': { t:['欠品','ロット切替','異物','不良'], d:['ボルト','メインパネル','パッキン','潤滑油'], a:['出庫依頼','選別実施','洗浄','良品交換'] },
  '方法': { t:['工程変更','タクト変','治具交換','試作'], d:['手順A','速度UP','専用治具','新型'], a:['基準書確認','タイマー設定','位置調整','試作完了'] },
  '不良': { t:['外観傷','異音','動作不良','未加工'], d:['表面','駆動部','スイッチ','穴あけ'], a:['全数選別','再研磨','基板交換','再加工'] },
  '投入': { t:['初物投入','先行投入','追加投入','順序変'], d:['製品A','製品B','特注品','予備品'], a:['数量確認','計画更新','ライン投入','順番整理'] },
  '下車': { t:['完了下車','不適合下車','抜き取り','清掃'], d:['パレットA','NG箱','検査用','終業点検'], a:['搬送完了','赤札貼付','検査室へ','清掃済'] }
};

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  container.innerHTML = issues.sort((a,b)=>a.time.localeCompare(b.time)).map(i => `
    <div class="tl-row">
      <div class="tl-dot" style="border-color:${i.stop?'var(--accent)':'var(--safe)'}"></div>
      <div class="tl-item ${i.stop?'tl-right':'tl-left'}">
        <span class="tl-time">${i.time}</span> <i data-lucide="${i.icon}" size="14"></i>
        <div class="tl-content">${i.title}<span class="status-badge ${i.stop?'st-stop':'st-done'}">${i.stop?'停止中':'済'}</span></div>
      </div>
    </div>`).join('');
  lucide.createIcons();
}

function switchM4(btn) {
  document.querySelectorAll('.m4-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const type = btn.dataset.type;
  const data = masterData[type];
  document.getElementById('q-titles').innerHTML = data.t.map(v => `<button class="btn-quick" onclick="setVal('reg-title','${v}')">${v}</button>`).join('');
  document.getElementById('q-details').innerHTML = data.d.map(v => `<button class="btn-quick" onclick="setVal('reg-detail','${v}')">${v}</button>`).join('');
  document.getElementById('q-actions').innerHTML = data.a.map(v => `<button class="btn-quick" onclick="setVal('reg-act','${v}')">${v}</button>`).join('');
}

function openRegModal() {
  document.getElementById('regModal').classList.add('open');
  const now = new Date();
  document.getElementById('sh').innerText = now.getHours().toString().padStart(2,'0');
  document.getElementById('sm').innerText = now.getMinutes().toString().padStart(2,'0');
  switchM4(document.querySelector('.m4-btn.active'));
}
function closeModal() { document.getElementById('regModal').classList.remove('open'); }
function setStop(s) {
  regHasStop = s;
  document.getElementById('stop-on').classList.toggle('active', s);
  document.getElementById('stop-off').classList.toggle('active', !s);
  document.getElementById('time-area').style.visibility = s ? 'visible' : 'hidden';
}
function spin(id, d) {
  const el = document.getElementById(id);
  let v = (el.innerText === "--") ? 0 : parseInt(el.innerText);
  if (id.includes('h')) v = (v+d+24)%24; else v = (v+d+60)%60;
  el.innerText = v.toString().padStart(2,'0');
}
function setVal(id, v) { document.getElementById(id).value = v; }
function changeVal(n) { curAct = Math.max(0, curAct+n); document.getElementById('disp-act').innerText = curAct; }

function saveIssue() {
  const iconMap = {'人':'user','設備':'settings','材料':'package','方法':'info','不良':'alert-triangle','投入':'log-in','下車':'log-out'};
  const type = document.querySelector('.m4-btn.active').dataset.type;
  issues.push({
    time: `${document.getElementById('sh').innerText}:${document.getElementById('sm').innerText}`,
    title: document.getElementById('reg-title').value || "未設定",
    icon: iconMap[type],
    stop: regHasStop
  });
  renderTimeline(); closeModal();
}

setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ja-JP', { hour12: false }); }, 1000);
document.addEventListener('DOMContentLoaded', () => {
  renderTimeline();
  document.getElementById('rd-display-area').innerHTML = '<span class="rd-icon active">1rd</span><span class="rd-icon">2rd</span><span class="rd-icon">3rd</span>';
});
</script>
</body>
</html>
