<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM MORNING MONITOR v8.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  /* サフランレッド・インフォグラフィック・パレット */
  --bg: #FDFCFB; 
  --panel: #FFFFFF; 
  --accent: #E64A19; /* Saffron Red */
  --accent-light: #FF8A65;
  --sub: #FFB300;    /* Amber/Gold */
  --teal: #00897B;
  --text: #2C3E50; 
  --text-light: #7F8C8D;
  --border: #E0E0E0; 
  --radius: 12px;
  --shadow: 0 4px 20px rgba(230, 74, 25, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  background: var(--bg); 
  font-family: 'Noto Sans JP', sans-serif; 
  color: var(--text); 
  padding-bottom: 90px; 
  font-size: 14px; 
  line-height: 1.6;
}

header { 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  padding: 0 24px; 
  height: 70px; 
  background: #fff; 
  border-bottom: 4px solid var(--accent); 
  position: sticky; 
  top: 0; 
  z-index: 1000; 
  box-shadow: 0 2px 15px rgba(0,0,0,0.05);
}

.h-title { 
  font-size: 20px; 
  font-weight: 900; 
  color: var(--accent); 
  display: flex;
  align-items: center;
  gap: 10px;
}

.h-clock { 
  font-family: 'Share Tech Mono', monospace; 
  font-size: 32px; 
  font-weight: 700; 
  color: var(--text); 
  background: #f0f0f0;
  padding: 4px 16px;
  border-radius: 6px;
}

.main-grid { 
  display: grid; 
  gap: 16px; 
  padding: 16px;
}

/* カードデザインのインフォグラフィック化 */
.card {
  background: var(--panel);
  border: none;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform 0.2s ease;
}

.card-header {
  padding: 16px 20px;
  background: linear-gradient(to right, #FFF5F2, #FFFFFF);
  border-bottom: 1px solid #FFE0D6;
  font-weight: 700;
  font-size: 16px;
  color: var(--accent);
  display: flex;
  align-items: center;
}

.card-header::before {
  content: "";
  display: inline-block;
  width: 4px;
  height: 18px;
  background: var(--accent);
  margin-right: 10px;
  border-radius: 2px;
}

.card-body {
  flex: 1;
  overflow-y: auto;
  max-height: 350px;
}

/* テーブルデザインの洗練 */
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

th {
  background: #FAFAFA;
  font-weight: 700;
  color: var(--text-light);
  font-size: 12px;
  text-transform: uppercase;
  padding: 12px;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}

td {
  padding: 14px 12px;
  border-bottom: 1px solid #F0F0F0;
  font-size: 14px;
}

tr:hover td {
  background-color: #FFF9F7;
}

/* バッジとスタンプの調整 */
.badge {
  padding: 4px 12px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 11px;
}
.badge-ok { background: #E8F5E9; color: #2E7D32; border: 1px solid #A5D6A7; }
.badge-ng { background: #FFEBEE; color: #C62828; border: 1px solid #EF9A9A; }
.badge-warn { background: #FFF8E1; color: #F57F17; border: 1px solid #FFE082; }

.stamp {
  background: var(--accent);
  border: none;
  box-shadow: 0 2px 4px rgba(230,74,25,0.3);
}

/* ナビゲーション */
.bottom-nav {
  background: #1A1C1E;
  padding: 10px;
  gap: 12px;
}

.nav-btn {
  border-radius: var(--radius);
  font-size: 13px;
  border: 1px solid rgba(255,255,255,0.1);
}

.btn-qr { background: var(--accent); box-shadow: 0 4px 0 #BF360C; }
.btn-qr:active { transform: translateY(2px); box-shadow: none; }

.btn-dark { background: #37474F; }

/* モーダル */
.modal-header {
  background: var(--accent);
  border-bottom: 4px solid var(--sub);
}
</style>

</head>
<body>

<header>
  <div class="h-title">FAM 朝会モニター</div>
  <div class="h-clock" id="hClock">00:00:00</div>
</header>

<main class="main-grid">

  <div class="card area-attend">
    <div class="card-header">👥 出勤状況</div>
    <div class="card-body">
      <table>
        <thead>
          <tr>
            <th class="t-left">ライン名</th>
            <th>出/欠</th>
            <th>出勤率</th>
          </tr>
        </thead>
        <tbody id="mainAttendBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card area-prod">
    <div class="card-header">🏭 生産状況（昨日）</div>
    <div class="card-body">
      <table>
        <thead>
          <tr>
            <th class="t-left">ライン名</th>
            <th>実績/計画</th>
            <th>可動</th>
            <th>停止</th>
            <th>残業</th>
          </tr>
        </thead>
        <tbody id="mainProdBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card area-issue">
    <div class="card-header">⚠️ 遅れ・停止/不良</div>
    <div class="card-body">
      <table>
        <thead>
          <tr>
            <th class="t-left">内容</th>
            <th>停止</th>
            <th>状況</th>
            <th>上長</th>
          </tr>
        </thead>
        <tbody id="mainIssueBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card area-notice">
    <div class="card-header">📢 連絡事項</div>
    <div class="card-body">
      <table>
        <thead>
          <tr>
            <th class="t-left">内容</th>
            <th>発信元</th>
          </tr>
        </thead>
        <tbody id="mainNoticeBody"></tbody>
      </table>
    </div>
  </div>

</main>

<nav class="bottom-nav">
  <button class="nav-btn btn-qr" onclick="openModal('qr')">
    <span class="icon">📲</span>
    <span class="label">連携QR</span>
  </button>
  <button class="nav-btn btn-dark" onclick="openModal('attend')">
    <span class="icon">👥</span>
    <span class="label">出勤詳細</span>
  </button>
  <button class="nav-btn btn-dark" onclick="openModal('prod')">
    <span class="icon">🏭</span>
    <span class="label">生産詳細</span>
  </button>
  <button class="nav-btn btn-dark" onclick="openModal('issue')">
    <span class="icon">⚠️</span>
    <span class="label">遅れ詳細</span>
  </button>
</nav>

<div id="modalQR" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      📲 スマホ連携 QR
      <button onclick="closeModal('qr')">×</button>
    </div>
    <div class="modal-body">
      <div class="qr-grid">
        <div class="qr-btn-card qr-btn-view" onclick="genQR('全体閲覧ページ', 'https://example.com/fam_view')">
          <span class="icon">🖥️</span>
          <span class="label">全体閲覧ページ</span>
        </div>
        <div class="qr-btn-card qr-btn-attend" onclick="genQR('出勤状況入力', 'https://example.com/fam_attend')">
          <span class="icon">👥</span>
          <span class="label">出勤状況入力</span>
        </div>
        <div class="qr-btn-card qr-btn-contact" onclick="genQR('連絡事項入力', 'https://example.com/fam_contact')">
          <span class="icon">📢</span>
          <span class="label">連絡事項入力</span>
        </div>
        <div class="qr-btn-card qr-btn-react" onclick="genQR('遅れへのリアクション', 'https://example.com/fam_react')">
          <span class="icon">⚠️</span>
          <span class="label">遅れへのリアクション</span>
        </div>
      </div>
      <div class="qr-display" id="qrDisplay">
        <img id="qrImg" src="" alt="QRコード">
        <div class="qr-page-name" id="qrPageName"></div>
        <div class="qr-url" id="qrUrl"></div>
      </div>
    </div>
  </div>
</div>

<div id="modalAttend" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      👥 出勤詳細
      <button onclick="closeModal('attend')">×</button>
    </div>
    <div class="modal-body" id="modalAttendBody"></div>
  </div>
</div>

<div id="modalProd" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      🏭 生産詳細
      <button onclick="closeModal('prod')">×</button>
    </div>
    <div class="modal-body" id="modalProdBody"></div>
  </div>
</div>

<div id="modalIssue" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      ⚠️ 遅れ・停止/不良 詳細分析
      <button onclick="closeModal('issue')">×</button>
    </div>
    <div class="modal-body" id="modalIssueBody"></div>
  </div>
</div>

<script>
// ===== 認証情報（課長権限） =====
const CURRENT_USER = {
  role: '課長',
  roleStamp: '課',
  accessibleLines: ['ABライン', 'Cライン', '大型エンジン組立', '中型トランス組立']
};

// ===== サニタイズ ===== 
function esc(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"'`=\/]/g, s => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;',
    "'": '&#39;', '/': '&#x2F;', '`': '&#x60;', '=': '&#x3D;'
  }[s]));
}

// ===== データ ===== 
const DATA = {
  attend: [
    {
      line: 'ABライン',
      on: 22, total: 24, rate: 92,
      members: [
        { name: '山田 太郎', shift: '1直', status: '出勤', code: 'ok', monthly: { annual: 2, am: 0, pm: 1, late: 0, early: 1 } },
        { name: '佐藤 次郎', shift: '1直', status: '年休', code: 'ng', monthly: { annual: 3, am: 1, pm: 0, late: 1, early: 0 } },
        { name: '鈴木 花子', shift: '1直', status: 'AM半休', code: 'warn', monthly: { annual: 1, am: 2, pm: 0, late: 0, early: 2 } }
      ]
    },
    {
      line: 'Cライン',
      on: 16, total: 18, rate: 88,
      members: [
        { name: '田中 健一', shift: '1直', status: '出勤', code: 'ok', monthly: { annual: 2, am: 0, pm: 1, late: 0, early: 1 } },
        { name: '橋本 由美', shift: '1直', status: '出勤', code: 'ok', monthly: { annual: 0, am: 0, pm: 0, late: 0, early: 0 } }
      ]
    }
  ],
  prod: [
    {
      line: '大型エンジン組立',
      plan: 50, res: 48, rate: 88,
      operable: 88, stop: 25, overtime: 30,
      rounds: [
        { no: 1, time: '10:30', plan: 12, res: 12, progress: 100 },
        { no: 2, time: '14:15', plan: 13, res: 14, progress: 107 }
      ]
    },
    {
      line: '小型エンジン組立',
      plan: 150, res: 148, rate: 92,
      operable: 88, stop: 35, overtime: 70,
      rounds: [
        { no: 1, time: '10:30', plan: 40, res: 38, progress: 95 },
        { no: 2, time: '14:15', plan: 40, res: 42, progress: 105 }
      ]
    },
    {
      line: '中型トランス組立',
      plan: 72, res: 72, rate: 99,
      operable: 99, stop: 0, overtime: 0,
      rounds: [
        { no: 1, time: '10:30', plan: 24, res: 24, progress: 100 },
        { no: 2, time: '14:15', plan: 24, res: 24, progress: 100 }
      ]
    }
  ],
  issues: [
    {
      content: '設備故障（主軸モーター焼損）',
      detail: '搬送設備A0000-1にてローダー破損',
      action: 'ローダー交換により復旧',
      stop: 25,
      status: '継続中',
      statusCode: 'ng',
      category: 'Machine',
      comment: '保全手配済み。次回非稼働日に交換実施予定。',
      boss: '課'
    },
    {
      content: 'トルクレンチ較正期限切れ',
      detail: '全トルクレンチの較正期限が本月末',
      action: '全数較正完了。予備機と入れ替え済み。',
      stop: 0,
      status: '対応済',
      statusCode: 'ok',
      category: 'Method',

      boss: '工'
    },
    {
      content: 'コンベア異音発生',
      detail: 'U1ライン搬送コンベアベアリングから異音',

      stop: 12,

      boss: '工'
    },
    {
      content: '作業員一時不足',
      detail: 'ABライン作業員1名が体調不良で一時帰宅',
      action: '他ラインからの応援で対応。本日復帰予定。',
      stop: 8,

      stop: 0,
      status: '対応済',

    }
  ],
  notices: [
    { content: '夏季休暇期間中の設備点検計画書の提出について。各自エリアの再確認を実施すること。', from: '保全課' }
  ]
};

// ===== メイン描画 ===== 
function renderMain() {
  let aH = '', pH = '', iH = '', nH = '';
  
  DATA.attend.forEach(l => {
    aH += `<tr><td class="t-left">${esc(l.line)}</td><td>${l.on}/${l.total}</td><td>${l.rate}%</td></tr>`;
  });
  
  DATA.prod.forEach(l => {
    pH += `<tr><td class="t-left">${esc(l.line)}</td><td>${l.res}/${l.plan}</td><td>${l.operable}%</td><td>${l.stop}</td><td>${l.overtime}</td></tr>`;
  });
  
  DATA.issues.forEach(i => {
    const statusClass = i.statusCode === 'ok' ? 'badge-ok' : (i.statusCode === 'ng' ? 'badge-ng' : 'badge-warn');
    iH += `<tr><td class="t-left">${esc(i.content)}</td><td>${i.stop}</td><td><span class="badge ${statusClass}">${esc(i.status)}</span></td><td><span class="stamp">${esc(i.boss)}</span></td></tr>`;
  });
  
  DATA.notices.forEach(n => {
    nH += `<tr><td class="t-left">${esc(n.content)}</td><td>${esc(n.from)}</td></tr>`;
  });
  
  document.getElementById('mainAttendBody').innerHTML = aH;
  document.getElementById('mainProdBody').innerHTML = pH;
  document.getElementById('mainIssueBody').innerHTML = iH;
  document.getElementById('mainNoticeBody').innerHTML = nH;
}

// ===== モーダル制御 ===== 
function openModal(id) {
  const modalMap = {
    'qr': 'modalQR',
    'attend': 'modalAttend',
    'prod': 'modalProd',
    'issue': 'modalIssue'
  };
  
  if (id === 'attend') renderAttendDetail();
  if (id === 'prod') renderProdDetail();
  if (id === 'issue') renderIssueDetail();
  
  const modalEl = document.getElementById(modalMap[id]);
  if (modalEl) modalEl.classList.add('is-open');
}

function closeModal(id) {
  const modalMap = {
    'qr': 'modalQR',
    'attend': 'modalAttend',
    'prod': 'modalProd',
    'issue': 'modalIssue'
  };
  
  const modalEl = document.getElementById(modalMap[id]);
  if (modalEl) modalEl.classList.remove('is-open');
}

// ===== QR生成 ===== 
function genQR(name, url) {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(url)}&choe=UTF-8`;
  document.getElementById('qrImg').src = qrUrl;
  document.getElementById('qrPageName').textContent = name;
  document.getElementById('qrUrl').textContent = url;
  document.getElementById('qrDisplay').classList.add('is-visible');
}

// ===== 出勤詳細（2段ヘッダー） ===== 
function renderAttendDetail() {
  let html = '';
  
  DATA.attend.forEach(line => {
    html += '<div style="margin-bottom: 24px;">';
    html += '<div style="font-weight: 700; color: var(--accent); font-size: 14px; margin-bottom: 8px;">' + esc(line.line) + '</div>';
    
    html += '<table class="two-level-table">';
    html += '<thead>';
    html += '<tr class="header-row-1">';
    html += '<th class="t-left" rowspan="2">ライン</th>';
    html += '<th class="t-left" rowspan="2">氏名</th>';
    html += '<th class="t-left" rowspan="2">直</th>';
    html += '<th class="t-left" colspan="1">本日</th>';
    html += '<th class="monthly-label" colspan="5">◯月 累計</th>';
    html += '</tr>';
    html += '<tr class="header-row-2">';
    html += '<th class="t-left">現況</th>';
    html += '<th>年休</th>';
    html += '<th>AM<br>半休</th>';
    html += '<th>PM<br>半休</th>';
    html += '<th>遅刻</th>';
    html += '<th>早退</th>';
    html += '</tr>';
    html += '</thead>';
    html += '<tbody>';
    
    line.members.forEach(m => {
      const badgeClass = `badge-${m.code}`;
      html += '<tr>';
      html += '<td class="t-left">' + esc(line.line) + '</td>';
      html += '<td class="t-left">' + esc(m.name) + '</td>';
      html += '<td>' + esc(m.shift) + '</td>';
      html += '<td><span class="badge ' + badgeClass + '">' + esc(m.status) + '</span></td>';
      html += '<td>' + m.monthly.annual + '</td>';
      html += '<td>' + m.monthly.am + '</td>';
      html += '<td>' + m.monthly.pm + '</td>';
      html += '<td>' + m.monthly.late + '</td>';
      html += '<td>' + m.monthly.early + '</td>';
      html += '</tr>';
    });
    
    html += '</tbody></table>';
    html += '</div>';
  });
  
  document.getElementById('modalAttendBody').innerHTML = html;
}

// ===== 生産詳細（シンプルテーブル＋全ラウンド一括折りたたみ） ===== 
function renderProdDetail() {
  let html = '<table class="detail-table" style="margin-bottom: 24px;">';
  html += '<thead><tr>';
  html += '<th class="t-left">ライン</th>';
  html += '<th>計画</th>';
  html += '<th>実績</th>';
  html += '<th>進捗</th>';
  html += '<th>可動</th>';
  html += '<th>停止</th>';
  html += '<th>残業</th>';
  html += '</tr></thead><tbody>';
  
  DATA.prod.forEach(l => {
    const progress = Math.round((l.res / l.plan) * 100);
    const badgeClass = l.operable >= 95 ? 'badge-ok' : 'badge-warn';
    html += '<tr>';
    html += '<td class="t-left"><strong>' + esc(l.line) + '</strong></td>';
    html += '<td><strong>' + l.plan + '</strong></td>';
    html += '<td><strong>' + l.res + '</strong></td>';
    html += '<td>' + progress + '%</td>';
    html += '<td><span class="badge ' + badgeClass + '">' + l.operable + '%</span></td>';
    html += '<td>' + l.stop + '</td>';
    html += '<td>' + l.overtime + '</td>';
    html += '</tr>';
  });
  
  html += '</tbody></table>';
  
  // 全ラウンド一括折りたたみボタン
  html += '<div style="margin-bottom: 16px;">';
  html += '<button class="accordion-header" style="width: 100%; margin-bottom: 12px;" onclick="toggleAllRounds()"><span>ラウンド別実績</span><span class="accordion-toggle" id="roundsToggle">▶</span></button>';
  html += '</div>';
  
  html += '<div id="roundsContainer" class="accordion-content" style="margin-bottom: 0;">';
  
  DATA.prod.forEach((line, lineIdx) => {
    html += '<div style="margin-bottom: 20px;">';
    html += '<div style="font-weight: 700; color: var(--accent); font-size: 13px; margin-bottom: 8px;">' + esc(line.line) + '</div>';
    
    line.rounds.forEach((round, roundIdx) => {
      html += '<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 12px; background: #F5F5F5; border-radius: 6px; margin-bottom: 8px; font-size: 12px;">';
      html += '<div>';
      html += '  <span style="color: #666; font-weight: 600; display: block; margin-bottom: 4px;">ラウンド ' + round.no + ' (' + round.time + ')</span>';
      html += '  <span style="color: #999; font-size: 11px;">計画</span>';
      html += '  <br><strong style="font-size: 14px;">' + round.plan + '</strong>';
      html += '</div>';
      html += '<div>';
      html += '  <span style="color: #999; font-size: 11px;">実績</span>';
      html += '  <br><strong style="font-size: 14px;">' + round.res + '</strong>';
      html += '</div>';
      html += '<div>';
      html += '  <span style="color: #999; font-size: 11px;">進捗</span>';
      html += '  <br><strong style="font-size: 14px;">' + round.progress + '%</strong>';
      html += '</div>';
      html += '<div>';
      html += '  <span style="color: #999; font-size: 11px;">評価</span>';
      html += '  <br><span class="badge ' + (round.progress >= 100 ? 'badge-ok' : 'badge-warn') + '" style="font-size: 11px;">' + (round.progress >= 100 ? 'OK' : 'NG') + '</span>';
      html += '</div>';
      html += '</div>';
    });
    
    html += '</div>';
  });
  
  html += '</div>';
  
  document.getElementById('modalProdBody').innerHTML = html;
}

// ===== ラウンド一括折りたたみ ===== 
function toggleAllRounds() {
  const container = document.getElementById('roundsContainer');
  const toggle = document.getElementById('roundsToggle');
  
  if (container && toggle) {
    container.classList.toggle('open');
    toggle.textContent = container.classList.contains('open') ? '▼' : '▶';
  }
}



// ===== 遅れ詳細 ===== 
function renderIssueDetail() {
  let html = '<table class="detail-table">';
  html += '<thead><tr><th style="width: 60px;">区分</th><th class="t-left">内容</th><th class="t-left" style="width: 120px;">詳細</th><th class="t-left" style="width: 150px;">処置</th><th style="width: 50px;">停止</th><th style="width: 60px;">状況</th><th style="width: 50px;">上長</th><th class="t-left">コメント</th></tr></thead><tbody>';
  
  const categoryMap = {
    'Machine': '設備',
    'Method': '方法',
    'Material': '材料',
    'Man': '人員',
    '不良': '品質'
  };
  
  DATA.issues.forEach(i => {
    const statusClass = i.statusCode === 'ok' ? 'badge-ok' : (i.statusCode === 'ng' ? 'badge-ng' : 'badge-warn');
    html += '<tr>';
    html += '<td>' + esc(categoryMap[i.category] || i.category) + '</td>';
    html += '<td class="t-left">' + esc(i.content) + '</td>';
    html += '<td class="t-left" style="font-size: 12px;">' + esc(i.detail) + '</td>';
    html += '<td class="t-left" style="font-size: 12px;">' + esc(i.action) + '</td>';
    html += '<td>' + i.stop + '</td>';
    html += '<td><span class="badge ' + statusClass + '">' + esc(i.status) + '</span></td>';
    html += '<td><span class="stamp">' + esc(i.boss) + '</span></td>';
    html += '<td class="t-left" style="font-size: 12px;">' + esc(i.comment) + '</td>';
    html += '</tr>';
  });
  
  html += '</tbody></table>';
  
  document.getElementById('modalIssueBody').innerHTML = html;
}

// ===== 時計 ===== 
document.addEventListener('DOMContentLoaded', () => {
  setInterval(() => {
    const now = new Date();
    document.getElementById('hClock').textContent = now.toLocaleTimeString('ja-JP', { hour12: false });
  }, 1000);
  
  renderMain();
  
  document.querySelectorAll('.modal-overlay').forEach(modal => {
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        if (modal.id === 'modalQR') closeModal('qr');
        else if (modal.id === 'modalAttend') closeModal('attend');
        else if (modal.id === 'modalProd') closeModal('prod');
        else if (modal.id === 'modalIssue') closeModal('issue');
      }
    });
  });
});
</script>
