<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM 朝会モニター — ver6.1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ===== 基本設定 (ver6.0 継承) ===== */
:root {
  --bg: #F0F2F5;
  --panel: #FFFFFF;
  --accent: #B33F40;
  --teal: #45ADA8;
  --amber: #E9B44C;
  --text: #333333;
  --border: #DDDDDD;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  padding-bottom: 110px;
  overflow-x: hidden;
}

/* ===== ヘッダー ===== */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 70px;
  background: var(--panel); border-bottom: 2px solid var(--border);
}
.h-title { font-size: 22px; font-weight: 900; color: var(--accent); }
.h-clock {
  font-family: 'Share Tech Mono', monospace;
  font-size: 32px; font-weight: 700;
  color: var(--accent); letter-spacing: 2px;
}

/* ===== メインコンテンツ ===== */
.main-grid { display: grid; gap: 16px; padding: 16px; }
@media (orientation: landscape) { .main-grid { grid-template-columns: 4fr 6fr; } }
@media (orientation: portrait)  { .main-grid { grid-template-columns: 1fr; } }

.card {
  background: var(--panel); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}
.card-header {
  padding: 15px 20px; background: #fafafa;
  border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 17px;
}
.compact-body { padding: 15px; }

/* ===== サマリーテーブル ===== */
.summary-table { width: 100%; border-collapse: collapse; text-align: center; }
.summary-table th { background: #f8f8f8; font-size: 11px; color: #666; padding: 10px 5px; border-bottom: 2px solid var(--bg); }
.summary-table td { padding: 12px 5px; border-bottom: 1px solid var(--bg); font-size: 15px; }
.line-label { text-align: left; font-weight: 700; padding-left: 10px !important; }

/* ===== 改修：生産詳細モーダル内の行列入れ替えテーブル ===== */
.detail-table-container { overflow-x: auto; margin-bottom: 20px; border-radius: 8px; border: 1px solid #eee; }
.detail-table-horizontal { width: 100%; border-collapse: collapse; min-width: 500px; }
.detail-table-horizontal th { background: #f0f0f0; padding: 12px 8px; font-size: 12px; border-bottom: 2px solid #ddd; color: #555; }
.detail-table-horizontal td { padding: 14px 8px; border-bottom: 1px solid #eee; font-size: 16px; text-align: center; }
.detail-table-horizontal .line-name { text-align: left; font-weight: 700; background: #fafafa; padding-left: 15px; }

/* ===== ラウンド詳細 (ver6.0 デザイン) ===== */
.line-card { border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; background: #fff; }
.round-toggle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
.round-btn {
  padding: 8px 4px; border: 1px solid var(--border); border-radius: 8px;
  background: #fff; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s;
}
.round-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.round-panel { display: none; margin-top: 10px; padding: 12px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; font-size: 13px; }
.round-panel.is-open { display: block; animation: fadeIn 0.3s; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== ステータス表示 ===== */
.status-badge { padding: 4px 8px; border-radius: 6px; font-weight: 700; color: #fff; font-size: 11px; }
.status-badge.ok { background: var(--teal); }
.status-badge.ng { background: var(--accent); }

/* ===== 操作パネル (ver6.0 継承) ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
  background: rgba(255,255,255,0.98); border-top: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 12px; z-index: 9999;
}
.nav-btn {
  flex: 1; max-width: 170px; height: 55px; border: none; border-radius: 12px;
  font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.btn-qr { background: var(--accent); color: #fff; }
.btn-detail { background: #3a3a3a; color: #fff; }
.nav-btn:active { transform: scale(0.95); opacity: 0.8; }

/* ===== モーダル設定 (ver6.0 継承) ===== */
.modal-overlay {
  visibility: hidden; opacity: 0; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.82); z-index: 10000; display: flex; align-items: center; justify-content: center;
  transition: 0.2s;
}
.modal-overlay.is-open { visibility: visible; opacity: 1; }
.modal-content {
  background: #fff; width: 95%; max-width: 800px; border-radius: var(--radius); padding: 24px;
  position: relative; max-height: 85vh; overflow-y: auto;
}
.modal-close { position: absolute; top: 10px; right: 15px; font-size: 34px; cursor: pointer; color: #999; border: none; background: none; }
.modal-title { font-size: 18px; font-weight: 700; border-left: 5px solid var(--accent); padding-left: 12px; margin-bottom: 20px; }
</style>
</head>

<body>

<header>
  <div class="h-title">FAM 朝会モニター</div>
  <div class="h-clock" id="hClock">00:00:00</div>
</header>

<main class="main-grid">
  <div class="card">
    <div class="card-header">👥 出勤状況</div>
    <div class="compact-body">
      <table class="summary-table">
        <thead><tr><th class="line-label">ライン</th><th>人員</th><th>出勤率</th><th>判定</th></tr></thead>
        <tbody>
          <tr><td class="line-label">大型エンジン</td><td><strong>22/24</strong></td><td>92%</td><td style="color:var(--teal)">◎</td></tr>
          <tr><td class="line-label">中型トランス</td><td><strong>16/18</strong></td><td style="color:var(--accent)">88%</td><td style="color:var(--amber)">△</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">🏭 生産実績（昨日）</div>
    <div class="compact-body">
      <table class="summary-table">
        <thead><tr><th class="line-label">ライン名</th><th>計画</th><th>実績</th><th>差分</th><th>稼働率</th></tr></thead>
        <tbody id="prodSummaryBody"></tbody>
      </table>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn btn-qr" id="btnQR">📲 連携QR</button>
  <button class="nav-btn btn-detail" id="btnAttend">👥 出勤詳細</button>
  <button class="nav-btn btn-detail" id="btnProd">🏭 生産詳細</button>
</nav>

<div id="modalProd" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" id="closeProd">×</button>
    <div class="modal-title">🏭 生産実績詳細分析</div>
    
    <div style="font-weight:700; font-size:14px; margin-bottom:10px; color:#666;">【基本情報】</div>
    <div class="detail-table-container">
      <table class="detail-table-horizontal">
        <thead>
          <tr>
            <th style="text-align:left; padding-left:15px;">ライン名</th>
            <th>計画 (台)</th>
            <th>実績 (台)</th>
            <th>差分 (台)</th>
            <th>稼働率 (%)</th>
          </tr>
        </thead>
        <tbody id="prodDetailBasicBody">
          </tbody>
      </table>
    </div>

    <div style="font-weight:700; font-size:14px; margin-bottom:10px; color:#666;">【ラウンド別進捗】</div>
    <div id="prodDetailRoundBody"></div>
  </div>
</div>

<div id="modalQR" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" id="closeQR">×</button>
    <div class="modal-title">📲 スマホ連携QR</div>
    <div style="text-align:center; padding:30px; background:#f9f9f9; border-radius:12px; border:1px dashed #ccc;">
      <p style="color:#999;">[QRコードスキャンエリア]</p>
      <p style="font-size:12px; margin-top:10px;">実績入力・閲覧用URLへアクセス</p>
    </div>
  </div>
</div>

<div id="modalAttend" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" id="closeAttend">×</button>
    <div class="modal-title">👥 出勤状況詳細</div>
    <div id="attendDetailBody"></div>
  </div>
</div>

<script>
/* ================================================================
   データ・ロジック
   ================================================================ */
const PROD_DATA = {
  lines: [
    { 
      name: '大型エンジン組付け', plan: 50, result: 52, diff: 2, rate: 104,
      rounds: [
        { no: 1, time: '10:30', p: 12, r: 12, c: 12 },
        { no: 2, time: '14:15', p: 13, r: 14, c: 26 },
        { no: 3, time: '16:45', p: 12, r: 13, c: 39 },
        { no: 4, time: '19:00', p: 13, r: 13, c: 52 }
      ]
    },
    { 
      name: '中型トランス組付け', plan: 72, result: 61, diff: -11, rate: 84,
      rounds: [
        { no: 1, time: '10:30', p: 18, r: 18, c: 18 },
        { no: 2, time: '14:15', p: 18, r: 7, c: 25 },
        { no: 3, time: '16:45', p: 18, r: 18, c: 43 },
        { no: 4, time: '19:00', p: 18, r: 18, c: 61 }
      ]
    }
  ]
};

document.addEventListener('DOMContentLoaded', function () {
  
  // 1. 時計更新 (ver6.0 準拠)
  function updateClock() {
    const n = new Date();
    document.getElementById('hClock').textContent = 
      String(n.getHours()).padStart(2,'0') + ':' + 
      String(n.getMinutes()).padStart(2,'0') + ':' + 
      String(n.getSeconds()).padStart(2,'0');
  }
  setInterval(updateClock, 1000); updateClock();

  // 2. メイン画面のサマリー表示
  function renderMainSummary() {
    let html = '';
    PROD_DATA.lines.forEach(line => {
      const color = line.diff >= 0 ? 'var(--teal)' : 'var(--accent)';
      html += `<tr>
        <td class="line-label">${line.name}</td>
        <td>${line.plan}</td>
        <td style="font-weight:bold;">${line.result}</td>
        <td style="color:${color}; font-weight:bold;">${line.diff>=0?'+':''}${line.diff}</td>
        <td><span class="status-badge ${line.rate>=90?'ok':'ng'}">${line.rate}%</span></td>
      </tr>`;
    });
    document.getElementById('prodSummaryBody').innerHTML = html;
  }
  renderMainSummary();

  // 3. 【最重要】生産詳細モーダルのレンダリング (行列入れ替え)
  window.renderProdDetail = function() {
    // --- A. 基本情報テーブル (横並び形式) ---
    let basicHtml = '';
    PROD_DATA.lines.forEach(line => {
      const diffColor = line.diff >= 0 ? 'var(--teal)' : 'var(--accent)';
      basicHtml += `
        <tr>
          <td class="line-name">${line.name}</td>
          <td>${line.plan}</td>
          <td style="font-weight:700;">${line.result}</td>
          <td style="color:${diffColor}; font-weight:700;">${line.diff >= 0 ? '+' : ''}${line.diff}</td>
          <td><span class="status-badge ${line.rate >= 90 ? 'ok' : 'ng'}">${line.rate}%</span></td>
        </tr>`;
    });
    document.getElementById('prodDetailBasicBody').innerHTML = basicHtml;

    // --- B. ラウンド詳細 (ver6.0 継承) ---
    let roundHtml = '';
    PROD_DATA.lines.forEach((line, lIdx) => {
      roundHtml += `<div class="line-card">
        <div style="font-weight:900; color:var(--accent); font-size:15px; border-bottom:1px solid #eee; padding-bottom:5px;">${line.name}</div>
        <div class="round-toggle-grid">`;
      line.rounds.forEach((r, rIdx) => {
        roundHtml += `<button class="round-btn" data-target="panel-${lIdx}-${rIdx}">R${r.no}<br>${r.time}</button>`;
      });
      roundHtml += `</div>`;
      line.rounds.forEach((r, rIdx) => {
        roundHtml += `
          <div id="panel-${lIdx}-${rIdx}" class="round-panel">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
              <span>計画: <strong>${r.p}</strong></span>
              <span>実績: <strong>${r.r}</strong></span>
              <span>累計: <strong style="color:var(--accent)">${r.c}</strong></span>
            </div>
            <div style="height:6px; background:#ddd; border-radius:3px; overflow:hidden;">
              <div style="width:${(r.r/r.p)*100}%; height:100%; background:var(--teal);"></div>
            </div>
          </div>`;
      });
      roundHtml += `</div>`;
    });
    document.getElementById('prodDetailRoundBody').innerHTML = roundHtml;

    // ラウンドボタンのイベント登録
    document.querySelectorAll('.round-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const targetId = this.getAttribute('data-target');
        const parent = this.closest('.line-card');
        
        // 同じカード内の他のパネルを閉じる
        parent.querySelectorAll('.round-panel').forEach(p => p.classList.remove('is-open'));
        parent.querySelectorAll('.round-btn').forEach(b => b.classList.remove('active'));
        
        // クリックされたものを開く
        document.getElementById(targetId).classList.add('is-open');
        this.classList.add('active');
      });
    });
  };

  // 4. モーダル操作
  const openModal = (id) => document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('is-open');
  const closeModal = (id) => document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.remove('is-open');

  document.getElementById('btnProd').onclick = () => { renderProdDetail(); openModal('prod'); };
  document.getElementById('btnAttend').onclick = () => openModal('attend');
  document.getElementById('btnQR').onclick = () => openModal('qr');

  document.getElementById('closeProd').onclick = () => closeModal('prod');
  document.getElementById('closeAttend').onclick = () => closeModal('attend');
  document.getElementById('closeQR').onclick = () => closeModal('qr');
});
</script>
</body>
</html>
