<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM 朝会モニター — ver6.1 (行列入替版)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ===== 基本設定 (ver6.0 継承) ===== */
:root {
  --bg: #F0F2F5;
  --panel: #FFFFFF;
  --accent: #B33F40;
  --teal: #45ADA8;
  --amber: #E9B44C;
  --text: #333333;
  --border: #DDDDDD;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  padding-bottom: 110px;
  overflow-x: hidden;
}

/* ===== ヘッダー ===== */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 70px;
  background: var(--panel); border-bottom: 2px solid var(--border);
}
.h-title { font-size: 22px; font-weight: 900; color: var(--accent); }
.h-clock {
  font-family: 'Share Tech Mono', monospace;
  font-size: 32px; font-weight: 700;
  color: var(--accent); letter-spacing: 2px;
}

/* ===== メイングリッド (ver6.0 継承) ===== */
.main-grid { display: grid; gap: 16px; padding: 16px; }
@media (orientation: landscape) { .main-grid { grid-template-columns: 4fr 6fr; } }
@media (orientation: portrait)  { .main-grid { grid-template-columns: 1fr; } }

/* ===== カード ===== */
.card {
  background: var(--panel); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}
.card-header {
  padding: 15px 20px; background: #fafafa;
  border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 17px;
}
.compact-body { padding: 15px; }

/* ===== 修正箇所：行列入れ替えテーブル ===== */
.summary-table { width: 100%; border-collapse: collapse; text-align: center; }
.summary-table th { background: #f8f8f8; font-size: 11px; color: #666; padding: 10px 5px; border-bottom: 2px solid var(--bg); }
.summary-table td { padding: 12px 5px; border-bottom: 1px solid var(--bg); font-size: 15px; }
.line-name-col { text-align: left; font-weight: 700; padding-left: 10px !important; width: 35%; }

/* ===== ステータス表示 ===== */
.status-badge { padding: 4px 8px; border-radius: 6px; font-weight: 700; color: #fff; font-size: 11px; }
.status-badge.ok { background: var(--teal); }
.status-badge.ng { background: var(--accent); }

/* ===== 操作パネル (ver6.0 継承) ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
  background: rgba(255,255,255,0.98); border-top: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 12px; z-index: 9999;
}
.nav-btn {
  flex: 1; max-width: 170px; height: 55px; border: none; border-radius: 12px;
  font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.15s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.btn-qr { background: var(--accent); color: #fff; }
.btn-detail { background: #3a3a3a; color: #fff; }
.nav-btn:active { transform: scale(0.95); opacity: 0.8; }

/* ===== モーダル (ver6.0 継承) ===== */
.modal-overlay {
  visibility: hidden; opacity: 0; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.82); z-index: 10000; display: flex; align-items: center; justify-content: center;
  transition: 0.2s;
}
.modal-overlay.is-open { visibility: visible; opacity: 1; }
.modal-content {
  background: #fff; width: 92%; max-width: 650px; border-radius: var(--radius); padding: 24px;
  position: relative; max-height: 82vh; overflow-y: auto;
}
.modal-close { position: absolute; top: 12px; right: 15px; font-size: 34px; cursor: pointer; color: #999; border: none; background: none; }
</style>
</head>

<body>

<header>
  <div class="h-title">FAM 朝会モニター</div>
  <div class="h-clock" id="hClock">00:00:00</div>
</header>

<main class="main-grid">
  <div class="card">
    <div class="card-header">👥 出勤状況</div>
    <div class="compact-body">
      <table class="summary-table">
        <thead><tr><th style="text-align:left; padding-left:10px;">ライン</th><th>人員</th><th>出勤率</th><th>判定</th></tr></thead>
        <tbody>
          <tr><td class="line-name-col">ABライン</td><td><strong>22/24</strong></td><td>92%</td><td style="color:var(--teal)">◎</td></tr>
          <tr><td class="line-name-col">Cライン</td><td><strong>16/18</strong></td><td style="color:var(--accent)">88%</td><td style="color:var(--amber)">△</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">🏭 生産実績（昨日）</div>
    <div class="compact-body">
      <table class="summary-table">
        <thead>
          <tr>
            <th class="line-name-col">ライン名</th>
            <th>計画</th>
            <th>実績</th>
            <th>差分</th>
            <th>稼働率</th>
          </tr>
        </thead>
        <tbody id="prodSummaryBody">
          </tbody>
      </table>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn btn-qr" onclick="openM('qr')">📲 連携QR</button>
  <button class="nav-btn btn-detail" id="btnProd">🏭 生産詳細</button>
</nav>

<div id="modalQR" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" onclick="closeM('qr')">×</button>
    <h2 style="font-size:18px; margin-bottom:15px; border-left:5px solid var(--accent); padding-left:10px;">📲 スマホ連携QR</h2>
    <div style="text-align:center; padding:20px; background:#f9f9f9; border-radius:12px; color:#999;">[QRコード表示エリア]</div>
  </div>
</div>

<div id="modalProd" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" onclick="closeM('prod')">×</button>
    <h2 style="font-size:18px; margin-bottom:15px; border-left:5px solid var(--accent); padding-left:10px;">🏭 生産実績詳細</h2>
    <div id="prodDetailBody"></div>
  </div>
</div>

<script>
/* ================================================================
   1. データ定義 (ver6.0準拠)
   ================================================================ */
const PROD_DATA = {
  lines: [
    { name: '大型エンジン', plan: 100, result: 85, diff: -15, rate: 85 },
    { name: '中型トランス', plan: 150, result: 155, diff: 5, rate: 103 }
  ]
};

document.addEventListener('DOMContentLoaded', function () {
  
  /* ---- 時計更新 ---- */
  function updateClock() {
    const n = new Date();
    const clockEl = document.getElementById('hClock');
    if (clockEl) {
      clockEl.textContent = 
        String(n.getHours()).padStart(2,'0') + ':' + 
        String(n.getMinutes()).padStart(2,'0') + ':' + 
        String(n.getSeconds()).padStart(2,'0');
    }
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ---- サマリー表示 (行列入れ替えロジック) ---- */
  function renderSummary() {
    var html = '';
    PROD_DATA.lines.forEach(function(line) {
      var diffCol = line.diff >= 0 ? 'var(--teal)' : 'var(--accent)';
      html += '<tr>' +
        '<td class="line-name-col">' + line.name + '</td>' +
        '<td>' + line.plan + '</td>' +
        '<td style="font-weight:bold;">' + line.result + '</td>' +
        '<td style="color:' + diffCol + '; font-weight:bold;">' + (line.diff>=0?'+':'') + line.diff + '</td>' +
        '<td><span class="status-badge ' + (line.rate>=95?'ok':'ng') + '">' + line.rate + '%</span></td>' +
      '</tr>';
    });
    document.getElementById('prodSummaryBody').innerHTML = html;
  }
  renderSummary();

  /* ---- モーダル制御 ---- */
  window.openM = function(id) {
    document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('is-open');
  };
  window.closeM = function(id) {
    document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.remove('is-open');
  };

  document.getElementById('btnProd').addEventListener('click', function() {
    openM('prod');
  });
});
</script>
</body>
</html>
