<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM 入力 v15.4</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
  --header-h: 12vh;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100vh; width: 100vw; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--dark); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ヘッダー：タイトルと時計のみに簡素化 */
header { flex: 0 0 var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; background: #fff; border-bottom: 4px solid var(--accent); z-index: 1000; }
.h-clock { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; color: var(--accent); }

main { flex: 1; display: flex; padding: 8px; gap: 8px; height: calc(100vh - var(--header-h)); }
.col-left { flex: 0 0 42%; display: flex; flex-direction: column; gap: 8px; }
.col-right { flex: 1; display: flex; flex-direction: column; }
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; height: 100%; }
.card-header { padding: 6px 12px; background: #fafafa; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* 実績入力カード内 下部情報配置エリア */
.card-footer-info { margin-top: auto; padding-top: 10px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }

/* 旧ヘッダー要素のスタイルをカード内に適応 */
.rd-group { display: flex; gap: 1.5vw; align-items: center; justify-content: center; }
.rd-icon { font-family: 'Share Tech Mono'; font-weight: 900; transition: all 0.3s; color: #ccc; font-size: 1rem; }
.rd-icon.active { color: var(--accent); font-size: 1.8rem; transform: scale(1.1); }
.total-item { background: #f0f0f0; padding: 8px; border-radius: 4px; border-left: 4px solid var(--dark); text-align: center; }
.total-val-box { font-family: 'Share Tech Mono'; font-size: 1.5rem; font-weight: 700; }
.total-label { font-size: 0.7rem; font-weight: 900; color: #666; display: block; margin-bottom: 2px; }

/* タイムライン表示関連 */
.tl-label-row { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: 900; font-size: 0.8rem; color: #666; background: #fdfdfd; border-bottom: 1px solid #eee; }
.tl-label-left { color: var(--safe); }
.tl-label-right { color: var(--accent); }
.timeline-scroll-area { flex: 1; overflow-y: auto; padding: 20px 0; position: relative; }
#timeline-container { position: relative; width: 100%; min-height: 100%; }
#timeline-container::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ddd; transform: translateX(-50%); z-index: 0; }
.tl-row { display: flex; width: 100%; margin-bottom: 20px; position: relative; z-index: 1; align-items: center; cursor: pointer; }
.tl-item { width: 45%; display: flex; align-items: center; gap: 8px; }
.tl-left { justify-content: flex-end; padding-right: 5px; text-align: right; }
.tl-right { justify-content: flex-start; padding-left: 5px; text-align: left; margin-left: 55%; }
.tl-dot { width: 12px; height: 12px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
.tl-time { font-family: 'Share Tech Mono'; font-weight: 900; font-size: 0.9rem; }
.tl-content { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; color: #fff; margin-left: 5px; }
.st-stop { background: var(--accent); }
.st-ongoing { background: #FFA000; }
.st-done { background: var(--safe); }

/* モーダル (v15.2の仕様を維持) */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-content { background: #fff; width: 95vw; max-width: 1000px; height: 90vh; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; border-top: 8px solid var(--accent); }
.modal-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
.btn-toggle { flex: 1; padding: 15px; border-radius: 10px; border: 3px solid #ddd; background: #f9f9f9; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }
.text-inp { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; font-weight: 700; }
.btn { padding: 1.5vh 0; border: none; border-radius: 10px; font-weight: 900; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }

/* 時刻スピナー */
#time-section { display: block; background: #f8f9fa; padding: 10px; border-radius: 12px; border: 1px solid #ddd; }
.time-spinner-container { display: flex; align-items: center; justify-content: center; gap: 5px; }
.spinner-unit { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.spin-btn { background: #fff; border: 2px solid #ccc; width: 80px; height: 50px; font-size: 1.8rem; font-weight: 900; color: var(--dark); border-radius: 8px; }
.spin-val { font-family: 'Share Tech Mono'; font-size: 2.5rem; font-weight: 700; width: 80px; text-align: center; }
.time-range-sep { font-size: 2rem; margin: 0 20px; color: #999; }

/* M4区分 & クイック入力 */
.m4-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.m4-chip { padding: 12px 5px; background: #eee; border-radius: 10px; font-size: 0.85rem; font-weight: 900; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; border: 2px solid transparent; }
.m4-chip.active { background: var(--dark); color: #fff; border-color: var(--dark); }
.input-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.btn-quick { padding: 12px 8px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.9rem; font-weight: 700; text-align: left; }

.modal-footer { padding: 15px; display: flex; gap: 15px; border-top: 1px solid #eee; }
.btn-submit { background: var(--accent); color: #fff; flex: 2; font-size: 1.2rem; }
.btn-cancel { background: #888; color: #fff; flex: 1; font-size: 1.2rem; }
</style>
</head>
<body>

<header>
  <div class="h-left"><div class="h-title">FAM-PM <small>INPUT</small></div></div>
  <div class="h-right"><div class="h-clock" id="live-clock">00:00:00</div></div>
</header>

<main>
  <div class="col-left">
    <section class="card">
      <div class="card-header"><i data-lucide="edit-3" size="14"></i>実績入力</div>
      <div class="card-body">
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:10px;">
          <button class="btn" style="width:8vh;height:8vh;font-size:2.5rem;background:#eee;" onclick="changeVal(-1)">-</button>
          <div style="font-family:'Share Tech Mono'; font-size:4rem; font-weight:700; color:var(--accent);" id="disp-act">0</div>
          <button class="btn" style="width:8vh;height:8vh;font-size:2.5rem;background:#eee;" onclick="changeVal(1)">+</button>
        </div>
        
        <div style="display:flex; gap:10px; margin-bottom:15px;">
          <button class="btn" style="flex:1; background:var(--accent); color:#fff;" onclick="alert('保存')">登録</button>
          <button class="btn" style="flex:1; background:var(--dark); color:#fff;" onclick="openRegModal()">変化点</button>
        </div>

        <div class="card-footer-info">
          <div id="rd-display-area" class="rd-group"></div>
          <div class="total-item">
            <span class="total-label">LINE TOTAL (ACTUAL / PLAN)</span>
            <div class="total-val-box"><span id="total-act">562</span> / <span id="total-plan" style="color:#888">584</span></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <div class="col-right">
    <section class="card">
      <div class="card-header"><i data-lucide="clock" size="14"></i>変化点タイムライン</div>
      <div class="tl-label-row">
        <div class="tl-label-left">← 停止なし</div>
        <div class="tl-label-right">停止あり →</div>
      </div>
      <div class="card-body">
        <div class="timeline-scroll-area">
          <div id="timeline-container"></div>
        </div>
      </div>
    </section>
  </div>
</main>

<div id="regModal" class="modal-overlay">
  <div class="modal-content">
    <div class="card-header">変化点入力 / CHANGE POINT</div>
    <div class="modal-body">
      <div style="display:flex; gap:10px;">
        <button id="reg-stop-on" class="btn-toggle active" onclick="toggleRegStop(true)">⚠️ 停止あり</button>
        <button id="reg-stop-off" class="btn-toggle" onclick="toggleRegStop(false)">✅ 停止なし</button>
      </div>
      <div id="time-section">
        <div class="time-spinner-container">
          <div class="spinner-unit"><button class="spin-btn" onclick="spin('sh',1)">△</button><div class="spin-val" id="sh">08</div><button class="spin-btn" onclick="spin('sh',-1)">▽</button></div>
          <div style="font-size:2rem; font-weight:900;">:</div>
          <div class="spinner-unit"><button class="spin-btn" onclick="spin('sm',1)">△</button><div class="spin-val" id="sm">35</div><button class="spin-btn" onclick="spin('sm',-1)">▽</button></div>
          <div class="time-range-sep">〜</div>
          <div class="spinner-unit"><button class="spin-btn" onclick="spin('eh',1)">△</button><div class="spin-val" id="eh">--</div><button class="spin-btn" onclick="spin('eh',-1)">▽</button></div>
          <div style="font-size:2rem; font-weight:900;">:</div>
          <div class="spinner-unit"><button class="spin-btn" onclick="spin('em',1)">△</button><div class="spin-val" id="em">--</div><button class="spin-btn" onclick="spin('em',-1)">▽</button></div>
        </div>
      </div>
      <div class="m4-grid">
        <div class="m4-chip active" data-icon="user" data-m4="人" onclick="selM4(this)"><i data-lucide="user"></i>人</div>
        <div class="m4-chip" data-icon="settings" data-m4="設備" onclick="selM4(this)"><i data-lucide="settings"></i>設備</div>
        <div class="m4-chip" data-icon="package" data-m4="材料" onclick="selM4(this)"><i data-lucide="package"></i>材料</div>
        <div class="m4-chip" data-icon="info" data-m4="方法" onclick="selM4(this)"><i data-lucide="info"></i>方法</div>
        <div class="m4-chip" data-icon="alert-triangle" data-m4="不良品" onclick="selM4(this)"><i data-lucide="alert-triangle"></i>不良品</div>
        <div class="m4-chip" data-icon="log-in" data-m4="投入" onclick="selM4(this)"><i data-lucide="log-in"></i>投入</div>
        <div class="m4-chip" data-icon="log-out" data-m4="下車" onclick="selM4(this)"><i data-lucide="log-out"></i>下車</div>
      </div>
      <div class="input-columns">
        <div>
          <div class="quick-grid">
            <button class="btn-quick" onclick="setVal('reg-title','チョコ停')">チョコ停</button>
            <button class="btn-quick" onclick="setVal('reg-title','刃具交換')">刃具交換</button>
            <button class="btn-quick" onclick="setVal('reg-title','初物確認')">初物確認</button>
            <button class="btn-quick" onclick="setVal('reg-title','清掃点検')">清掃点検</button>
          </div>
          <input type="text" id="reg-title" class="text-inp" placeholder="内容入力">
        </div>
        <div>
          <div class="quick-grid">
            <button class="btn-quick" onclick="setVal('reg-action','再起動実施')">再起動実施</button>
            <button class="btn-quick" onclick="setVal('reg-action','リーダー報告')">リーダー報告</button>
            <button class="btn-quick" onclick="setVal('reg-action','基準値内確認')">基準値内確認</button>
            <button class="btn-quick" onclick="setVal('reg-action','清掃完了')">清掃完了</button>
          </div>
          <input type="text" id="reg-action" class="text-inp" placeholder="処置内容">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-main btn-cancel" onclick="closeModal('regModal')">キャンセル</button>
      <button class="btn-main btn-submit" onclick="saveNewIssue()">変化点を登録</button>
    </div>
  </div>
</div>

<script>
let curAct = 0;
let issues = [
  { id: 1, time: "08:15", icon: "user", title: "応援投入", action: "リーダーより1名配置", stop: false, status: "対応済み", m4: "人" },
  { id: 2, time: "09:10", icon: "settings", title: "刃具折損", action: "予備に交換中", stop: true, status: "停止中", m4: "設備" }
];
let regHasStop = true;

function renderTimeline() {
  issues.sort((a,b) => a.time.localeCompare(b.time));
  const container = document.getElementById('timeline-container');
  container.innerHTML = issues.map(i => {
    const sideClass = i.stop ? 'tl-right' : 'tl-left';
    const statusClass = i.status==='停止中'?'st-stop':(i.status==='継続中'?'st-ongoing':'st-done');
    return `
      <div class="tl-row" onclick="alert('詳細表示')">
        <div class="tl-dot" style="border-color: ${i.stop ? 'var(--accent)' : 'var(--safe)'}"></div>
        <div class="tl-item ${sideClass}">
          <span class="tl-time">${i.time}</span>
          <span class="tl-icon"><i data-lucide="${i.icon}" size="16"></i></span>
          <span class="tl-content">${i.title}<span class="status-badge ${statusClass}">${i.status}</span></span>
        </div>
      </div>
    `;
  }).join('');
  lucide.createIcons();
}

function openRegModal() {
  const now = new Date();
  document.getElementById('sh').innerText = now.getHours().toString().padStart(2, '0');
  document.getElementById('sm').innerText = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('regModal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleRegStop(s) {
  regHasStop = s;
  document.getElementById('reg-stop-on').classList.toggle('active', s);
  document.getElementById('reg-stop-off').classList.toggle('active', !s);
  document.getElementById('time-section').style.display = s ? 'block' : 'none';
}

function spin(id, delta) {
  const el = document.getElementById(id);
  let v = (el.innerText === "--") ? 0 : parseInt(el.innerText);
  if (id.includes('h')) v = (v + delta + 24) % 24; else v = (v + delta + 60) % 60;
  el.innerText = v.toString().padStart(2, '0');
}

function selM4(el) {
  document.querySelectorAll('.m4-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function setVal(id, v) { document.getElementById(id).value = v; }

function saveNewIssue() {
  const title = document.getElementById('reg-title').value || "新規変化点";
  const action = document.getElementById('reg-action').value || "";
  const icon = document.querySelector('.m4-chip.active').dataset.icon;
  const m4 = document.querySelector('.m4-chip.active').dataset.m4;
  const time = `${document.getElementById('sh').innerText}:${document.getElementById('sm').innerText}`;
  issues.push({ id: Date.now(), time, icon, title, action, stop: regHasStop, status: regHasStop ? "停止中" : "対応済み", m4 });
  renderTimeline(); closeModal('regModal');
}

function changeVal(n) { curAct += n; document.getElementById('disp-act').innerText = Math.max(0, curAct); }

setInterval(() => {
  const now = new Date();
  document.getElementById('live-clock').innerText = now.toLocaleTimeString('ja-JP', { hour12: false });
}, 1000);

document.addEventListener('DOMContentLoaded', () => {
  renderTimeline();
  document.getElementById('rd-display-area').innerHTML = '<span style="color:#ddd">・・</span><span class="rd-icon active">1rd</span><span class="rd-icon side">2rd</span><span class="rd-icon side">3rd</span><span style="color:#ddd">・</span>';
});
</script>
</body>
</html>
