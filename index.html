<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM 朝会モニター — ver7.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ===== 基本設定 ===== */
:root {
  --bg: #F0F2F5;
  --panel: #FFFFFF;
  --accent: #B33F40;
  --teal: #45ADA8;
  --amber: #E9B44C;
  --text: #333333;
  --border: #DDDDDD;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  padding: 20px;
}

/* ===== メインカード ===== */
.card {
  background: var(--panel);
  border-radius: var(--radius);
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}
h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; color: var(--accent); }

/* ===== ボタン ===== */
.btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
button.main-btn {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}
button.main-btn:hover { opacity: 0.8; }

/* ===== モーダル設定 ===== */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center;
  z-index: 1000;
}
.modal-overlay.is-active { display: flex; }
.modal-content {
  background: white; width: 95%; max-width: 600px; max-height: 85vh;
  border-radius: var(--radius);
  position: relative; overflow-y: auto; padding: 20px;
}
.modal-close {
  position: sticky; top: 0; float: right; background: none; border: none;
  font-size: 24px; cursor: pointer; color: #999;
}

/* ===== テーブルスタイル ===== */
.detail-table {
  width: 100%; border-collapse: collapse; margin-top: 10px;
}
.detail-table th, .detail-table td {
  border: 1px solid #EEE; padding: 10px; text-align: center;
}
.detail-table th { background: #F8F9FA; font-size: 12px; font-weight: 600; }

/* ===== ラウンド詳細パネル ===== */
.round-detail-panel {
  display: none; overflow: hidden; transition: 0.3s;
}
.round-detail-panel.is-open { display: block; }

.status-badge {
  padding: 2px 8px; border-radius: 4px; font-weight: bold; color: white;
}
.status-badge.ok { background: var(--teal); }
.status-badge.ng { background: var(--accent); }
</style>
</head>
<body>

<div class="card">
  <h1>FAM 朝会モニター</h1>
  <div class="btn-group">
    <button class="main-btn" id="btnProd">生産実績 詳細</button>
  </div>
  <p style="text-align:center; font-size: 12px; color: #666;">※ボタンを押すと、昨日実績の振り返り画面が開きます</p>
</div>

<div class="modal-overlay" id="modalProd">
  <div class="modal-content">
    <button class="modal-close" id="closeProd">&times;</button>
    <h2 style="font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 8px;">👤 昨日実績の振り返り分析</h2>
    <div id="prodBody"></div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  /* ---- 設定データ ---- */
  const PROD_DATA = {
    lines: [
      {
        name: "大型エンジン",
        vehicle: "トラック用A",
        plan: 100, result: 85, diff: -15, rate: 85,
        rounds: [
          { no: 1, plan: 25, result: 25 }, { no: 2, plan: 25, result: 23 },
          { no: 3, plan: 25, result: 15 }, { no: 4, plan: 25, result: 22 }
        ],
        analysis: {
          why: "Machine: 第2工程センサー不調による停止(20分)",
          today: "🔧 修理完了。通常稼働。"
        }
      },
      {
        name: "中型トランス",
        vehicle: "乗用車用B",
        plan: 200, result: 205, diff: 5, rate: 102,
        rounds: [
          { no: 1, plan: 50, result: 52 }, { no: 2, plan: 50, result: 50 },
          { no: 3, plan: 50, result: 51 }, { no: 4, plan: 50, result: 52 }
        ],
        analysis: {
          why: "特記事項なし。安定。",
          today: "✅ 継続して安定稼働の見込み。"
        }
      }
    ]
  };

  /* ---- モーダル制御 ---- */
  const modalProd = document.getElementById('modalProd');
  function openModal() { modalProd.classList.add('is-active'); }
  function closeModal() { modalProd.classList.remove('is-active'); }

  /* ---- 生産詳細のレンダリング ---- */
  function renderProdDetail() {
    let html = '';

    // 1. 実績比較テーブル
    html += '<div style="margin-bottom:24px;">';
    html += '<div style="font-weight:700; font-size:14px; margin-bottom:10px; color:var(--accent); border-left:4px solid var(--accent); padding-left:8px;">📊 昨日の実績比較</div>';
    html += '<table class="detail-table">';
    html += '<thead><tr><th style="text-align:left;">ライン名</th><th>計画</th><th>実績</th><th>差分</th><th>稼働率</th></tr></thead><tbody>';

    PROD_DATA.lines.forEach(line => {
      const diffColor = line.diff >= 0 ? 'var(--teal)' : 'var(--accent)';
      html += `<tr>
                <td style="font-weight:700; text-align:left;">${line.rate < 90 ? '⚠️' : '✅'} ${line.name}</td>
                <td>${line.plan}</td>
                <td style="font-weight:700;">${line.result}</td>
                <td style="color:${diffColor}; font-weight:700;">${(line.diff >= 0 ? '+' : '') + line.diff}</td>
                <td><span class="status-badge ${line.rate >= 90 ? 'ok' : 'ng'}" style="font-size:10px;">${line.rate}%</span></td>
              </tr>`;
    });
    html += '</tbody></table></div>';

    // 2. 4M異常分析 & トレンド
    html += '<div style="font-weight:700; font-size:14px; margin-bottom:10px; color:var(--accent); border-left:4px solid var(--accent); padding-left:8px;">🔍 異常内容・今日への影響</div>';

    PROD_DATA.lines.forEach((line, idx) => {
      const isWarning = line.rate < 95;
      html += `<div style="margin-bottom:16px; padding:12px; background:${isWarning ? '#FFF5F5' : '#F9F9F9'}; border:1px solid ${isWarning ? '#FEB2B2' : '#EEE'}; border-radius:8px;">`;
      
      html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span style="font-weight:700; font-size:13px;">${line.name}</span>
                <div style="display:flex; gap:2px; align-items:flex-end; height:16px;">`;
      line.rounds.forEach(r => {
          const h = (r.result / r.plan) * 100;
          html += `<div style="width:12px; height:${h/5}px; background:${h < 100 ? 'var(--accent)' : 'var(--teal)'}; opacity:0.6;"></div>`;
      });
      html += `<span style="font-size:9px; margin-left:4px;">Trend</span></div></div>`;

      html += `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size:11px;">
                <div style="background:#FFF; padding:6px; border-radius:4px; border:1px solid #EEE;"><strong>【なぜ？】</strong><br><span style="color:#666;">${line.analysis.why}</span></div>
                <div style="background:#FFF; padding:6px; border-radius:4px; border:1px solid #EEE;"><strong>【今日は？】</strong><br><span style="color:var(--teal); font-weight:700;">${line.analysis.today}</span></div>
              </div>`;

      html += `<button class="toggle-btn" data-panel="p${idx}" style="margin-top:10px; font-size:10px; background:none; border:1px solid #CCC; padding:2px 8px; cursor:pointer;">▼ ラウンド実績を表示</button>
               <div id="p${idx}" class="round-detail-panel" style="margin-top:8px; font-size:10px; border-top:1px dashed #DDD; padding-top:8px;">
                 <div style="display:grid; grid-template-columns:repeat(4,1fr); text-align:center;">`;
      line.rounds.forEach(r => { html += `<div><div style="color:#999;">R${r.no}</div><div>${r.result}/${r.plan}</div></div>`; });
      html += `</div></div></div>`;
    });

    document.getElementById('prodBody').innerHTML = html;
    
    // トグルイベント設定
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.onclick = function() {
        const panel = document.getElementById(this.dataset.panel);
        const isOpen = panel.classList.toggle('is-open');
        this.innerText = isOpen ? '▲ 詳細を閉じる' : '▼ ラウンド実績を表示';
      };
    });
  }

  /* ---- イベント登録 ---- */
  document.getElementById('btnProd').onclick = () => { renderProdDetail(); openModal(); };
  document.getElementById('closeProd').onclick = closeModal;
  modalProd.onclick = (e) => { if(e.target === modalProd) closeModal(); };
});
</script>

</body>
</html>
