<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM v16.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
  --header-h: 12vh;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100vh; width: 100vw; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--dark); overflow: hidden; display: flex; flex-direction: column; }

/* --- メイン画面（v15.6ベース） --- */
header { flex: 0 0 var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; background: #fff; border-bottom: 4px solid var(--accent); z-index: 1000; }
.h-clock { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; color: var(--accent); }
main { flex: 1; display: flex; padding: 8px; gap: 8px; height: calc(100vh - var(--header-h)); }
.col-left { flex: 0 0 42%; display: flex; flex-direction: column; gap: 8px; }
.col-right { flex: 1; display: flex; flex-direction: column; }
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; height: 100%; }
.card-header { padding: 6px 12px; background: #fafafa; border-bottom: 1px solid #ddd; font-weight: 900; display: flex; align-items: center; gap: 6px; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* タイムライン（v15.6仕様） */
.timeline-scroll-area { flex: 1; overflow-y: auto; padding: 10px 0; position: relative; }
#timeline-container { position: relative; width: 100%; min-height: 100%; }
#timeline-container::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ddd; transform: translateX(-50%); }
.tl-row { display: flex; width: 100%; margin-bottom: 15px; position: relative; z-index: 1; align-items: center; }
.tl-item { width: 45%; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 700; }
.tl-left { justify-content: flex-end; padding-right: 5px; text-align: right; }
.tl-right { justify-content: flex-start; padding-left: 5px; text-align: left; margin-left: 55%; }
.tl-dot { width: 12px; height: 12px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
.status-badge { padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; color: #fff; margin-left: 4px; }
.st-stop { background: var(--accent); }
.st-done { background: var(--safe); }

/* --- モーダル（v16.0新仕様） --- */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; }
.modal-overlay.open { display: flex; }
.modal-content { width: 100vw; height: 100vh; background: #fff; display: flex; overflow: hidden; }

/* サイドバー7項目（縦いっぱい） */
.m4-side-bar { flex: 0 0 14vw; background: var(--dark); display: flex; flex-direction: column; }
.m4-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; border: none; border-bottom: 1px solid #444; color: #999; cursor: pointer; transition: 0.2s; }
.m4-btn i { width: 2.5vw; height: 2.5vw; margin-bottom: 2px; }
.m4-btn span { font-size: 1vw; font-weight: 900; }
.m4-btn.active { background: var(--accent); color: #fff; }

/* メイン操作エリア：オートフィット構造 */
.modal-main { flex: 1; display: flex; flex-direction: column; padding: 1vh 1.5vw; gap: 1vh; overflow: hidden; }
.input-grid-top { flex: 2; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5vw; min-height: 0; }
.input-section-mid { flex: 1.5; display: flex; flex-direction: column; gap: 0.5vh; }
.box-col { display: flex; flex-direction: column; gap: 0.5vh; height: 100%; }
.label-sm { font-size: 0.8rem; font-weight: 900; color: #666; background: #eee; padding: 2px 8px; border-radius: 4px; }

/* ボタンサイズ自動調整 */
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; flex: 1; align-content: start; }
.btn-q { padding: 1.5vh 4px; border: 1px solid #ccc; border-radius: 6px; background: #fff; font-weight: 700; font-size: clamp(0.7rem, 0.9vw, 1.1rem); cursor: pointer; }
.btn-q:active { background: #ddd; }

.inp-t { width: 100%; padding: 1vh; border: 2px solid #bbb; border-radius: 6px; font-size: 1.1rem; font-weight: 700; }

/* 下部エリア */
.modal-footer { flex: 0 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.5vw; background: #f1f1f1; padding: 1vh 2vw; border-radius: 12px; }
.footer-left { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
.time-group { display: flex; align-items: center; justify-content: space-around; gap: 10px; }
.spin-box { display: flex; align-items: center; gap: 2px; background: #fff; padding: 5px; border-radius: 8px; border: 1px solid #ccc; }
.spin-v { font-family: 'Share Tech Mono'; font-size: 1.5rem; font-weight: 700; width: 3.5vw; text-align: center; }
.spin-b { width: 3vw; height: 3.5vh; background: #eee; border: 1px solid #ccc; border-radius: 4px; font-weight: 900; }

.btn-toggle { flex: 1; padding: 1.5vh; border: 2px solid #ccc; border-radius: 8px; font-weight: 900; background: #fff; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }

.action-btns { display: flex; flex-direction: column; gap: 6px; }
.btn-f { width: 100%; padding: 1.8vh; border-radius: 8px; border: none; font-size: 1.4rem; font-weight: 900; cursor: pointer; }
.btn-save { background: var(--accent); color: #fff; }
.btn-can { background: #78909c; color: #fff; }
</style>
</head>
<body>

<header>
  <div class="h-title" style="font-weight:900;">FAM-PM <small>v16.0</small></div>
  <div class="h-clock" id="live-clock">00:00:00</div>
</header>

<main>
  <div class="col-left">
    <section class="card">
      <div class="card-header"><i data-lucide="edit-3" size="14"></i>実績入力</div>
      <div class="card-body">
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; flex:1;">
          <button class="btn-q" style="width:70px;height:70px;font-size:2rem;" onclick="changeVal(-1)">-</button>
          <div style="font-family:'Share Tech Mono'; font-size:4rem; font-weight:700; color:var(--accent);" id="disp-act">0</div>
          <button class="btn-q" style="width:70px;height:70px;font-size:2rem;" onclick="changeVal(1)">+</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <button class="btn-f btn-save" style="flex:1; font-size:1.1rem;" onclick="alert('登録')">実績登録</button>
          <button class="btn-f" style="flex:1; background:var(--dark); color:#fff; font-size:1.1rem;" onclick="openRegModal()">変化点入力</button>
        </div>
        <div id="rd-display-area" style="display:flex; justify-content:center; gap:10px; font-family:'Share Tech Mono'; font-weight:900; color:var(--accent); font-size:1.2rem;">1rd</div>
      </div>
    </section>
  </div>
  <div class="col-right">
    <section class="card">
      <div class="card-header"><i data-lucide="clock" size="14"></i>タイムライン</div>
      <div class="card-body">
        <div class="timeline-scroll-area"><div id="timeline-container"></div></div>
      </div>
    </section>
  </div>
</main>

<div id="regModal" class="modal-overlay">
  <div class="modal-content">
    <div class="m4-side-bar">
      <button class="m4-btn active" data-type="人" onclick="switchM4(this)"><i data-lucide="user"></i><span>人</span></button>
      <button class="m4-btn" data-type="設備" onclick="switchM4(this)"><i data-lucide="settings"></i><span>設備</span></button>
      <button class="m4-btn" data-type="材料" onclick="switchM4(this)"><i data-lucide="package"></i><span>材料</span></button>
      <button class="m4-btn" data-type="方法" onclick="switchM4(this)"><i data-lucide="info"></i><span>方法</span></button>
      <button class="m4-btn" data-type="不良" onclick="switchM4(this)"><i data-lucide="alert-triangle"></i><span>不良</span></button>
      <button class="m4-btn" data-type="投入" onclick="switchM4(this)"><i data-lucide="log-in"></i><span>投入</span></button>
      <button class="m4-btn" data-type="下車" onclick="switchM4(this)"><i data-lucide="log-out"></i><span>下車</span></button>
    </div>
    <div class="modal-main">
      <div class="input-grid-top">
        <div class="box-col">
          <span class="label-sm">内容タップボタン</span>
          <div id="q-titles" class="quick-grid"></div>
          <input type="text" id="reg-title" class="inp-t" placeholder="内容入力欄">
        </div>
        <div class="box-col">
          <span class="label-sm">詳細内容タップボタン</span>
          <div id="q-details" class="quick-grid"></div>
          <input type="text" id="reg-detail" class="inp-t" placeholder="詳細内容入力欄">
        </div>
      </div>
      <div class="input-section-mid">
        <span class="label-sm">処置内容タップボタン (履歴上位4件)</span>
        <div id="q-actions" class="quick-grid" style="grid-template-columns: repeat(4, 1fr);"></div>
        <input type="text" id="reg-act" class="inp-t" placeholder="処置入力欄">
      </div>
      <div class="modal-footer">
        <div class="footer-left">
          <div class="toggle-row">
            <button id="stop-on" class="btn-toggle active" onclick="setStop(true)">⚠️ 停止あり</button>
            <button id="stop-off" class="btn-toggle" onclick="setStop(false)">✅ 停止なし</button>
          </div>
          <div class="time-group">
            <div class="spin-box">
              <span style="font-size:0.7rem; font-weight:900;">開始</span>
              <button class="spin-b" onclick="spin('sh',1)">▲</button><div class="spin-v" id="sh">08</div><button class="spin-b" onclick="spin('sh',-1)">▼</button>
              <span>:</span>
              <button class="spin-b" onclick="spin('sm',1)">▲</button><div class="spin-v" id="sm">00</div><button class="spin-b" onclick="spin('sm',-1)">▼</button>
            </div>
            <div class="spin-box">
              <span style="font-size:0.7rem; font-weight:900;">終了</span>
              <button class="spin-b" onclick="spin('eh',1)">▲</button><div class="spin-v" id="eh">--</div><button class="spin-b" onclick="spin('eh',-1)">▼</button>
              <span>:</span>
              <button class="spin-b" onclick="spin('em',1)">▲</button><div class="spin-v" id="em">--</div><button class="spin-b" onclick="spin('em',-1)">▼</button>
            </div>
          </div>
        </div>
        <div class="action-btns">
          <button class="btn-f btn-save" onclick="saveIssue()">登録</button>
          <button class="btn-f btn-can" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let issues = [];
let regHasStop = true;

const master = {
  '人': { t:['応援投入','作業遅れ','研修','離席'], d:['No.1ライン','新人A','応援者B','全工程'], a:['リーダー報告','配置変','教育','休憩'] },
  '設備': { t:['チョコ停','刃具折損','給油','エラー'], d:['OP-10','OP-20','コンベア','センサー'], a:['再起動','刃具交換','清掃','点検'] },
  '材料': { t:['欠品','ロット切替','異物','不良'], d:['ボルト','パネル','パッキン','潤滑油'], a:['出庫依頼','選別','洗浄','交換'] },
  '方法': { t:['工程変更','タクト変','治具交換','試作'], d:['手順A','速度UP','専用治具','新型'], a:['基準書確認','設定変','位置調整','完了'] },
  '不良': { t:['外観傷','異音','動作不良','未加工'], d:['表面','駆動部','スイッチ','穴あけ'], a:['全数選別','再研磨','基板交換','再加工'] },
  '投入': { t:['初物投入','先行投入','追加投入','順序変'], d:['製品A','製品B','特注品','予備品'], a:['数量確認','計画更新','ライン投入','整理'] },
  '下車': { t:['完了下車','不適合下車','抜き取り','清掃'], d:['パレットA','NG箱','検査用','終業点検'], a:['搬送完了','赤札貼付','検査室へ','清掃済'] }
};

function switchM4(btn) {
  document.querySelectorAll('.m4-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const type = btn.dataset.type;
  const data = master[type];
  const setBtns = (id, list, target) => {
    document.getElementById(id).innerHTML = list.map(v => `<button class="btn-q" onclick="setVal('${target}','${v}')">${v}</button>`).join('');
  };
  setBtns('q-titles', data.t, 'reg-title');
  setBtns('q-details', data.d, 'reg-detail');
  setBtns('q-actions', data.a, 'reg-act');
}

function openRegModal() {
  document.getElementById('regModal').classList.add('open');
  const now = new Date();
  document.getElementById('sh').innerText = now.getHours().toString().padStart(2,'0');
  document.getElementById('sm').innerText = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('eh').innerText = "--";
  document.getElementById('em').innerText = "--";
  switchM4(document.querySelector('.m4-btn.active'));
}

function saveIssue() {
  const endEntered = document.getElementById('eh').innerText !== "--";
  const type = document.querySelector('.m4-btn.active').dataset.type;
  const iconMap = {'人':'user','設備':'settings','材料':'package','方法':'info','不良':'alert-triangle','投入':'log-in','下車':'log-out'};
  
  issues.push({
    time: `${document.getElementById('sh').innerText}:${document.getElementById('sm').innerText}`,
    endTime: endEntered ? `${document.getElementById('eh').innerText}:${document.getElementById('em').innerText}` : null,
    title: document.getElementById('reg-title').value || "未設定",
    icon: iconMap[type],
    stop: regHasStop,
    done: endEntered
  });
  renderTimeline(); closeModal();
}

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  container.innerHTML = issues.sort((a,b)=>a.time.localeCompare(b.time)).map(i => `
    <div class="tl-row">
      <div class="tl-dot" style="border-color:${i.stop?'var(--accent)':'var(--safe)'}"></div>
      <div class="tl-item ${i.stop?'tl-right':'tl-left'}">
        <span style="font-family:'Share Tech Mono'; color:var(--accent)">${i.time}${i.endTime?'~'+i.endTime:''}</span>
        <i data-lucide="${i.icon}" size="14"></i>
        <span>${i.title} <span class="status-badge ${i.done?'st-done':'st-stop'}">${i.done?'済':'進行'}</span></span>
      </div>
    </div>`).join('');
  lucide.createIcons();
}

function setStop(s) {
  regHasStop = s;
  document.getElementById('stop-on').classList.toggle('active', s);
  document.getElementById('stop-off').classList.toggle('active', !s);
}
function spin(id, d) {
  const el = document.getElementById(id);
  let v = (el.innerText === "--") ? 0 : parseInt(el.innerText);
  if (id.includes('h')) v = (v+d+24)%24; else v = (v+d+60)%60;
  el.innerText = v.toString().padStart(2,'0');
}
function setVal(id, v) { document.getElementById(id).value = v; }
function closeModal() { document.getElementById('regModal').classList.remove('open'); }
function changeVal(n) { let d = document.getElementById('disp-act'); d.innerText = Math.max(0, parseInt(d.innerText)+n); }

setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ja-JP', { hour12: false }); }, 1000);
document.addEventListener('DOMContentLoaded', () => { renderTimeline(); });
</script>
</body>
</html>
