<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM MORNING MONITOR v10.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ... (基本スタイルは維持しつつ、QR表示部を最適化) ... */
:root { --bg: #EBEDF0; --panel: #FFFFFF; --accent: #C62828; --text: #1A1C1E; --border: #BDBDBD; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Noto Sans JP', sans-serif; padding-bottom: 75px; font-size: 11px; }

/* 共通テーブルスタイル */
table { width: 100%; border-collapse: collapse; table-layout: fixed; }
th, td { padding: 5px 2px; border-bottom: 1px solid #E0E0E0; font-size: 10px; text-align: center; }
th { background: #F5F5F5; position: sticky; top: 0; }
.t-left { text-align: left; padding-left: 8px; }

/* ボトムナビ */
.bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #263238; display: flex; padding: 5px; z-index: 2500; }
.nav-btn { flex: 1; border: none; margin: 0 2px; border-radius: 4px; color: #fff; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.btn-red { background: var(--accent); }
.btn-gray { background: #546E7A; }

/* モーダル */
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; padding: 10px; align-items: center; justify-content: center; }
.modal-content { background: #fff; width: 100%; max-width: 1000px; max-height: 92vh; border-radius: 4px; display: flex; flex-direction: column; }
.modal-header { padding: 12px; background: #F5F5F5; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
.modal-body { flex: 1; overflow-y: auto; padding: 10px; }

/* QRメニュー */
.qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.qr-tile { padding: 12px; border: 1px solid #ddd; border-radius: 6px; background: #fdfdfd; cursor: pointer; text-align: center; }
.qr-tile:active { background: #fff1f0; }
.qr-result { margin-top: 15px; text-align: center; border-top: 2px dashed #eee; padding-top: 15px; }
</style>
</head>
<body>

<header style="display:flex; justify-content:space-between; padding:10px; background:#fff; border-bottom:3px solid var(--accent);">
  <div style="font-weight:900; color:var(--accent);">FAM MONITOR v10.3</div>
  <div id="clock" style="font-family:'Share Tech Mono'; font-size:20px;">00:00:00</div>
</header>

<main style="padding:10px; display:grid; gap:10px; grid-template-columns: 1fr 1.5fr;">
  <div class="card" style="background:#fff; border:1px solid #ccc; height:35vh; overflow:auto;">
    <div style="background:#334; color:#fff; padding:4px;">👥 Attendance / 出勤</div>
    <table id="attMain"></table>
  </div>
  <div class="card" style="background:#fff; border:1px solid #ccc; height:35vh; overflow:auto;">
    <div style="background:#334; color:#fff; padding:4px;">⚠️ Issues / 遅れ</div>
    <table id="issMain"></table>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn btn-red" onclick="openModal('qr')">📲 QR LINK<br><span style="font-size:8px;">QR連携</span></button>
  <button class="nav-btn btn-gray" onclick="openModal('att')">ATTEND<br><span style="font-size:8px;">出勤詳細</span></button>
  <button class="nav-btn btn-gray" onclick="openModal('prd')">PROD<br><span style="font-size:8px;">生産詳細</span></button>
  <button class="nav-btn btn-gray" onclick="openModal('iss')">ISSUE<br><span style="font-size:8px;">遅れ詳細</span></button>
</nav>

<div id="m-qr" class="modal"><div class="modal-content" style="max-width:450px;">
  <div class="modal-header"><b>QR連携 / QR Linkage</b><button onclick="closeModal('qr')">✕</button></div>
  <div class="modal-body">
    <div class="qr-grid">
      <div class="qr-tile" onclick="genQR('閲覧ページ','https://example.com/view')"><b>📄 閲覧</b></div>
      <div class="qr-tile" onclick="genQR('出勤入力','https://example.com/att-input')"><b>👥 出勤</b></div>
      <div class="qr-tile" onclick="genQR('遅れ入力','https://example.com/iss-input')"><b>⚠️ 遅れ</b></div>
      <div class="qr-tile" onclick="genQR('連絡入力','https://example.com/not-input')"><b>📢 連絡</b></div>
    </div>
    <div id="qrBox" class="qr-result" style="display:none;">
      <p id="qrTitle" style="font-weight:bold; color:var(--accent); margin-bottom:8px;"></p>
      <div id="qrImgArea"></div>
      <p style="font-size:9px; color:#666; margin-top:5px;">端末でスキャンしてください</p>
    </div>
  </div>
</div></div>

<div id="m-att" class="modal"><div class="modal-content"><div class="modal-header"><b>出勤詳細 / Attendance Details</b><button onclick="closeModal('att')">✕</button></div><div class="modal-body"><table id="attDet"></table></div></div></div>
<div id="m-prd" class="modal"><div class="modal-content"><div class="modal-header"><b>生産詳細 / Production Details</b><button onclick="closeModal('prd')">✕</button></div><div class="modal-body"><table id="prdDet"></table></div></div></div>
<div id="m-iss" class="modal"><div class="modal-content"><div class="modal-header"><b>遅れ詳細 / Issue Details</b><button onclick="closeModal('iss')">✕</button></div><div class="modal-body"><table id="issDet"></table></div></div></div>

<script>
const DB = {
  Attendance: [{ line:"大型エンジン組立", pre:22, tot:24, rate:91.6, memo:"佐藤(欠), 田中(遅)" }],
  Production: [{ line:"大型エンジン組立", act:48, pln:50, rate:88.5, stop:25 }],
  Issues: [{ time:"08:15", title:"U1設備停止", stop:25, status:"対応済", cat:"Machine", react:"了解👌", boss:"課" }]
};

// --- 不具合改修: 描画ロジックの統合 ---
function renderMain() {
  let a='<tr><th>Line</th><th>Pres/Tot</th><th>%</th></tr>';
  DB.Attendance.forEach(d=> a+=`<tr><td class="t-left">${d.line}</td><td>${d.pre}/${d.tot}</td><td>${d.rate}%</td></tr>`);
  document.getElementById('attMain').innerHTML=a;

  let i='<tr><th>Content</th><th>Min</th><th>Stat</th><th>Boss</th></tr>';
  DB.Issues.forEach(d=> i+=`<tr><td class="t-left">${d.title}</td><td>${d.stop}</td><td>${d.status}</td><td>${d.boss}</td></tr>`);
  document.getElementById('issMain').innerHTML=i;
}

function openModal(k) {
  document.getElementById('m-'+k).style.display='flex';
  // モーダルが開くたびに最新データを描画（不具合解消の核）
  if(k==='att') renderAttDet();
  if(k==='prd') renderPrdDet();
  if(k==='iss') renderIssDet();
}

function closeModal(k) { document.getElementById('m-'+k).style.display='none'; }

function renderAttDet() {
  let h='<thead><tr><th>Line</th><th>Pres/Tot</th><th>%</th><th>Remarks / 備考</th></tr></thead><tbody>';
  DB.Attendance.forEach(d=> h+=`<tr><td>${d.line}</td><td>${d.pre}/${d.tot}</td><td>${d.rate}%</td><td class="t-left">${d.memo}</td></tr>`);
  document.getElementById('attDet').innerHTML=h+'</tbody>';
}

function renderPrdDet() {
  let h='<thead><tr><th>Line</th><th>Plan</th><th>Actual</th><th>Rate</th><th>Stop</th></tr></thead><tbody>';
  DB.Production.forEach(d=> h+=`<tr><td>${d.line}</td><td>${d.pln}</td><td>${d.act}</td><td>${d.rate}%</td><td>${d.stop}m</td></tr>`);
  document.getElementById('prdDet').innerHTML=h+'</tbody>';
}

function renderIssDet() {
  let h='<thead><tr><th>Time</th><th>Cat</th><th>Content</th><th>Min</th><th>Boss</th></tr></thead><tbody>';
  DB.Issues.forEach(d=> h+=`<tr><td>${d.time}</td><td>${d.cat}</td><td class="t-left">${d.title}</td><td>${d.stop}m</td><td><b>${d.boss}</b> ${d.react}</td></tr>`);
  document.getElementById('issDet').innerHTML=h+'</tbody>';
}

// --- QR生成ロジック ---
function genQR(title, url) {
  const box = document.getElementById('qrBox');
  const imgArea = document.getElementById('qrImgArea');
  document.getElementById('qrTitle').innerText = title + "へ接続";
  
  // Google Charts APIを利用してQRを動的生成 (ロジックの確認ポイント)
  const qrUrl = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${encodeURIComponent(url)}&choe=UTF-8`;
  imgArea.innerHTML = `<img src="${qrUrl}" alt="QR Code" style="border:5px solid #fff; box-shadow:0 0 5px rgba(0,0,0,0.2);">`;
  
  box.style.display = 'block';
}

document.addEventListener('DOMContentLoaded', () => {
  setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP',{hour12:false}); }, 1000);
  renderAllSync();
});

function renderAllSync() {
  renderMain();
}
</script>
</body>
</html>
