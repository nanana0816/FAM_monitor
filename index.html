<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM MORNING MONITOR v7.1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

<style>
:root {
  --bg: #F0F2F5; --panel: #FFFFFF; --accent: #D32F2F; --teal: #00897B;
  --amber: #F57C00; --text: #1A1C1E; --border: #BDBDBD; --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  font-family: 'Noto Sans JP', sans-serif; 
  color: var(--text); 
  padding-bottom: 80px; 
  font-size: 14px; 
  line-height: 1.4;
}

/* ===== アイコン基本設定 ===== */
.material-symbols-outlined {
  /* 塗りつぶしタイプをデフォルトに設定し、視認性を向上 */
  font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
  vertical-align: middle;
  display: inline-block;
  line-height: 1;
}

/* ===== ヘッダー ===== */
header { 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  padding: 12px 20px; 
  height: 60px; 
  background: #fff; 
  border-bottom: 3px solid var(--accent); 
  position: sticky; 
  top: 0; 
  z-index: 1000; 
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.h-title { 
  font-size: 18px; 
  font-weight: 900; 
  color: var(--accent); 
}
.h-clock { 
  font-family: 'Share Tech Mono', monospace; 
  font-size: 28px; 
  font-weight: 700; 
  color: var(--accent);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
/* 時計横のアイコンサイズ */
.h-clock .material-symbols-outlined { font-size: 32px; }

/* ===== メイングリッド ===== */
.main-grid { 
  display: grid; 
  gap: 12px; 
  padding: 12px;
  min-height: calc(100vh - 120px);
}
@media (orientation: landscape) {
  .main-grid {
    grid-template-columns: 3.5fr 6.5fr;
    grid-template-areas: "attend issue" "prod notice";
  }
}
@media (orientation: portrait) {
  .main-grid {
    grid-template-columns: 1fr;
    grid-template-areas: "attend" "prod" "issue" "notice";
  }
}
.area-attend { grid-area: attend; }
.area-prod   { grid-area: prod; }
.area-issue  { grid-area: issue; }
.area-notice { grid-area: notice; }

/* ===== カード ===== */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.card-header {
  padding: 12px 16px;
  background: #fafafa;
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  font-weight: 700;
  font-size: 16px;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-header .material-symbols-outlined { font-size: 20px; }

.card-body {
  flex: 1;
  overflow-y: auto;
  background: #fff;
  max-height: 320px;
}

/* ===== テーブル ===== */
table { width: 100%; border-collapse: collapse; table-layout: auto; background: #fff; }
th, td { padding: 10px 12px; border-bottom: 1px solid #EEEEEE; border-right: 1px solid #F5F5F5; word-wrap: break-word; font-size: 13px; }
th { background: #F5F5F5; font-weight: 700; color: #424242; vertical-align: middle; position: sticky; top: 0; z-index: 10; }
.t-left { text-align: left; padding-left: 12px; }

/* ===== ステータスバッジ ===== */
.badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 12px; white-space: nowrap; }
.badge-ok { background: var(--teal); color: #fff; }
.badge-ng { background: var(--accent); color: #fff; }
.badge-warn { background: var(--amber); color: #fff; }

/* ===== ボトムナビ ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
  background: #263238; display: flex; padding: 8px; z-index: 2000; gap: 8px;
}
.nav-btn {
  flex: 1; border: none; border-radius: 8px; color: #fff; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.2s ease; font-weight: 700; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.nav-btn .material-symbols-outlined { font-size: 24px; margin-bottom: 4px; }
.nav-btn .label { font-size: 11px; }
.btn-qr { background: var(--accent); }
.btn-dark { background: #546E7A; }

/* ===== モーダル ===== */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.5); z-index: 3000; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.is-open { display: flex; }
.modal-content {
  background: #fff; width: 100%; max-width: 1200px; border-radius: var(--radius);
  display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.2); max-height: 90vh; overflow: hidden;
}
.modal-header {
  padding: 16px 24px; background: linear-gradient(135deg, #D32F2F 0%, #B71C1C 100%);
  color: #fff; display: flex; justify-content: space-between; align-items: center;
  font-weight: 700; font-size: 18px; flex-shrink: 0;
}
.modal-body { padding: 24px; flex: 1; overflow-y: auto; }

/* ===== QR グリッド ===== */
.qr-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
.qr-btn-card {
  padding: 24px; border-radius: 12px; color: #fff; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: all 0.3s ease; font-weight: 700;
}
.qr-btn-card .material-symbols-outlined { font-size: 40px; margin-bottom: 8px; }
.qr-btn-view { background: #1565C0; }
.qr-btn-attend { background: var(--teal); }
.qr-btn-contact { background: #7B1FA2; }
.qr-btn-react { background: #E64A19; }

/* ===== 50インチ大型モニター対応 ===== */
@media (min-width: 2560px) {
  body { font-size: 18px; }
  header { height: 80px; }
  .h-title { font-size: 24px; }
  .h-clock { font-size: 42px; }
  .h-clock .material-symbols-outlined { font-size: 48px; }
  .card-header { font-size: 22px; }
  .card-header .material-symbols-outlined { font-size: 28px; }
  th, td { padding: 14px 16px; font-size: 16px; }
  .nav-btn .material-symbols-outlined { font-size: 32px; }
  .nav-btn .label { font-size: 14px; }
}
</style>
</head>
<body>

<header>
  <div class="h-title">FAM 朝会モニター</div>
  <div class="h-clock">
    <span class="material-symbols-outlined">schedule</span>
    <span id="hClock">00:00:00</span>
  </div>
</header>

<main class="main-grid">
  <div class="card area-attend">
    <div class="card-header">
      <span class="material-symbols-outlined">groups</span>出勤状況
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th class="t-left">ライン名</th><th>出/欠</th><th>出勤率</th></tr></thead>
        <tbody id="mainAttendBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card area-prod">
    <div class="card-header">
      <span class="material-symbols-outlined">factory</span>生産状況（昨日）
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th class="t-left">ライン名</th><th>実績/計画</th><th>稼働率</th></tr></thead>
        <tbody id="mainProdBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card area-issue">
    <div class="card-header">
      <span class="material-symbols-outlined">report_problem</span>遅れ・不良
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th class="t-left">詳細</th><th>停止</th><th>状況</th></tr></thead>
        <tbody id="mainIssueBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card area-notice">
    <div class="card-header">
      <span class="material-symbols-outlined">campaign</span>連絡事項
    </div>
    <div class="card-body">
      <table>
        <thead><tr><th class="t-left">内容</th><th>発信元</th></tr></thead>
        <tbody id="mainNoticeBody"></tbody>
      </table>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn btn-qr" onclick="openModal('qr')">
    <span class="material-symbols-outlined">qr_code_2</span>
    <span class="label">連携QR</span>
  </button>
  <button class="nav-btn btn-dark" onclick="openModal('attend')">
    <span class="material-symbols-outlined">person_check</span>
    <span class="label">出勤詳細</span>
  </button>
  <button class="nav-btn btn-dark" onclick="openModal('prod')">
    <span class="material-symbols-outlined">analytics</span>
    <span class="label">生産詳細</span>
  </button>
  <button class="nav-btn btn-dark" onclick="openModal('issue')">
    <span class="material-symbols-outlined">engineering</span>
    <span class="label">遅れ詳細</span>
  </button>
</nav>

<div id="modalQR" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <span><span class="material-symbols-outlined" style="margin-right:8px">qr_code_2</span>スマホ連携 QR</span>
      <button onclick="closeModal('qr')" style="background:none; border:none; color:#fff; font-size:28px; cursor:pointer;">×</button>
    </div>
    <div class="modal-body">
      <div class="qr-grid">
        <div class="qr-btn-card qr-btn-view" onclick="genQR('全体閲覧ページ', '#')">
          <span class="material-symbols-outlined">monitor</span>
          <span class="label">全体閲覧</span>
        </div>
        <div class="qr-btn-card qr-btn-attend" onclick="genQR('出勤状況入力', '#')">
          <span class="material-symbols-outlined">edit_square</span>
          <span class="label">出勤入力</span>
        </div>
        </div>
      <div id="qrDisplay" style="text-align:center; display:none; padding:20px; background:#f9f9f9; border-radius:12px;">
        <img id="qrImg" src="" style="width:200px; border:4px solid #fff; box-shadow:0 4px 10px rgba(0,0,0,0.1)">
        <div id="qrPageName" style="margin-top:10px; font-weight:700;"></div>
      </div>
    </div>
  </div>
</div>

<div id="modalAttend" class="modal-overlay"><div class="modal-content"><div class="modal-header">出勤詳細<button onclick="closeModal('attend')">×</button></div><div class="modal-body" id="modalAttendBody"></div></div></div>
<div id="modalProd" class="modal-overlay"><div class="modal-content"><div class="modal-header">生産詳細<button onclick="closeModal('prod')">×</button></div><div class="modal-body" id="modalProdBody"></div></div></div>
<div id="modalIssue" class="modal-overlay"><div class="modal-content"><div class="modal-header">遅れ詳細<button onclick="closeModal('issue')">×</button></div><div class="modal-body" id="modalIssueBody"></div></div></div>

<script>
// --- 基本ロジックは元コードを継承し、アイコン対応の描画に微調整 ---
const DATA = {
  attend: [{ line: 'ABライン', on: 22, total: 24, rate: 92 }, { line: 'Cライン', on: 16, total: 18, rate: 88 }],
  prod: [{ line: '大型エンジン組立', plan: 50, res: 52, rate: 98 }, { line: '中型トランス組立', plan: 72, res: 72, rate: 99 }],
  issues: [{ content: 'U1コンベアベアリング異音', stop: 25, status: '継続中', statusCode: 'ng' }],
  notices: [{ content: '夏季休暇中の設備点検計画について', from: '保全課' }]
};

function renderMain() {
  document.getElementById('mainAttendBody').innerHTML = DATA.attend.map(l => `<tr><td class="t-left">${l.line}</td><td>${l.on}/${l.total}</td><td>${l.rate}%</td></tr>`).join('');
  document.getElementById('mainProdBody').innerHTML = DATA.prod.map(l => `<tr><td class="t-left">${l.line}</td><td>${l.res}/${l.plan}</td><td>${l.rate}%</td></tr>`).join('');
  document.getElementById('mainIssueBody').innerHTML = DATA.issues.map(i => `<tr><td class="t-left">${i.content}</td><td>${i.stop}分</td><td><span class="badge ${i.statusCode==='ok'?'badge-ok':'badge-ng'}">${i.status}</span></td></tr>`).join('');
  document.getElementById('mainNoticeBody').innerHTML = DATA.notices.map(n => `<tr><td class="t-left">${n.content}</td><td>${n.from}</td></tr>`).join('');
}

function openModal(id) { document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('is-open'); }
function closeModal(id) { document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.remove('is-open'); }

function genQR(name, url) {
  document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
  document.getElementById('qrPageName').textContent = name;
  document.getElementById('qrDisplay').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', () => {
  setInterval(() => { document.getElementById('hClock').textContent = new Date().toLocaleTimeString('ja-JP', { hour12: false }); }, 1000);
  renderMain();
});
</script>
</body>
</html>
