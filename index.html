<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM v15.8</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
  --header-h: 10vh;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100vh; width: 100vw; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; display: flex; flex-direction: column; }

/* --- メイン画面 --- */
header { flex: 0 0 var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; background: #fff; border-bottom: 4px solid var(--accent); z-index: 1000; }
.h-clock { font-family: 'Share Tech Mono'; font-size: 2rem; font-weight: 700; color: var(--accent); }
main { flex: 1; display: flex; padding: 8px; gap: 8px; height: calc(100vh - var(--header-h)); overflow: hidden; }
.col-left { flex: 0 0 40%; display: flex; flex-direction: column; gap: 8px; }
.col-right { flex: 1; display: flex; flex-direction: column; }
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; height: 100%; }
.card-header { padding: 10px; background: #fafafa; border-bottom: 1px solid #ddd; font-weight: 900; display: flex; align-items: center; gap: 6px; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* タイムライン表示 */
#timeline-container { position: relative; width: 100%; height: 100%; overflow-y: auto; padding: 10px 0; }
#timeline-container::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ddd; transform: translateX(-50%); }
.tl-row { display: flex; width: 100%; margin-bottom: 15px; position: relative; align-items: center; z-index: 1; }
.tl-item { width: 45%; font-size: 0.85rem; font-weight: 700; }
.tl-left { text-align: right; margin-right: 55%; padding-right: 10px; }
.tl-right { margin-left: 55%; padding-left: 10px; }
.tl-dot { width: 10px; height: 10px; background: #fff; border: 2px solid var(--accent); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }

/* --- モーダル（全画面ベストフィット） --- */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; }
.modal-overlay.open { display: flex; }
.modal-content { width: 100vw; height: 100vh; background: #fff; display: flex; overflow: hidden; }

/* 左サイドバー(7項目) */
.m4-side-bar { flex: 0 0 12vw; background: var(--dark); display: flex; flex-direction: column; }
.m4-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; border-bottom: 1px solid #37474f; background: transparent; color: #b0bec5; cursor: pointer; transition: 0.2s; }
.m4-btn i { width: 2.5vw; height: 2.5vw; margin-bottom: 2px; }
.m4-btn span { font-size: 1vw; font-weight: 900; }
.m4-btn.active { background: var(--accent); color: #fff; }

/* メイン入力エリア */
.modal-main { flex: 1; display: flex; flex-direction: column; padding: 1.5vh 1.5vw; gap: 1.5vh; height: 100vh; }
.input-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 2vw; min-height: 0; }
.section-box { display: flex; flex-direction: column; gap: 0.5vh; }
.section-title { font-size: 0.9rem; font-weight: 900; background: #eee; padding: 4px 8px; border-radius: 4px; }

/* クイックボタン群 */
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 4px 0; }
.btn-quick { padding: 1.8vh 4px; border: 1px solid #ccc; border-radius: 8px; background: #fdfdfd; font-weight: 700; font-size: clamp(0.8rem, 1vw, 1.1rem); cursor: pointer; }
.btn-quick:active { background: #ddd; }

.text-inp { width: 100%; padding: 1.2vh; border: 2px solid #bbb; border-radius: 6px; font-size: 1.1rem; font-weight: 700; }

/* モーダルフッター（停止・登録） */
.modal-footer { flex: 0 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 2vw; background: #f5f5f5; padding: 1.5vh 2vw; border-radius: 12px; }
.config-group { display: flex; flex-direction: column; gap: 8px; }
.toggle-row { display: flex; gap: 8px; }
.btn-toggle { flex: 1; padding: 1.5vh; border: 2px solid #ccc; border-radius: 8px; font-weight: 900; background: #fff; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }

/* 時刻スピナー */
.time-spin-box { display: flex; align-items: center; justify-content: center; gap: 4px; }
.spin-btn { width: 4vw; height: 4vh; background: #fff; border: 1px solid #aaa; border-radius: 4px; font-weight: 900; font-size: 1.2rem; }
.spin-val { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; width: 4.5vw; text-align: center; }

/* 登録・キャンセル */
.action-group { display: flex; flex-direction: column; gap: 8px; }
.btn-final { width: 100%; padding: 2vh; border-radius: 10px; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; }
.btn-save { background: var(--accent); color: #fff; }
.btn-close { background: #78909c; color: #fff; }

/* ラウンド表示 */
.rd-group { display: flex; justify-content: center; gap: 10px; margin-top: auto; padding-top: 10px; border-top: 1px solid #eee; }
.rd-icon { font-family: 'Share Tech Mono'; font-weight: 900; font-size: 1.5rem; color: #ccc; }
.rd-icon.active { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="h-title" style="font-weight:900; font-size:1.5rem;">FAM-PM <small>v15.8</small></div>
  <div class="h-clock" id="live-clock">00:00:00</div>
</header>

<main>
  <div class="col-left">
    <section class="card">
      <div class="card-header"><i data-lucide="edit-3" size="18"></i>実績入力</div>
      <div class="card-body">
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; flex:1;">
          <button class="btn-quick" style="width:80px; height:80px; font-size:2rem;" onclick="changeVal(-1)">-</button>
          <div style="font-family:'Share Tech Mono'; font-size:5rem; font-weight:700; color:var(--accent);" id="disp-act">0</div>
          <button class="btn-quick" style="width:80px; height:80px; font-size:2rem;" onclick="changeVal(1)">+</button>
        </div>
        <button class="btn-final btn-save" style="font-size:1.5rem; margin-bottom:10px;" onclick="openRegModal()">変化点入力</button>
        <div id="rd-display-area" class="rd-group">
          <span class="rd-icon active">1rd</span><span class="rd-icon">2rd</span><span class="rd-icon">3rd</span>
        </div>
      </div>
    </section>
  </div>
  <div class="col-right">
    <section class="card">
      <div class="card-header"><i data-lucide="clock" size="18"></i>変化点タイムライン</div>
      <div class="card-body">
        <div id="timeline-container"></div>
      </div>
    </section>
  </div>
</main>

<div id="regModal" class="modal-overlay">
  <div class="modal-content">
    <div class="m4-side-bar">
      <button class="m4-btn active" data-type="人" onclick="switchM4(this)"><i data-lucide="user"></i><span>人</span></button>
      <button class="m4-btn" data-type="設備" onclick="switchM4(this)"><i data-lucide="settings"></i><span>設備</span></button>
      <button class="m4-btn" data-type="材料" onclick="switchM4(this)"><i data-lucide="package"></i><span>材料</span></button>
      <button class="m4-btn" data-type="方法" onclick="switchM4(this)"><i data-lucide="info"></i><span>方法</span></button>
      <button class="m4-btn" data-type="不良" onclick="switchM4(this)"><i data-lucide="alert-triangle"></i><span>不良</span></button>
      <button class="m4-btn" data-type="投入" onclick="switchM4(this)"><i data-lucide="log-in"></i><span>投入</span></button>
      <button class="m4-btn" data-type="下車" onclick="switchM4(this)"><i data-lucide="log-out"></i><span>下車</span></button>
    </div>
    <div class="modal-main">
      <div class="input-grid">
        <div class="section-box">
          <span class="section-title">内容（大項目）</span>
          <div id="q-titles" class="quick-grid"></div>
          <input type="text" id="reg-title" class="text-inp" placeholder="内容入力">
          
          <span class="section-title" style="margin-top:1vh;">詳細履歴（上位4件）</span>
          <div id="q-details" class="quick-grid"></div>
          <input type="text" id="reg-detail" class="text-inp" placeholder="具体的な詳細">
        </div>
        <div class="section-box">
          <span class="section-title">処置内容履歴</span>
          <div id="q-actions" class="quick-grid"></div>
          <input type="text" id="reg-act" class="text-inp" placeholder="実施した処置">
        </div>
      </div>

      <div class="modal-footer">
        <div class="config-group">
          <div class="toggle-row">
            <button id="stop-on" class="btn-toggle active" onclick="setStop(true)">⚠️ 停止あり</button>
            <button id="stop-off" class="btn-toggle" onclick="setStop(false)">✅ 停止なし</button>
          </div>
          <div id="time-area" class="time-spin-box">
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sh',1)">△</button><div class="spin-val" id="sh">08</div><button class="spin-btn" onclick="spin('sh',-1)">▽</button></div>
            <span style="font-weight:900;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sm',1)">△</button><div class="spin-val" id="sm">30</div><button class="spin-btn" onclick="spin('sm',-1)">▽</button></div>
            <span style="margin:0 10px; color:#999;">〜</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('eh',1)">△</button><div class="spin-val" id="eh">--</div><button class="spin-btn" onclick="spin('eh',-1)">▽</button></div>
            <span style="font-weight:900;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('em',1)">△</button><div class="spin-val" id="em">--</div><button class="spin-btn" onclick="spin('em',-1)">▽</button></div>
          </div>
        </div>
        <div class="action-group">
          <button class="btn-final btn-save" onclick="saveIssue()">変化点を登録</button>
          <button class="btn-final btn-close" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let curAct = 0;
let issues = [];
let regHasStop = true;

// 4M+α連動データ（実務的なプリセット）
const masterData = {
  '人': { t:['応援投入','体調不良','研修','作業遅れ'], d:['No.1ライン','応援者A','新人B','全工程'], a:['リーダー配置','休憩指示','教育実施','フォロー入'] },
  '設備': { t:['チョコ停','刃具折損','給油点検','センサー異常'], d:['OP-10','OP-20加工機','搬送コンベア','洗浄機'], a:['再起動','刃具交換','グリスアップ','清掃'] },
  '材料': { t:['欠品','ロット切替','異物混入','寸法不良'], d:['ボルト','メインパネル','パッキン','潤滑油'], a:['出庫依頼','初物確認','選別実施','測定確認'] },
  '方法': { t:['工程変更','タクト調整','治具交換','試作'], d:['順序変更','スピードUP','専用治具','新型'], a:['基準書更新','タイマー設定','位置調整','データ採取'] },
  '不良': { t:['外観傷','異音','動作不良','未加工'], d:['表面面粗度','駆動部','スイッチ','穴あけ箇所'], a:['全数選別','再研磨','基板交換','再加工'] },
  '投入': { t:['初物投入','先行投入','追加投入','順序変更'], d:['A製品','B製品','特注品','予備品'], a:['数量確認','計画更新','ライン投入','順番整理'] },
  '下車': { t:['完了下車','不適合下車','抜き取り','ライン清掃'], d:['パレットA','NG箱','品質確認用','終業点検'], a:['搬送完了','赤札貼付','検査室へ','清掃済'] }
};

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  if(!container) return;
  container.innerHTML = issues.sort((a,b)=>a.time.localeCompare(b.time)).map(i => `
    <div class="tl-row">
      <div class="tl-dot" style="border-color:${i.stop?'var(--accent)':'var(--safe)'}"></div>
      <div class="tl-item ${i.stop?'tl-right':'tl-left'}">
        <span style="font-family:'Share Tech Mono'; color:var(--accent)">${i.time}</span><br>
        ${i.title} (${i.detail})
      </div>
    </div>`).join('');
  lucide.createIcons();
}

function switchM4(btn) {
  document.querySelectorAll('.m4-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const type = btn.dataset.type;
  const data = masterData[type];
  const updateGrid = (id, list, targetId) => {
    document.getElementById(id).innerHTML = list.map(item => 
      `<button class="btn-quick" onclick="setVal('${targetId}','${item}')">${item}</button>`).join('');
  };
  updateGrid('q-titles', data.t, 'reg-title');
  updateGrid('q-details', data.d, 'reg-detail');
  updateGrid('q-actions', data.a, 'reg-act');
}

function openRegModal() {
  document.getElementById('regModal').classList.add('open');
  switchM4(document.querySelector('.m4-btn.active'));
}
function closeModal() { document.getElementById('regModal').classList.remove('open'); }
function setStop(s) {
  regHasStop = s;
  document.getElementById('stop-on').classList.toggle('active', s);
  document.getElementById('stop-off').classList.toggle('active', !s);
  document.getElementById('time-area').style.visibility = s ? 'visible' : 'hidden';
}
function spin(id, d) {
  const el = document.getElementById(id);
  let v = (el.innerText === "--") ? 0 : parseInt(el.innerText);
  if (id.includes('h')) v = (v + d + 24) % 24; else v = (v + d + 60) % 60;
  el.innerText = v.toString().padStart(2, '0');
}
function setVal(id, v) { document.getElementById(id).value = v; }
function changeVal(n) { curAct = Math.max(0, curAct + n); document.getElementById('disp-act').innerText = curAct; }

function saveIssue() {
  const time = `${document.getElementById('sh').innerText}:${document.getElementById('sm').innerText}`;
  issues.push({
    time, 
    title: document.getElementById('reg-title').value || "未設定",
    detail: document.getElementById('reg-detail').value || "詳細なし",
    stop: regHasStop
  });
  renderTimeline(); closeModal();
}

setInterval(() => {
  document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ja-JP', { hour12: false });
}, 1000);

document.addEventListener('DOMContentLoaded', () => {
  renderTimeline();
  lucide.createIcons();
});
</script>
</body>
</html>
