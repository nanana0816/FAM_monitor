<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM 入力 v15.5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }

/* 統合用モーダルスタイル */
.modal-overlay { display: flex; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
.modal-content { 
  background: #fff; width: 98vw; height: 95vh; border-radius: 16px; 
  display: flex; overflow: hidden; border-top: 8px solid var(--accent);
}

/* 左側：4M縦いっぱいボタン */
.m4-side-bar {
  flex: 0 0 15%;
  background: #f4f4f4;
  display: flex;
  flex-direction: column;
  border-right: 2px solid #ddd;
}
.m4-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  border: none;
  border-bottom: 1px solid #ddd;
  background: transparent;
  cursor: pointer;
  font-weight: 900;
  color: #666;
}
.m4-btn i { width: 40px; height: 40px; }
.m4-btn.active { background: var(--dark); color: #fff; }

/* 右側：メインコンテンツ */
.modal-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px;
  gap: 20px;
}

/* 入力エリア（内容・処置） */
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  flex: 1;
}
.section-label { font-size: 1rem; font-weight: 900; color: #333; margin-bottom: 10px; display: block; }
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.btn-quick { padding: 15px 10px; border: 2px solid #ddd; border-radius: 10px; background: #fff; font-weight: 700; text-align: center; font-size: 1.1rem; }
.btn-quick:active { background: #eee; }
.text-inp { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; font-weight: 700; }

/* 下部：設定とアクション */
.footer-controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  background: #f9f9f9;
  padding: 15px;
  border-radius: 12px;
}

/* 停止設定・時刻 */
.config-left { display: flex; flex-direction: column; gap: 15px; }
.toggle-row { display: flex; gap: 10px; }
.btn-toggle { flex: 1; padding: 15px; border-radius: 10px; border: 3px solid #ddd; background: #fff; font-weight: 900; font-size: 1.1rem; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }

/* 時刻スピナー（コンパクトかつ大型） */
.time-spin-box { display: flex; align-items: center; gap: 5px; }
.spin-unit { display: flex; flex-direction: column; align-items: center; }
.spin-btn { width: 60px; height: 40px; background: #eee; border: 1px solid #ccc; border-radius: 6px; font-weight: 900; font-size: 1.2rem; }
.spin-val { font-family: 'Share Tech Mono'; font-size: 2rem; font-weight: 700; width: 60px; text-align: center; }

/* 右下ボタン */
.action-right { display: flex; flex-direction: column; gap: 10px; }
.btn-main { width: 100%; padding: 20px; border-radius: 12px; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; }
.btn-reg { background: var(--accent); color: #fff; flex: 2; }
.btn-can { background: #888; color: #fff; flex: 1; }
</style>
</head>
<body>

<div class="modal-overlay">
  <div class="modal-content">
    <div class="m4-side-bar">
      <button class="m4-btn active" onclick="switchM4(this, '人')"><i data-lucide="user"></i>人</button>
      <button class="m4-btn" onclick="switchM4(this, '設備')"><i data-lucide="settings"></i>設備</button>
      <button class="m4-btn" onclick="switchM4(this, '材料')"><i data-lucide="package"></i>材料</button>
      <button class="m4-btn" onclick="switchM4(this, '方法')"><i data-lucide="info"></i>方法</button>
    </div>

    <div class="modal-main">
      <div class="input-grid">
        <div>
          <span class="section-label">変化点内容タップ</span>
          <div id="quick-titles" class="quick-grid">
            </div>
          <input type="text" id="reg-title" class="text-inp" placeholder="内容を直接入力">
        </div>
        <div>
          <span class="section-label">処置内容タップ</span>
          <div id="quick-actions" class="quick-grid">
            <button class="btn-quick" onclick="setVal('reg-act','リーダー報告')">リーダー報告</button>
            <button class="btn-quick" onclick="setVal('reg-act','再起動実施')">再起動実施</button>
            <button class="btn-quick" onclick="setVal('reg-act','基準値内確認')">基準値内確認</button>
            <button class="btn-quick" onclick="setVal('reg-act','清掃完了')">清掃完了</button>
          </div>
          <input type="text" id="reg-act" class="text-inp" placeholder="処置内容を直接入力">
        </div>
      </div>

      <div class="footer-controls">
        <div class="config-left">
          <div class="toggle-row">
            <button id="stop-on" class="btn-toggle active" onclick="setStop(true)">⚠️ 停止あり</button>
            <button id="stop-off" class="btn-toggle" onclick="setStop(false)">✅ 停止なし</button>
          </div>
          <div id="time-area" class="time-spin-box">
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sh',1)">△</button><div class="spin-val" id="sh">08</div><button class="spin-btn" onclick="spin('sh',-1)">▽</button></div>
            <span style="font-weight:900; font-size:1.5rem;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sm',1)">△</button><div class="spin-val" id="sm">35</div><button class="spin-btn" onclick="spin('sm',-1)">▽</button></div>
            <span style="margin:0 15px; color:#999; font-size:1.5rem;">〜</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('eh',1)">△</button><div class="spin-val" id="eh">--</div><button class="spin-btn" onclick="spin('eh',-1)">▽</button></div>
            <span style="font-weight:900; font-size:1.5rem;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('em',1)">△</button><div class="spin-val" id="em">--</div><button class="spin-btn" onclick="spin('em',-1)">▽</button></div>
          </div>
        </div>

        <div class="action-right">
          <button class="btn-main btn-reg" onclick="alert('登録')">登録</button>
          <button class="btn-main btn-can" onclick="alert('キャンセル')">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const m4Data = {
  '人': ['応援投入', '体調不良', '作業者変更', '研修実施'],
  '設備': ['チョコ停', '刃具折損', '給油点検', 'センサー異常'],
  '材料': ['欠品', 'ロット切替', '異物混入', '寸法バラツキ'],
  '方法': ['工程変更', 'タクト変更', '治具調整', '試作実施']
};

function switchM4(btn, type) {
  document.querySelectorAll('.m4-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  // クイックボタンの書き換え
  const container = document.getElementById('quick-titles');
  container.innerHTML = m4Data[type].map(t => 
    `<button class="btn-quick" onclick="setVal('reg-title','${t}')">${t}</button>`
  ).join('');
}

function setStop(hasStop) {
  document.getElementById('stop-on').classList.toggle('active', hasStop);
  document.getElementById('stop-off').classList.toggle('active', !hasStop);
  document.getElementById('time-area').style.visibility = hasStop ? 'visible' : 'hidden';
}

function spin(id, delta) {
  const el = document.getElementById(id);
  let v = (el.innerText === "--") ? 0 : parseInt(el.innerText);
  if (id.includes('h')) v = (v + delta + 24) % 24; else v = (v + delta + 60) % 60;
  el.innerText = v.toString().padStart(2, '0');
}

function setVal(id, val) { document.getElementById(id).value = val; }

document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  switchM4(document.querySelector('.m4-btn.active'), '人');
});
</script>
</body>
</html>
