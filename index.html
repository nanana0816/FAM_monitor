<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM 朝会モニター — ver7.6</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #E5E9F0; --panel: #FFFFFF; --accent: #B33F40; --teal: #2D8E8A;
  --amber: #D68910; --text: #232B2B; --border: #BDC3C7; --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--text); padding-bottom: 70px; font-size: 12px; line-height: 1.3; }

/* ヘッダー */
header { display: flex; align-items: center; justify-content: space-between; padding: 0 10px; height: 45px; background: #fff; border-bottom: 2px solid var(--accent); }
.h-title { font-size: 15px; font-weight: 900; color: var(--accent); }
.h-clock { font-family: 'Share Tech Mono', monospace; font-size: 20px; font-weight: 700; }

/* メイン 2x2 グリッド */
.main-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 8px; padding: 8px; height: calc(100vh - 120px); }
.card { background: var(--panel); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; }
.card-header { padding: 5px 10px; background: #f1f4f6; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 12px; color: #444; }
.card-body { flex: 1; overflow-y: auto; padding: 2px; }

/* テーブル圧縮 */
table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
th, td { padding: 4px 1px; border-bottom: 1px solid #edf2f7; border-right: 1px solid #f9f9f9; word-break: break-all; }
th { background: #f8fafc; font-size: 10px; color: #666; }
.t-left { text-align: left; padding-left: 5px; }

/* 状態バッジ・スタンプ */
.st-badge { padding: 1px 3px; border-radius: 3px; font-size: 10px; color: #fff; font-weight: 700; }
.bg-ng { background: var(--accent); }
.bg-ok { background: var(--teal); }
.bg-warn { background: var(--amber); }

/* 上長スタンプ（◯囲みデザイン） */
.stamp { display: inline-block; width: 20px; height: 20px; line-height: 18px; border: 1.5px solid var(--accent); border-radius: 50%; color: var(--accent); font-weight: 900; font-size: 10px; text-align: center; margin-right: 3px; vertical-align: middle; background: #fff; }
.stamp-factory { border-color: #333; color: #333; width: auto; border-radius: 4px; padding: 0 3px; }

/* モーダル */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; padding: 5px; align-items: flex-start; justify-content: center; }
.modal-content { background: #fff; width: 100%; max-width: 1200px; border-radius: var(--radius); position: relative; max-height: 98vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-header { padding: 10px; border-bottom: 2px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: #fff; z-index: 10; }
.modal-body { overflow: auto; flex: 1; padding: 0; }
.modal-close { font-size: 24px; cursor: pointer; border: none; background: none; color: #999; }

/* 下部ナビ */
.bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 55px; background: #fff; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 10px; z-index: 2001; }
.nav-btn { flex: 1; max-width: 140px; height: 38px; border: none; border-radius: 4px; font-weight: 700; color: #fff; font-size: 12px; cursor: pointer; }
.btn-red { background: var(--accent); }
.btn-dark { background: #34495E; }
</style>
</head>
<body>

<header>
  <div class="h-title">FAM 朝会モニター ver7.6</div>
  <div class="h-clock" id="hClock">00:00:00</div>
</header>

<main class="main-grid">
  <div class="card">
    <div class="card-header">👥 出勤状況</div>
    <div class="card-body">
      <table>
        <thead><tr><th class="t-left" style="width:40%;">ライン</th><th>出/欠</th><th>出勤率</th></tr></thead>
        <tbody id="mainAttendBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">⚠️ 遅れ・不良</div>
    <div class="card-body">
      <table>
        <thead><tr><th class="t-left" style="width:30%;">内容</th><th>状況</th><th>区分</th><th style="width:40%;">コメント</th></tr></thead>
        <tbody id="mainIssueBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">🏭 生産状況 (昨日)</div>
    <div class="card-body">
      <table>
        <thead><tr><th class="t-left">ライン</th><th>実/計</th><th>可動</th><th>停(分)/件</th></tr></thead>
        <tbody id="mainProdBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">📢 連絡事項</div>
    <div class="card-body">
      <table>
        <thead><tr><th class="t-left" style="width:75%;">内容</th><th>発信元</th></tr></thead>
        <tbody id="mainNoticeBody"></tbody>
      </table>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn btn-red" onclick="openM('qr')">📲 連携QR</button>
  <button class="nav-btn btn-dark" onclick="openM('attend')">出勤詳細</button>
  <button class="nav-btn btn-dark" onclick="openM('prod')">生産詳細</button>
</nav>

<div id="modalQR" class="modal-overlay">
  <div class="modal-content" style="max-width:300px; text-align:center;">
    <div class="modal-header"><b>QR連携</b><button class="modal-close" onclick="closeM('qr')">×</button></div>
    <div class="modal-body" style="padding:20px;"><div style="width:150px; height:150px; background:#eee; margin:auto; display:flex; align-items:center; justify-content:center;">QR CODE</div></div>
  </div>
</div>

<div id="modalAttend" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header"><b>出勤詳細 (当月累計)</b><button class="modal-close" onclick="closeM('attend')">×</button></div>
    <div class="modal-body">
      <table>
        <thead>
          <tr><th rowspan="2">ライン</th><th rowspan="2">氏名</th><th rowspan="2">現況</th><th colspan="5" style="background:#eee;">当月累計</th></tr>
          <tr><th>年休</th><th>AM半</th><th>PM半</th><th>遅</th><th>早</th></tr>
        </thead>
        <tbody id="detailAttendBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="modalProd" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header"><b>生産詳細 (3階層)</b><button class="modal-close" onclick="closeM('prod')">×</button></div>
    <div class="modal-body"><table id="detailProdTable"></table></div>
  </div>
</div>

<script>
const DATA = {
  attend: [
    { line: '大型エンジン', on: 22, total: 24, rate: 91.6, members: [{name:'田中', st:'出勤', n:1, am:0, pm:1, c:0, s:0}, {name:'佐藤', st:'欠勤', n:2, am:1, pm:0, c:1, s:2}] },
    { line: '中型トランス', on: 18, total: 18, rate: 100, members: [{name:'鈴木', st:'出勤', n:0, am:0, pm:0, c:0, s:0}] }
  ],
  prod: [
    { line: '大型エンジン', res: 48, plan: 50, rate: 89, stopTime: 25, stopCnt: 3 },
    { line: '中型トランス', res: 75, plan: 72, rate: 98, stopTime: 5, stopCnt: 1 }
  ],
  issues: [
    { content: 'U1コンベア停止', status: '継続中', cat: 'Machine', comment: '了解👌', boss: '課' },
    { content: '加工精度バラツキ', status: '対応済', cat: 'Method', comment: '横展開', boss: '工' },
    { content: '治具破損', status: '経過観察', cat: 'Material', comment: '再発防止', boss: '部' }
  ],
  notices: [
    { content: '【災害】他工場での挟まれ災害展開', from: '安全推進室' },
    { content: '週末の生産調整に伴う残業停止', from: '生産管理' },
    { content: '防火3S活動：Bエリア重点点検', from: '総務' }
  ]
};

function render() {
  // 出勤
  let aH = '';
  DATA.attend.forEach(l => {
    aH += `<tr><td class="t-left">${l.line}</td><td>${l.on}/${l.total}</td><td><span class="st-badge ${l.rate<95?'bg-ng':'bg-ok'}">${l.rate}</span></td></tr>`;
  });
  document.getElementById('mainAttendBody').innerHTML = aH;

  // 生産
  let pH = '';
  DATA.prod.forEach(l => {
    pH += `<tr><td class="t-left">${l.line}</td><td class="${l.res<l.plan?'ng':''}">${l.res}/${l.plan}</td><td><span class="st-badge ${l.rate<90?'bg-ng':'bg-ok'}">${l.rate}</span></td><td>${l.stopTime}/${l.stopCnt}</td></tr>`;
  });
  document.getElementById('mainProdBody').innerHTML = pH;

  // 遅れ・不良
  let iH = '';
  DATA.issues.forEach(i => {
    const stCol = i.status === '継続中' ? 'color:var(--accent);font-weight:900;' : '';
    iH += `<tr><td class="t-left">${i.content}</td><td style="${stCol}">${i.status}</td><td>${i.cat}</td>
    <td class="t-left"><span class="stamp">${i.boss}</span>${i.comment}</td></tr>`;
  });
  document.getElementById('mainIssueBody').innerHTML = iH;

  // 連絡事項
  let nH = '';
  DATA.notices.forEach(n => {
    nH += `<tr><td class="t-left">${n.content}</td><td>${n.from}</td></tr>`;
  });
  document.getElementById('mainNoticeBody').innerHTML = nH;
}

function openM(id) {
  const m = document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1));
  if(m) {
    m.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    if(id === 'attend') renderAttendDetail();
  }
}
function closeM(id) {
  document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).style.display = 'none';
  document.body.style.overflow = 'auto';
}

function renderAttendDetail() {
  let html = '';
  DATA.attend.forEach(l => {
    l.members.forEach(m => {
      html += `<tr><td>${l.line}</td><td>${m.name}</td><td>${m.st}</td><td>${m.n}</td><td>${m.am}</td><td>${m.pm}</td><td>${m.c}</td><td>${m.s}</td></tr>`;
    });
  });
  document.getElementById('detailAttendBody').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  setInterval(() => { document.getElementById('hClock').textContent = new Date().toLocaleTimeString('ja-JP',{hour12:false}); }, 1000);
  render();
});
</script>
</body>
</html>
