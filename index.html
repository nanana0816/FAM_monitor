<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM 入力 v15.2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --dark: #263238; --border: #BDBDBD; --radius: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }

/* モーダル基本構造 */
.modal-overlay { display: flex; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
.modal-content { 
  background: #fff; width: 95vw; max-width: 1000px; height: 90vh; border-radius: 16px; 
  display: flex; flex-direction: column; overflow: hidden; border-top: 8px solid var(--accent);
}
.modal-header { padding: 10px 20px; background: #eee; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: space-between; }
.modal-body { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

/* 停止あり/なしの選択 (表示順: 停止あり 停止なし) */
.toggle-row { display: flex; gap: 10px; flex-shrink: 0; }
.btn-toggle { flex: 1; padding: 15px; border-radius: 10px; border: 3px solid #ddd; background: #f9f9f9; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }

/* 大型時刻入力エリア */
#time-section { display: block; background: #f8f9fa; padding: 10px; border-radius: 12px; border: 1px solid #ddd; }
.time-spinner-container { display: flex; align-items: center; justify-content: center; gap: 5px; }
.spinner-unit { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.spin-btn { 
  background: #fff; border: 2px solid #ccc; width: 80px; height: 50px; 
  font-size: 1.8rem; font-weight: 900; color: var(--dark); border-radius: 8px; cursor: pointer;
}
.spin-btn:active { background: #eee; }
.spin-val { font-family: 'Share Tech Mono'; font-size: 2.5rem; font-weight: 700; width: 80px; text-align: center; }
.time-sep { font-size: 2rem; font-weight: 900; padding: 0 5px; }
.time-range-sep { font-size: 2rem; margin: 0 20px; font-weight: 400; color: #999; }

/* 区分ボタン (7種) */
.m4-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.m4-chip { 
  padding: 12px 5px; background: #eee; border-radius: 10px; font-size: 0.85rem; font-weight: 900; 
  display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; border: 2px solid transparent;
}
.m4-chip.active { border-color: var(--dark); background: var(--dark); color: #fff; }

/* 入力エリア (2列レイアウト) */
.input-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.section-label { font-size: 0.9rem; font-weight: 900; color: #555; margin-bottom: 5px; }
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.btn-quick { padding: 12px 8px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.9rem; font-weight: 700; text-align: left; }
.text-inp { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; font-weight: 700; }

/* フッターボタン */
.modal-footer { padding: 15px; display: flex; gap: 15px; border-top: 1px solid #eee; }
.btn-main { flex: 1; padding: 18px; border-radius: 12px; border: none; font-size: 1.2rem; font-weight: 900; cursor: pointer; }
.btn-cancel { background: #888; color: #fff; }
.btn-submit { background: var(--accent); color: #fff; flex: 2; }
</style>
</head>
<body>

<div class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">変化点入力 / CHANGE POINT</div>
    
    <div class="modal-body">
      <div class="toggle-row">
        <button id="stop-yes" class="btn-toggle active" onclick="setStop(true)">⚠️ 停止あり</button>
        <button id="stop-no" class="btn-toggle" onclick="setStop(false)">✅ 停止なし</button>
      </div>

      <div id="time-section">
        <div class="time-spinner-container">
          <div class="spinner-unit">
            <button class="spin-btn" onclick="spin('sh',1)">△</button>
            <div class="spin-val" id="sh">08</div>
            <button class="spin-btn" onclick="spin('sh',-1)">▽</button>
          </div>
          <div class="time-sep">:</div>
          <div class="spinner-unit">
            <button class="spin-btn" onclick="spin('sm',1)">△</button>
            <div class="spin-val" id="sm">35</div>
            <button class="spin-btn" onclick="spin('sm',-1)">▽</button>
          </div>
          <div class="time-range-sep">〜</div>
          <div class="spinner-unit">
            <button class="spin-btn" onclick="spin('eh',1)">△</button>
            <div class="spin-val" id="eh">--</div>
            <button class="spin-btn" onclick="spin('eh',-1)">▽</button>
          </div>
          <div class="time-sep">:</div>
          <div class="spinner-unit">
            <button class="spin-btn" onclick="spin('em',1)">△</button>
            <div class="spin-val" id="em">--</div>
            <button class="spin-btn" onclick="spin('em',-1)">▽</button>
          </div>
        </div>
      </div>

      <div class="m4-grid">
        <div class="m4-chip active" onclick="selM4(this)"><i data-lucide="user"></i>人</div>
        <div class="m4-chip" onclick="selM4(this)"><i data-lucide="settings"></i>設備</div>
        <div class="m4-chip" onclick="selM4(this)"><i data-lucide="package"></i>材料</div>
        <div class="m4-chip" onclick="selM4(this)"><i data-lucide="info"></i>方法</div>
        <div class="m4-chip" onclick="selM4(this)"><i data-lucide="alert-triangle"></i>不良品</div>
        <div class="m4-chip" onclick="selM4(this)"><i data-lucide="log-in"></i>投入</div>
        <div class="m4-chip" onclick="selM4(this)"><i data-lucide="log-out"></i>下車</div>
      </div>

      <div class="input-columns">
        <div>
          <div class="section-label">変化点内容（上位4件）</div>
          <div class="quick-grid">
            <button class="btn-quick" onclick="setVal('in-title','チョコ停')">チョコ停</button>
            <button class="btn-quick" onclick="setVal('in-title','初物確認')">初物確認</button>
            <button class="btn-quick" onclick="setVal('in-title','清掃点検')">清掃点検</button>
            <button class="btn-quick" onclick="setVal('in-title','刃具交換')">刃具交換</button>
          </div>
          <input type="text" id="in-title" class="text-inp" placeholder="内容入力">
        </div>
        <div>
          <div class="section-label">処置内容（上位4件）</div>
          <div class="quick-grid">
            <button class="btn-quick" onclick="setVal('in-act','再起動実施')">再起動実施</button>
            <button class="btn-quick" onclick="setVal('in-act','基準値内確認')">基準値内確認</button>
            <button class="btn-quick" onclick="setVal('in-act','清掃実施')">清掃実施</button>
            <button class="btn-quick" onclick="setVal('in-act','上長報告')">上長報告</button>
          </div>
          <input type="text" id="in-act" class="text-inp" placeholder="処置内容入力">
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-main btn-cancel" onclick="alert('キャンセル')">キャンセル</button>
      <button class="btn-main btn-submit" onclick="alert('登録')">登録</button>
    </div>
  </div>
</div>

<script>
// 停止有無の制御
function setStop(hasStop) {
  document.getElementById('stop-yes').classList.toggle('active', hasStop);
  document.getElementById('stop-no').classList.toggle('active', !hasStop);
  document.getElementById('time-section').style.display = hasStop ? 'block' : 'none';
}

// スピナー制御 (△▽ボタン)
function spin(id, delta) {
  const el = document.getElementById(id);
  let val = el.innerText;
  
  if (val === "--") {
    val = (id.includes('h')) ? new Date().getHours() : 0;
  } else {
    val = parseInt(val);
  }

  if (id.includes('h')) {
    val = (val + delta + 24) % 24;
  } else {
    val = (val + delta + 60) % 60;
  }
  el.innerText = val.toString().padStart(2, '0');
}

// 区分選択
function selM4(target) {
  document.querySelectorAll('.m4-chip').forEach(c => c.classList.remove('active'));
  target.classList.add('active');
}

// タップボタンで入力
function setVal(id, val) {
  document.getElementById(id).value = val;
}

document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
});
</script>
</body>
</html>
