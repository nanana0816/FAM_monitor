<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM 入力 v15.6</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
  --header-h: 12vh;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100vh; width: 100vw; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--dark); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ヘッダー */
header { flex: 0 0 var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; background: #fff; border-bottom: 4px solid var(--accent); z-index: 1000; }
.h-clock { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; color: var(--accent); }

main { flex: 1; display: flex; padding: 8px; gap: 8px; height: calc(100vh - var(--header-h)); }
.col-left { flex: 0 0 42%; display: flex; flex-direction: column; gap: 8px; }
.col-right { flex: 1; display: flex; flex-direction: column; }
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; height: 100%; }
.card-header { padding: 6px 12px; background: #fafafa; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 6px; flex-shrink: 0; font-weight: 900; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* 実績カード下部情報 */
.card-footer-info { margin-top: auto; padding-top: 10px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
.rd-group { display: flex; gap: 1.5vw; align-items: center; justify-content: center; }
.rd-icon { font-family: 'Share Tech Mono'; font-weight: 900; color: #ccc; font-size: 1rem; }
.rd-icon.active { color: var(--accent); font-size: 1.8rem; transform: scale(1.1); }
.total-item { background: #f0f0f0; padding: 8px; border-radius: 4px; border-left: 4px solid var(--dark); text-align: center; }
.total-val-box { font-family: 'Share Tech Mono'; font-size: 1.5rem; font-weight: 700; }

/* タイムライン */
.tl-label-row { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: 900; font-size: 0.8rem; color: #666; background: #fdfdfd; border-bottom: 1px solid #eee; }
.tl-label-left { color: var(--safe); }
.tl-label-right { color: var(--accent); }
.timeline-scroll-area { flex: 1; overflow-y: auto; padding: 20px 0; position: relative; }
#timeline-container { position: relative; width: 100%; min-height: 100%; }
#timeline-container::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ddd; transform: translateX(-50%); }
.tl-row { display: flex; width: 100%; margin-bottom: 20px; position: relative; z-index: 1; align-items: center; cursor: pointer; }
.tl-item { width: 45%; display: flex; align-items: center; gap: 8px; }
.tl-left { justify-content: flex-end; padding-right: 5px; text-align: right; }
.tl-right { justify-content: flex-start; padding-left: 5px; text-align: left; margin-left: 55%; }
.tl-dot { width: 12px; height: 12px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
.tl-time { font-family: 'Share Tech Mono'; font-weight: 900; font-size: 0.9rem; }
.tl-content { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; color: #fff; margin-left: 5px; }
.st-stop { background: var(--accent); }
.st-done { background: var(--safe); }

/* モーダル基本構造 (v15.5仕様) */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-content { background: #fff; width: 98vw; height: 95vh; border-radius: 16px; display: flex; overflow: hidden; border-top: 8px solid var(--accent); }

/* 左側：4M縦ボタン */
.m4-side-bar { flex: 0 0 15%; background: #f4f4f4; display: flex; flex-direction: column; border-right: 2px solid #ddd; }
.m4-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; border: none; border-bottom: 1px solid #ddd; background: transparent; cursor: pointer; font-weight: 900; color: #666; }
.m4-btn i { width: 40px; height: 40px; }
.m4-btn.active { background: var(--dark); color: #fff; }

/* 右側：メイン操作 */
.modal-main { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 15px; }
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex: 1; }
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.btn-quick { padding: 15px 10px; border: 2px solid #ddd; border-radius: 10px; background: #fff; font-weight: 700; font-size: 1.1rem; text-align: center; }
.text-inp { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.2rem; font-weight: 700; }

.footer-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f9f9f9; padding: 15px; border-radius: 12px; }
.btn-toggle { flex: 1; padding: 15px; border-radius: 10px; border: 3px solid #ddd; background: #fff; font-weight: 900; font-size: 1.1rem; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }

/* 時刻スピナー */
.time-spin-box { display: flex; align-items: center; gap: 5px; margin-top: 10px; }
.spin-unit { display: flex; flex-direction: column; align-items: center; }
.spin-btn { width: 60px; height: 40px; background: #eee; border: 1px solid #ccc; border-radius: 6px; font-weight: 900; }
.spin-val { font-family: 'Share Tech Mono'; font-size: 2rem; font-weight: 700; width: 60px; text-align: center; }

.btn-main { width: 100%; padding: 20px; border-radius: 12px; border: none; font-size: 1.5rem; font-weight: 900; cursor: pointer; }
.btn-reg { background: var(--accent); color: #fff; }
.btn-can { background: #888; color: #fff; }
</style>
</head>
<body>

<header>
  <div class="h-left"><div class="h-title">FAM-PM <small>INPUT</small></div></div>
  <div class="h-right"><div class="h-clock" id="live-clock">00:00:00</div></div>
</header>

<main>
  <div class="col-left">
    <section class="card">
      <div class="card-header"><i data-lucide="edit-3" size="14"></i>実績入力</div>
      <div class="card-body">
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:10px;">
          <button class="btn-main" style="width:8vh;height:8vh;background:#eee;padding:0;font-size:2rem;color:black;" onclick="changeVal(-1)">-</button>
          <div style="font-family:'Share Tech Mono'; font-size:4rem; font-weight:700; color:var(--accent);" id="disp-act">0</div>
          <button class="btn-main" style="width:8vh;height:8vh;background:#eee;padding:0;font-size:2rem;color:black;" onclick="changeVal(1)">+</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
          <button class="btn-main" style="flex:1; background:var(--accent); color:#fff; font-size:1.2rem;" onclick="alert('実績保存')">登録</button>
          <button class="btn-main" style="flex:1; background:var(--dark); color:#fff; font-size:1.2rem;" onclick="openRegModal()">変化点</button>
        </div>
        <div class="card-footer-info">
          <div id="rd-display-area" class="rd-group"></div>
          <div class="total-item">
            <div style="font-size:0.7rem; font-weight:900; color:#666; margin-bottom:2px;">LINE TOTAL (ACTUAL / PLAN)</div>
            <div class="total-val-box"><span id="total-act">562</span> / <span id="total-plan" style="color:#888">584</span></div>
          </div>
        </div>
      </div>
    </section>
  </div>
  <div class="col-right">
    <section class="card">
      <div class="card-header"><i data-lucide="clock" size="14"></i>変化点タイムライン</div>
      <div class="tl-label-row"><div class="tl-label-left">← 停止なし</div><div class="tl-label-right">停止あり →</div></div>
      <div class="card-body">
        <div class="timeline-scroll-area"><div id="timeline-container"></div></div>
      </div>
    </section>
  </div>
</main>

<div id="regModal" class="modal-overlay">
  <div class="modal-content">
    <div class="m4-side-bar">
      <button class="m4-btn active" data-type="人" onclick="switchM4(this)"><i data-lucide="user"></i>人</button>
      <button class="m4-btn" data-type="設備" onclick="switchM4(this)"><i data-lucide="settings"></i>設備</button>
      <button class="m4-btn" data-type="材料" onclick="switchM4(this)"><i data-lucide="package"></i>材料</button>
      <button class="m4-btn" data-type="方法" onclick="switchM4(this)"><i data-lucide="info"></i>方法</button>
    </div>
    <div class="modal-main">
      <div class="input-grid">
        <div>
          <span style="font-weight:900; margin-bottom:5px; display:block;">内容タップ</span>
          <div id="quick-titles" class="quick-grid"></div>
          <input type="text" id="reg-title" class="text-inp" placeholder="内容入力">
        </div>
        <div>
          <span style="font-weight:900; margin-bottom:5px; display:block;">処置内容タップ</span>
          <div id="quick-actions" class="quick-grid">
            <button class="btn-quick" onclick="setVal('reg-act','リーダー報告')">リーダー報告</button>
            <button class="btn-quick" onclick="setVal('reg-act','再起動実施')">再起動実施</button>
            <button class="btn-quick" onclick="setVal('reg-act','基準値内確認')">基準値内確認</button>
            <button class="btn-quick" onclick="setVal('reg-act','清掃完了')">清掃完了</button>
          </div>
          <input type="text" id="reg-act" class="text-inp" placeholder="処置内容入力">
        </div>
      </div>
      <div class="footer-controls">
        <div class="config-left">
          <div style="display:flex; gap:10px;">
            <button id="stop-on" class="btn-toggle active" onclick="setStop(true)">⚠️ 停止あり</button>
            <button id="stop-off" class="btn-toggle" onclick="setStop(false)">✅ 停止なし</button>
          </div>
          <div id="time-area" class="time-spin-box">
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sh',1)">△</button><div class="spin-val" id="sh">08</div><button class="spin-btn" onclick="spin('sh',-1)">▽</button></div>
            <span style="font-weight:900;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('sm',1)">△</button><div class="spin-val" id="sm">35</div><button class="spin-btn" onclick="spin('sm',-1)">▽</button></div>
            <span style="margin:0 15px; color:#999;">〜</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('eh',1)">△</button><div class="spin-val" id="eh">--</div><button class="spin-btn" onclick="spin('eh',-1)">▽</button></div>
            <span style="font-weight:900;">:</span>
            <div class="spin-unit"><button class="spin-btn" onclick="spin('em',1)">△</button><div class="spin-val" id="em">--</div><button class="spin-btn" onclick="spin('em',-1)">▽</button></div>
          </div>
        </div>
        <div class="action-right" style="display:flex; flex-direction:column; gap:10px;">
          <button class="btn-main btn-reg" onclick="saveIssue()">登録</button>
          <button class="btn-main btn-can" onclick="closeModal()">キャンセル</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let curAct = 0;
let issues = [
  { id: 1, time: "08:15", icon: "user", title: "応援投入", action: "リーダーより1名配置", stop: false, status: "対応済み", m4: "人" },
  { id: 2, time: "09:10", icon: "settings", title: "刃具折損", action: "予備に交換中", stop: true, status: "停止中", m4: "設備" }
];
const m4Data = {
  '人': ['応援投入', '体調不良', '作業者変更', '研修実施'],
  '設備': ['チョコ停', '刃具折損', '給油点検', 'センサー異常'],
  '材料': ['欠品', 'ロット切替', '異物混入', '寸法バラツキ'],
  '方法': ['工程変更', 'タクト変更', '治具調整', '試作実施']
};
let regHasStop = true;

function renderTimeline() {
  issues.sort((a,b) => a.time.localeCompare(b.time));
  const container = document.getElementById('timeline-container');
  container.innerHTML = issues.map(i => {
    const sideClass = i.stop ? 'tl-right' : 'tl-left';
    return `
      <div class="tl-row" onclick="alert('詳細画面へ')">
        <div class="tl-dot" style="border-color:${i.stop ? 'var(--accent)' : 'var(--safe)'}"></div>
        <div class="tl-item ${sideClass}">
          <span class="tl-time">${i.time}</span>
          <i data-lucide="${i.icon}" size="14"></i>
          <span class="tl-content">${i.title}<span class="status-badge ${i.stop ? 'st-stop':'st-done'}">${i.stop?'停止中':'済'}</span></span>
        </div>
      </div>`;
  }).join('');
  lucide.createIcons();
}

function openRegModal() {
  const now = new Date();
  document.getElementById('sh').innerText = now.getHours().toString().padStart(2, '0');
  document.getElementById('sm').innerText = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('regModal').classList.add('open');
  switchM4(document.querySelector('.m4-btn.active'));
}

function closeModal() { document.getElementById('regModal').classList.remove('open'); }

function switchM4(btn) {
  document.querySelectorAll('.m4-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const type = btn.dataset.type;
  document.getElementById('quick-titles').innerHTML = m4Data[type].map(t => 
    `<button class="btn-quick" onclick="setVal('reg-title','${t}')">${t}</button>`).join('');
}

function setStop(s) {
  regHasStop = s;
  document.getElementById('stop-on').classList.toggle('active', s);
  document.getElementById('stop-off').classList.toggle('active', !s);
  document.getElementById('time-area').style.visibility = s ? 'visible' : 'hidden';
}

function spin(id, delta) {
  const el = document.getElementById(id);
  let v = (el.innerText === "--") ? 0 : parseInt(el.innerText);
  if (id.includes('h')) v = (v + delta + 24) % 24; else v = (v + delta + 60) % 60;
  el.innerText = v.toString().padStart(2, '0');
}

function setVal(id, v) { document.getElementById(id).value = v; }

function saveIssue() {
  const title = document.getElementById('reg-title').value || "新規変化点";
  const iconMap = { '人':'user', '設備':'settings', '材料':'package', '方法':'info' };
  const type = document.querySelector('.m4-btn.active').dataset.type;
  issues.push({
    id: Date.now(),
    time: `${document.getElementById('sh').innerText}:${document.getElementById('sm').innerText}`,
    icon: iconMap[type],
    title: title,
    stop: regHasStop,
    status: regHasStop ? "停止中" : "対応済み"
  });
  renderTimeline(); closeModal();
}

function changeVal(n) { curAct += n; document.getElementById('disp-act').innerText = Math.max(0, curAct); }

setInterval(() => {
  document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ja-JP', { hour12: false });
}, 1000);

document.addEventListener('DOMContentLoaded', () => {
  renderTimeline();
  document.getElementById('rd-display-area').innerHTML = '<span class="rd-icon active">1rd</span><span class="rd-icon">2rd</span>';
});
</script>
</body>
</html>
