<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FAM-PM 入力 v15.1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
  --bg: #F0F2F5; --accent: #D32F2F; --safe: #00897B; --dark: #263238; --border: #BDBDBD; --radius: 12px;
  --header-h: 12vh;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100vh; width: 100vw; background: var(--bg); font-family: 'Noto Sans JP', sans-serif; color: var(--dark); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ヘッダー・基本構造 (既存維持) */
header { flex: 0 0 var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 4vw; background: #fff; border-bottom: 4px solid var(--accent); z-index: 1000; }
.h-center { display: flex; align-items: center; gap: 3vw; flex: 2; justify-content: center; }
.rd-group { display: flex; gap: 1.5vw; align-items: center; }
.rd-icon { font-family: 'Share Tech Mono'; font-weight: 900; transition: all 0.3s; color: #ccc; font-size: 1rem; }
.rd-icon.active { color: var(--accent); font-size: 1.8rem; transform: scale(1.1); }
.total-item { background: #f0f0f0; padding: 4px 10px; border-radius: 4px; border-left: 4px solid var(--dark); min-width: 120px; }
.total-val-box { font-family: 'Share Tech Mono'; font-size: 1.2rem; font-weight: 700; }
.h-clock { font-family: 'Share Tech Mono'; font-size: 1.8rem; font-weight: 700; color: var(--accent); }

main { flex: 1; display: flex; padding: 8px; gap: 8px; height: calc(100vh - var(--header-h)); }
.col-left { flex: 0 0 42%; display: flex; flex-direction: column; gap: 8px; }
.col-right { flex: 1; display: flex; flex-direction: column; }
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; height: 100%; }
.card-header { padding: 6px 12px; background: #fafafa; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

/* タイムライン：見出しとスクロール */
.tl-label-row { display: flex; justify-content: space-between; padding: 5px 15px; font-weight: 900; font-size: 0.8rem; color: #666; background: #fdfdfd; border-bottom: 1px solid #eee; }
.tl-label-left { color: var(--safe); }
.tl-label-right { color: var(--accent); }

.timeline-scroll-area { flex: 1; overflow-y: auto; padding: 20px 0; position: relative; }
#timeline-container { position: relative; width: 100%; min-height: 100%; }
#timeline-container::before { content: ""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ddd; transform: translateX(-50%); z-index: 0; }

.tl-row { display: flex; width: 100%; margin-bottom: 20px; position: relative; z-index: 1; align-items: center; cursor: pointer; }
.tl-item { width: 45%; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
.tl-item:active { opacity: 0.6; }
.tl-left { justify-content: flex-end; padding-right: 5px; text-align: right; margin-left: 0; }
.tl-right { justify-content: flex-start; padding-left: 5px; text-align: left; margin-left: 55%; }

.tl-dot { width: 12px; height: 12px; background: #fff; border: 3px solid var(--accent); border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
.tl-time { font-family: 'Share Tech Mono'; font-weight: 900; font-size: 0.9rem; }
.tl-content { font-size: 0.85rem; font-weight: 700; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* モーダル共通スタイル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-content { background: #fff; width: 90vw; max-width: 800px; max-height: 95vh; border-radius: 16px; border-top: 6px solid var(--accent); display: flex; flex-direction: column; }
.modal-body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; }

/* ステータスバッジ */
.status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; color: #fff; margin-left: 5px; }
.st-stop { background: var(--accent); }
.st-ongoing { background: #FFA000; }
.st-done { background: var(--safe); }

/* 入力・選択系 */
.full-col { grid-column: span 2; }
.input-label { font-size: 0.8rem; font-weight: 900; color: #666; margin-bottom: 5px; display: block; }
.text-inp { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1.1rem; font-weight: 700; }
.btn-toggle-row { display: flex; gap: 8px; }
.btn-toggle { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #ddd; background: #f9f9f9; font-weight: 900; cursor: pointer; }
.btn-toggle.active { border-color: var(--accent); background: #fff0f0; color: var(--accent); }

/* カウンター・ボタン */
.btn { padding: 1.5vh 0; border: none; border-radius: 10px; font-weight: 900; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-calc { width: 8vh; height: 8vh; border-radius: 12px; border: none; background: #eee; font-size: 2.5rem; font-weight: 900; }
</style>
</head>
<body>

<header>
  <div class="h-left"><div class="h-title">FAM-PM <small>INPUT</small></div></div>
  <div class="h-center">
    <div class="rd-group" id="rd-display-area"></div>
    <div class="total-item">
      <div class="total-val-box"><span id="total-act">562</span> / <span id="total-plan" style="color:#888">584</span></div>
    </div>
  </div>
  <div class="h-right"><div class="h-clock" id="live-clock">00:00:00</div></div>
</header>

<main>
  <div class="col-left">
    <section class="card">
      <div class="card-header"><i data-lucide="edit-3" size="14"></i><span class="ch-ja">実績入力</span></div>
      <div class="card-body">
        <div class="counter-container" style="display:flex; justify-content:center; align-items:center; gap:20px;">
          <button class="btn-calc" onclick="changeVal(-1)">-</button>
          <div style="font-family:'Share Tech Mono'; font-size:4rem; font-weight:700; color:var(--accent);" id="disp-act">0</div>
          <button class="btn-calc" onclick="changeVal(1)">+</button>
        </div>
        <div class="action-btns" style="display:flex; gap:10px;">
          <button class="btn btn-primary" style="flex:1; background:var(--accent); color:#fff;" onclick="alert('保存')">登録</button>
          <button class="btn btn-dark" style="flex:1; background:var(--dark); color:#fff;" onclick="openRegModal()">変化点</button>
        </div>
      </div>
    </section>
  </div>
  <div class="col-right">
    <section class="card">
      <div class="card-header"><i data-lucide="clock" size="14"></i><span class="ch-ja">変化点タイムライン</span></div>
      <div class="tl-label-row">
        <div class="tl-label-left">← 停止なし</div>
        <div class="tl-label-right">停止あり →</div>
      </div>
      <div class="card-body">
        <div class="timeline-scroll-area">
          <div id="timeline-container"></div>
        </div>
      </div>
    </section>
  </div>
</main>

<div id="detailModal" class="modal-overlay">
  <div class="modal-content" style="border-top-color: var(--dark);">
    <div class="card-header"><i data-lucide="info"></i><span class="ch-ja">変化点詳細確認・更新</span></div>
    <div class="modal-body">
      <div class="full-col">
        <span class="input-label">事象内容</span>
        <input type="text" id="det-title" class="text-inp">
      </div>
      <div class="full-col">
        <span class="input-label">処置内容</span>
        <input type="text" id="det-action" class="text-inp">
      </div>
      <div>
        <span class="input-label">時刻</span>
        <div id="det-time" style="font-family:'Share Tech Mono'; font-size:1.5rem; font-weight:700;"></div>
      </div>
      <div>
        <span class="input-label">区分</span>
        <div id="det-m4" style="font-weight:900; font-size:1.2rem;"></div>
      </div>
      <div class="full-col">
        <span class="input-label">現在の状況ステータス</span>
        <div class="btn-toggle-row" id="det-status-group">
          <button class="btn-toggle" onclick="setDetStatus('停止中')">停止中</button>
          <button class="btn-toggle" onclick="setDetStatus('継続中')">継続中</button>
          <button class="btn-toggle" onclick="setDetStatus('対応済み')">対応済み</button>
        </div>
      </div>
      <div class="full-col" style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn btn-dark" style="flex:1; background:#888; color:#fff;" onclick="closeModal('detailModal')">閉じる</button>
        <button class="btn btn-primary" style="flex:2; background:var(--dark); color:#fff;" onclick="updateIssue()">情報を更新</button>
      </div>
    </div>
  </div>
</div>

<div id="regModal" class="modal-overlay">
  <div class="modal-content">
    <div class="card-header"><span class="ch-ja">変化点登録</span></div>
    <div class="modal-body" id="reg-body">
      <div class="stop-toggle-box full-col" style="display:flex; gap:10px;">
         <button id="reg-stop-on" class="btn-toggle active" onclick="toggleRegStop(true)">⚠️ 停止あり</button>
         <button id="reg-stop-off" class="btn-toggle" onclick="toggleRegStop(false)">✅ 停止なし</button>
       </div>
       <div class="full-col">
         <input type="text" id="reg-title" class="text-inp" placeholder="内容入力">
       </div>
       <div class="full-col">
         <button class="btn btn-primary" style="background:var(--accent); color:#fff; width:100%;" onclick="saveNewIssue()">新規登録</button>
         <button class="btn" style="width:100%; margin-top:10px; background:#eee;" onclick="closeModal('regModal')">キャンセル</button>
       </div>
    </div>
  </div>
</div>

<script>
let issues = [
  { id: 1, time: "08:15", icon: "user", title: "応援投入", action: "リーダーより1名配置", stop: false, status: "対応済み", m4: "人" },
  { id: 2, time: "09:10", icon: "settings", title: "刃具折損", action: "予備に交換中", stop: true, status: "停止中", m4: "設備" }
];
let currentDetailId = null;
let regHasStop = true;

function renderTimeline() {
  issues.sort((a,b) => a.time.localeCompare(b.time));
  const container = document.getElementById('timeline-container');
  container.innerHTML = issues.map(i => {
    const sideClass = i.stop ? 'tl-right' : 'tl-left';
    const statusClass = i.status==='停止中'?'st-stop':(i.status==='継続中'?'st-ongoing':'st-done');
    return `
      <div class="tl-row" onclick="openDetail(${i.id})">
        <div class="tl-dot" style="border-color: ${i.stop ? 'var(--accent)' : 'var(--safe)'}"></div>
        <div class="tl-item ${sideClass}">
          <span class="tl-time">${i.time}</span>
          <span class="tl-icon"><i data-lucide="${i.icon}" size="16"></i></span>
          <span class="tl-content">${i.title}<span class="status-badge ${statusClass}">${i.status}</span></span>
        </div>
      </div>
    `;
  }).join('');
  lucide.createIcons();
}

function openDetail(id) {
  const issue = issues.find(i => i.id === id);
  currentDetailId = id;
  document.getElementById('det-title').value = issue.title;
  document.getElementById('det-action').value = issue.action || "";
  document.getElementById('det-time').innerText = issue.time + (issue.stop ? " (停止あり)" : " (停止なし)");
  document.getElementById('det-m4').innerText = issue.m4;
  setDetStatus(issue.status);
  document.getElementById('detailModal').classList.add('open');
}

function setDetStatus(status) {
  const btns = document.querySelectorAll('#det-status-group .btn-toggle');
  btns.forEach(b => {
    b.classList.toggle('active', b.innerText === status);
  });
}

function updateIssue() {
  const issue = issues.find(i => i.id === currentDetailId);
  issue.title = document.getElementById('det-title').value;
  issue.action = document.getElementById('det-action').value;
  issue.status = document.querySelector('#det-status-group .btn-toggle.active').innerText;
  renderTimeline();
  closeModal('detailModal');
}

function openRegModal() { document.getElementById('regModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleRegStop(s) {
  regHasStop = s;
  document.getElementById('reg-stop-on').classList.toggle('active', s);
  document.getElementById('reg-stop-off').classList.toggle('active', !s);
}

function saveNewIssue() {
  const title = document.getElementById('reg-title').value || "新規変化点";
  const now = new Date();
  issues.push({
    id: Date.now(),
    time: now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0'),
    icon: "info",
    title: title,
    action: "",
    stop: regHasStop,
    status: regHasStop ? "停止中" : "対応済み",
    m4: "不明"
  });
  renderTimeline();
  closeModal('regModal');
}

// 初期化・時計 (簡略版)
setInterval(() => {
  const now = new Date();
  document.getElementById('live-clock').innerText = now.toLocaleTimeString('ja-JP', { hour12: false });
}, 1000);

document.addEventListener('DOMContentLoaded', () => {
  renderTimeline();
  // ラウンド表示生成ロジックなどは以前のものを継承
  const rdArea = document.getElementById('rd-display-area');
  rdArea.innerHTML = '<span style="color:#ddd">・・</span><span class="rd-icon active">1rd</span><span class="rd-icon side">2rd</span><span style="color:#ddd">・</span>';
});
</script>
</body>
</html>
