<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM 朝会モニター — ver7.2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ===== 基本設定 (ver6.0をベースに拡張) ===== */
:root {
  --bg: #F0F2F5;
  --panel: #FFFFFF;
  --accent: #B33F40;
  --teal: #45ADA8;
  --amber: #E9B44C;
  --text: #333333;
  --border: #DDDDDD;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  padding-bottom: 110px;
  overflow-x: hidden;
}

/* ===== ヘッダー ===== */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 70px;
  background: var(--panel); border-bottom: 2px solid var(--border);
}
.h-title { font-size: 22px; font-weight: 900; color: var(--accent); }
.h-clock {
  font-family: 'Share Tech Mono', monospace;
  font-size: 32px; font-weight: 700;
  color: var(--accent); letter-spacing: 2px;
}

/* ===== メイングリッド (レスポンシブ) ===== */
.main-grid { display: grid; gap: 16px; padding: 16px; }
@media (orientation: landscape) { .main-grid { grid-template-columns: 4fr 6fr; } }
@media (orientation: portrait)  { .main-grid { grid-template-columns: 1fr; } }

/* ===== カードデザイン ===== */
.card {
  background: var(--panel); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}
.card-header {
  padding: 15px 20px; background: #fafafa;
  border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 17px;
}
.compact-body { padding: 15px; }

/* ===== テーブルスタイル (行列入れ替え) ===== */
.detail-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
.detail-table th { background: #f8f8f8; font-size: 11px; color: #666; padding: 10px 5px; border-bottom: 2px solid var(--bg); }
.detail-table td { padding: 12px 5px; border-bottom: 1px solid var(--bg); }
.line-name-cell { text-align: left; font-weight: 700; padding-left: 10px !important; }

/* ===== ステータスバッジ ===== */
.status-badge { padding: 4px 8px; border-radius: 6px; font-weight: 700; color: #fff; font-size: 11px; }
.status-badge.ok { background: var(--teal); }
.status-badge.ng { background: var(--accent); }

/* ===== 4M分析カード (詳細モーダル内) ===== */
.analysis-card {
  margin-bottom: 15px; padding: 15px; border-radius: 12px;
  border: 1px solid #EEE; background: #F9F9F9;
}
.analysis-card.warning { background: #FFF5F5; border-color: #FEB2B2; }
.analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.analysis-item { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #EEE; font-size: 12px; }

/* ===== スパークライン (トレンド表示) ===== */
.trend-box { display: flex; gap: 2px; align-items: flex-end; height: 20px; }
.trend-bar { width: 12px; border-radius: 1px; opacity: 0.7; }

/* ===== 操作バー (ver6.0維持) ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
  background: rgba(255,255,255,0.98); border-top: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 12px; z-index: 9999;
}
.nav-btn {
  flex: 1; max-width: 170px; height: 55px;
  border: none; border-radius: 12px; font-weight: 700; font-size: 13px;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.btn-qr { background: var(--accent); color: #fff; }
.btn-detail { background: #3a3a3a; color: #fff; }

/* ===== モーダル (ver6.0維持) ===== */
.modal-overlay {
  visibility: hidden; opacity: 0; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.82); z-index: 10000; display: flex; align-items: center; justify-content: center;
  transition: 0.2s;
}
.modal-overlay.is-open { visibility: visible; opacity: 1; }
.modal-content {
  background: #fff; width: 92%; max-width: 800px; border-radius: var(--radius); padding: 24px;
  max-height: 85vh; overflow-y: auto; position: relative;
}
.modal-close { position: absolute; top: 12px; right: 15px; font-size: 30px; cursor: pointer; border: none; background: none; color: #999; }
</style>
</head>

<body>

<header>
  <div class="h-title">FAM 朝会モニター</div>
  <div class="h-clock" id="hClock">--:--:--</div>
</header>

<main class="main-grid">
  <div class="card">
    <div class="card-header">👥 出勤状況</div>
    <div class="compact-body">
      <table class="detail-table">
        <thead><tr><th>ライン</th><th>人員数</th><th>出勤率</th><th>判定</th></tr></thead>
        <tbody>
          <tr><td class="line-name-cell">ABライン</td><td><strong>22 / 24</strong></td><td>92%</td><td style="color:var(--teal)">◎</td></tr>
          <tr><td class="line-name-cell">Cライン</td><td><strong>16 / 18</strong></td><td style="color:var(--accent)">88%</td><td style="color:var(--amber)">△</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">🏭 生産実績（昨日）</div>
    <div class="compact-body">
      <table class="detail-table">
        <thead><tr><th style="text-align:left;">ライン名</th><th>計画</th><th>実績</th><th>差分</th><th>稼働率</th></tr></thead>
        <tbody id="prodSummaryBody">
          </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">⚠️ 昨日の主要トピックス</div>
    <div class="compact-body">
      <div style="background:var(--bg); padding:15px; border-radius:10px; border-left:5px solid var(--accent);">
        <p style="font-weight:700;">設備故障：主軸モーター焼損 (ABライン)</p>
        <p style="font-size:13px; color:#666; margin-top:5px;">停止：103分 / 影響：-11台 / 復旧済み</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">📢 連絡事項</div>
    <div class="compact-body">
      <p style="font-size:14px; line-height:1.7;">
        🚨 <strong>安全：</strong>指差呼称の徹底。安全靴点検。<br>
        🔵 <strong>予定：</strong>本日13:00〜 3Sパトロール実施。
      </p>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn btn-qr" id="btnQR">📲 連携QR</button>
  <button class="nav-btn btn-detail" id="btnAttendOpen">👥 出勤詳細</button>
  <button class="nav-btn btn-detail" id="btnProdOpen">🏭 生産詳細</button>
</nav>

<div id="modalProd" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('prod')">×</button>
    <div style="font-size:18px; font-weight:700; border-left:5px solid var(--accent); padding-left:12px; margin-bottom:18px;">🏭 昨日実績 振り返り分析</div>
    <div id="prodDetailBody"></div>
  </div>
</div>

<div id="modalQR" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('qr')">×</button>
    <div style="font-size:18px; font-weight:700; border-left:5px solid var(--accent); padding-left:12px; margin-bottom:18px;">📲 スマホ連携 QR</div>
    <div style="text-align:center; padding:20px;">
      <p style="color:#666; font-size:14px;">各入力・閲覧ページへアクセスできます</p>
      <div id="qrPlaceholder" style="margin-top:15px; font-weight:bold; color:var(--accent);">[QR機能は ver6.0 のロジックを適用]</div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   データ定義 (4M分析・ラウンド推移を含む)
   ================================================================ */
const PROD_DATA = {
  lines: [
    {
      name: '大型エンジン', plan: 100, result: 85, diff: -15, rate: 85,
      rounds: [ {r:25, p:25}, {r:23, p:25}, {r:15, p:25}, {r:22, p:25} ],
      analysis: { why: "Machine: 第2工程センサー不調による停止(20分)", today: "🔧 修理完了。通常稼働。" }
    },
    {
      name: '中型トランス', plan: 200, result: 205, diff: 5, rate: 102,
      rounds: [ {r:50, p:50}, {r:50, p:50}, {r:51, p:50}, {r:54, p:50} ],
      analysis: { why: "特記事項なし。安定。", today: "✅ 継続して安定稼働の見込み。" }
    }
  ]
};

document.addEventListener('DOMContentLoaded', function () {
  /* ---- 1. 時計 (ver6.0準拠) ---- */
  function updateClock() {
    const n = new Date();
    document.getElementById('hClock').textContent = 
      String(n.getHours()).padStart(2,'0') + ':' + 
      String(n.getMinutes()).padStart(2,'0') + ':' + 
      String(n.getSeconds()).padStart(2,'0');
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ---- 2. メイン画面のサマリー生成 ---- */
  function renderSummary() {
    let html = '';
    PROD_DATA.lines.forEach(line => {
      const color = line.diff >= 0 ? 'var(--teal)' : 'var(--accent)';
      html += `<tr>
        <td class="line-name-cell">${line.rate < 95 ? '⚠️' : '✅'} ${line.name}</td>
        <td>${line.plan}</td><td>${line.result}</td>
        <td style="color:${color}; font-weight:700;">${line.diff >= 0 ? '+' : ''}${line.diff}</td>
        <td><span class="status-badge ${line.rate >= 95 ? 'ok' : 'ng'}">${line.rate}%</span></td>
      </tr>`;
    });
    document.getElementById('prodSummaryBody').innerHTML = html;
  }
  renderSummary();

  /* ---- 3. 生産詳細のレンダリング (最新レイアウト) ---- */
  window.renderProdDetail = function() {
    let html = '';
    PROD_DATA.lines.forEach((line, idx) => {
      const isNG = line.rate < 95;
      html += `
        <div class="analysis-card ${isNG ? 'warning' : ''}">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-weight:bold;">${line.name}</span>
            <div class="trend-box">`;
      
      line.rounds.forEach(r => {
        const h = (r.r / r.p) * 100;
        html += `<div class="trend-bar" style="height:${h/5}px; background:${h < 100 ? 'var(--accent)' : 'var(--teal)'};"></div>`;
      });
      
      html += `<span style="font-size:9px; margin-left:4px; color:#999;">Trend</span></div></div>
          
          <div class="analysis-grid">
            <div class="analysis-item"><strong>【なぜ？】</strong><br><span style="color:#666;">${line.analysis.why}</span></div>
            <div class="analysis-item"><strong>【今日は？】</strong><br><span style="color:var(--teal); font-weight:bold;">${line.analysis.today}</span></div>
          </div>
        </div>`;
    });
    document.getElementById('prodDetailBody').innerHTML = html;
  };

  /* ---- 4. モーダル制御 ---- */
  window.openModal = function(id) {
    if(id === 'prod') renderProdDetail();
    document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('is-open');
  };
  window.closeModal = function(id) {
    document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.remove('is-open');
  };

  document.getElementById('btnProdOpen').onclick = () => openModal('prod');
  document.getElementById('btnQR').onclick = () => openModal('qr');
});
</script>
</body>
</html>
