<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAM 朝会モニター — ver7.3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ===== 基本設定 (ver6.0 継承) ===== */
:root {
  --bg: #F0F2F5;
  --panel: #FFFFFF;
  --accent: #B33F40;
  --teal: #45ADA8;
  --amber: #E9B44C;
  --text: #333333;
  --border: #DDDDDD;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Noto Sans JP', sans-serif;
  padding-bottom: 110px;
  overflow-x: hidden;
}

/* ===== ヘッダー ===== */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 70px;
  background: var(--panel); border-bottom: 2px solid var(--border);
}
.h-title { font-size: 22px; font-weight: 900; color: var(--accent); }
.h-clock {
  font-family: 'Share Tech Mono', monospace;
  font-size: 32px; font-weight: 700;
  color: var(--accent); letter-spacing: 2px;
}

/* ===== メイングリッド ===== */
.main-grid { display: grid; gap: 16px; padding: 16px; }
@media (orientation: landscape) { .main-grid { grid-template-columns: 4fr 6fr; } }
@media (orientation: portrait)  { .main-grid { grid-template-columns: 1fr; } }

/* ===== カード ===== */
.card {
  background: var(--panel); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}
.card-header {
  padding: 15px 20px; background: #fafafa;
  border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 17px;
}
.compact-body { padding: 15px; }

/* ===== 行列入れ替え済み比較テーブル ===== */
.summary-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 15px; }
.summary-table th { font-size: 11px; color: #666; padding-bottom: 8px; border-bottom: 2px solid var(--bg); }
.summary-table td { padding: 12px 5px; border-bottom: 1px solid var(--bg); }
.line-name { text-align: left; font-weight: 700; padding-left: 8px; }

/* ===== 4M分析・詳細表示 (モーダル内) ===== */
.analysis-card {
  border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; background: #fdfdfd; margin-bottom: 16px;
}
.analysis-card.warning { border-left: 6px solid var(--accent); background: #FFF5F5; }
.analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.analysis-item { background: #fff; padding: 8px; border-radius: 6px; border: 1px solid #EEE; font-size: 12px; }

.trend-box { display: flex; gap: 2px; align-items: flex-end; height: 18px; margin-left: auto; }
.trend-bar { width: 12px; background: var(--teal); opacity: 0.6; border-radius: 1px; }
.trend-bar.ng { background: var(--accent); }

/* ===== 操作バー & ボタン (ver6.0 継承) ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
  background: rgba(255,255,255,0.98); border-top: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 12px; z-index: 9999;
}
.nav-btn {
  flex: 1; max-width: 170px; height: 55px; border: none; border-radius: 12px;
  font-weight: 700; font-size: 13px; cursor: pointer; transition: 0.1s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.btn-qr { background: var(--accent); color: #fff; }
.btn-detail { background: #3a3a3a; color: #fff; }
.nav-btn:active { transform: scale(0.95); }

/* ===== モーダル設定 (ver6.0 継承) ===== */
.modal-overlay {
  visibility: hidden; opacity: 0; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.82); z-index: 10000; display: flex; align-items: center; justify-content: center;
  transition: 0.2s;
}
.modal-overlay.is-open { visibility: visible; opacity: 1; }
.modal-content {
  background: #fff; width: 92%; max-width: 800px; border-radius: var(--radius); padding: 24px;
  position: relative; max-height: 82vh; overflow-y: auto;
}
.modal-close { position: absolute; top: 8px; right: 12px; font-size: 34px; cursor: pointer; color: #999; border: none; background: none; }
.modal-title { font-size: 18px; font-weight: 700; border-left: 5px solid var(--accent); padding-left: 12px; margin-bottom: 18px; }

/* QRメニュー */
.qr-menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.qr-menu-btn { border: none; border-radius: 12px; padding: 15px; cursor: pointer; font-weight: 700; color: #fff; }
</style>
</head>
<body>

<header>
  <div class="h-title">FAM 朝会モニター</div>
  <div class="h-clock" id="hClock">--:--:--</div>
</header>

<main class="main-grid">
  <div class="card">
    <div class="card-header">👥 出勤状況</div>
    <div class="compact-body">
      <table class="summary-table">
        <thead><tr><th>ライン</th><th>人員数</th><th>出勤率</th><th>判定</th></tr></thead>
        <tbody>
          <tr><td class="line-name">ABライン</td><td><strong>22 / 24</strong></td><td>92%</td><td style="color:var(--teal)">◎</td></tr>
          <tr><td class="line-name">Cライン</td><td><strong>16 / 18</strong></td><td style="color:var(--accent)">88%</td><td style="color:var(--amber)">△</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">🏭 生産実績（昨日）</div>
    <div class="compact-body">
      <table class="summary-table">
        <thead><tr><th style="text-align:left;">ライン名</th><th>計画</th><th>実績</th><th>差分</th><th>稼働率</th></tr></thead>
        <tbody id="prodSummaryBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-header">📢 連絡事項</div>
    <div class="compact-body">
      <p style="font-size:14px; line-height:1.7;">🚨 指差呼称の徹底。<br>🔵 本日13:00〜 3Sパトロール実施。</p>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn btn-qr" id="btnQR">📲 連携QR</button>
  <button class="nav-btn btn-detail" id="btnAttendDetail">👥 出勤詳細</button>
  <button class="nav-btn btn-detail" id="btnProdDetail">🏭 生産詳細分析</button>
</nav>

<div id="modalProd" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('prod')">×</button>
    <div class="modal-title">🏭 昨日実績 振り返り分析</div>
    <div id="prodDetailBody"></div>
  </div>
</div>

<div id="modalQR" class="modal-overlay">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal('qr')">×</button>
    <div class="modal-title">📲 スマホ連携 QR</div>
    <div class="qr-menu-grid">
      <button class="qr-menu-btn" style="background:#1565C0;" onclick="showQR('全体閲覧','https://example.com/view')">全体閲覧</button>
      <button class="qr-menu-btn" style="background:var(--teal);" onclick="showQR('出勤入力','https://example.com/attend')">出勤入力</button>
    </div>
    <div id="qrDisplay" style="text-align:center; margin-top:20px; display:none;">
      <img id="qrImg" src="" style="width:180px; border:1px solid #ddd; border-radius:8px;">
      <p id="qrLabel" style="font-weight:700; margin-top:10px;"></p>
    </div>
  </div>
</div>

<script>
/* ================================================================
   データ・ロジック (4M分析統合)
   ================================================================ */
const PROD_DATA = {
  lines: [
    {
      name: '大型エンジン組付け', plan: 50, result: 52, diff: 2, rate: 104,
      rounds: [{p:12, r:12}, {p:13, r:14}, {p:12, r:13}, {p:13, r:13}],
      analysis: { why: "サイクルタイムの安定化により計画を上回る。", today: "✅ 本日も標準作業の遵守を継続。" }
    },
    {
      name: '中型トランス組付け', plan: 72, result: 61, diff: -11, rate: 84,
      rounds: [{p:18, r:18}, {p:18, r:7}, {p:18, r:18}, {p:18, r:18}],
      analysis: { why: "設備故障：R2で主軸モーター焼損が発生(停止103分)。", today: "🔧 復旧済み。本日は立ち上がりからフル稼働。" }
    }
  ]
};

document.addEventListener('DOMContentLoaded', function () {
  
  // 1. 時計 (ver6.0 継承)
  function updateClock() {
    const n = new Date();
    document.getElementById('hClock').textContent = 
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0') + ':' + String(n.getSeconds()).padStart(2,'0');
  }
  setInterval(updateClock, 1000); updateClock();

  // 2. サマリー表示 (行列入れ替え)
  function renderSummary() {
    let html = '';
    PROD_DATA.lines.forEach(line => {
      const color = line.diff >= 0 ? 'var(--teal)' : 'var(--accent)';
      html += `<tr>
        <td class="line-name">${line.rate < 90 ? '⚠️' : '✅'} ${line.name}</td>
        <td>${line.plan}</td><td>${line.result}</td>
        <td style="color:${color}; font-weight:700;">${line.diff>=0?'+':''}${line.diff}</td>
        <td><span class="status-badge ${line.rate>=90?'ok':'ng'}" style="background:${line.rate>=90?'var(--teal)':'var(--accent)'}; color:#fff; padding:2px 6px; border-radius:4px; font-size:11px;">${line.rate}%</span></td>
      </tr>`;
    });
    document.getElementById('prodSummaryBody').innerHTML = html;
  }
  renderSummary();

  // 3. 詳細分析モーダル生成
  window.renderDetail = function() {
    let html = '';
    PROD_DATA.lines.forEach(line => {
      const isWarn = line.rate < 90;
      html += `
        <div class="analysis-card ${isWarn ? 'warning' : ''}">
          <div style="display:flex; align-items:center; margin-bottom:8px;">
            <span style="font-weight:900; font-size:15px;">${line.name}</span>
            <div class="trend-box">`;
      line.rounds.forEach(r => {
        const h = (r.r / r.p) * 100;
        html += `<div class="trend-bar ${h<100?'ng':''}" style="height:${Math.min(h/4, 25)}px;"></div>`;
      });
      html += `<span style="font-size:9px; color:#999; margin-left:4px;">推移</span></div></div>
          <div class="analysis-grid">
            <div class="analysis-item"><strong>【要因(なぜ)】</strong><br>${line.analysis.why}</div>
            <div class="analysis-item"><strong>【対策(今日)】</strong><br><span style="color:var(--teal); font-weight:700;">${line.analysis.today}</span></div>
          </div>
        </div>`;
    });
    document.getElementById('prodDetailBody').innerHTML = html;
  };

  // 4. イベント登録
  document.getElementById('btnProdDetail').onclick = () => { renderDetail(); openModal('prod'); };
  document.getElementById('btnQR').onclick = () => openModal('qr');

  window.openModal = function(id) { document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('is-open'); };
  window.closeModal = function(id) { document.getElementById('modal' + id.charAt(0).toUpperCase() + id.slice(1)).classList.remove('is-open'); };
  
  window.showQR = function(name, url) {
    document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(url);
    document.getElementById('qrLabel').textContent = name;
    document.getElementById('qrDisplay').style.display = 'block';
  };
});
</script>
</body>
</html>
